name: Publish a single TypeScript SDK (reusable)

# Called by publish-npm.yml. Generates one aegislab TypeScript SDK (portal or
# admin), rewrites its scope from @OperationsPAI to @lincyaw, and publishes
# it to npmjs.org under the public @lincyaw scope using an npm automation
# token (NPM_TOKEN secret). The token's "automation" type lets the publish
# step bypass 2FA, so no human OTP is needed.
#
# The caller passes `version` as empty-string when the trigger was a git tag;
# in that case the version is derived from $GITHUB_REF here. This keeps the
# tag→version logic in one place.

on:
  workflow_call:
    inputs:
      target:
        description: "portal or admin"
        required: true
        type: string
      version:
        description: "Version without leading v. Empty string means: derive from the tag."
        required: false
        type: string
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
    env:
      TARGET: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          v="${{ inputs.version }}"
          if [[ -z "$v" ]]; then
            case "$GITHUB_REF" in
              refs/tags/release-ts-portal/v*) v="${GITHUB_REF#refs/tags/release-ts-portal/v}" ;;
              refs/tags/release-ts-admin/v*)  v="${GITHUB_REF#refs/tags/release-ts-admin/v}" ;;
              *) echo "::error::cannot derive version from ref '$GITHUB_REF'"; exit 1 ;;
            esac
          fi
          [[ -n "$v" ]] || { echo "::error::empty version"; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "aegislab/src/go.mod"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: taiki-e/install-action@just

      - name: Install Go build deps
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          (cd aegislab/src && go mod tidy)

      - name: Generate ${{ inputs.target }} SDK
        working-directory: aegislab
        env:
          SDK_VERSION: ${{ steps.v.outputs.version }}
        run: just "release-${TARGET}" "${SDK_VERSION}"

      - name: Sanity-check generated package version
        shell: bash
        env:
          SDK_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          pkg="aegislab/sdk/typescript/${TARGET}/package.json"
          [[ -f "$pkg" ]] || { echo "::error::$pkg not found after generation"; exit 1; }
          pkgver=$(node -p "require('./$pkg').version")
          if [[ "$pkgver" != "${SDK_VERSION}" ]]; then
            echo "::error::generated $pkg version '$pkgver' != requested '${SDK_VERSION}'"
            exit 1
          fi

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@lincyaw"

      - name: Install
        working-directory: aegislab/sdk/typescript/${{ inputs.target }}
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build (if build script present)
        working-directory: aegislab/sdk/typescript/${{ inputs.target }}
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            pnpm run build
          else
            echo "no build script, skipping"
          fi

      # The generator emits @OperationsPAI/* scoped names + a GHPR-targeted
      # publishConfig because the upstream openapi-generator template was
      # configured for the original org. Rewrite both before publish so the
      # package lands on npmjs.org under the @lincyaw public scope.
      - name: Rewrite scope for npmjs publish
        working-directory: aegislab/sdk/typescript/${{ inputs.target }}
        env:
          TARGET: ${{ inputs.target }}
        shell: bash
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const target = process.env.TARGET;
            p.name = '@lincyaw/' + target;
            p.description = 'OpenAPI client for @lincyaw/' + target;
            if (Array.isArray(p.keywords)) {
              p.keywords = p.keywords.map(k => k.replace(/^@OperationsPAI\\//, '@lincyaw/'));
            }
            p.publishConfig = { access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          node -e "
            const p = require('./package.json');
            if (p.name !== '@lincyaw/' + process.env.TARGET) {
              console.error('name not patched:', p.name);
              process.exit(1);
            }
            if (p.publishConfig && p.publishConfig.registry) {
              console.error('publishConfig.registry should be absent for npmjs publish');
              process.exit(1);
            }
          "

      - name: Publish
        working-directory: aegislab/sdk/typescript/${{ inputs.target }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --no-git-checks --access public
