name: Remote Regression Test

# Runs the AegisLab regression suite on a self-hosted test server over SSH,
# tunneled through Tailscale. Replaces the old regression-test.yml that lived
# under AegisLab/.github/workflows/.
#
# Server-side assumption (REVIEW AFTER MONOREPO MIGRATION):
#   ~/workspace/aegis  is a checkout of OperationsPAI/aegis
# The old workflow expected ~/workspace/AegisLab when AegisLab was a standalone
# repo. If the test server still has the old layout, either rename the
# checkout or adjust the SSH command below.
#
# Required repo config:
#   secrets.TS_OAUTH_CLIENT_ID, secrets.TS_OAUTH_SECRET   (Tailscale)
#   environment 'test-server' with vars.USER, vars.HOST

on:
  pull_request:
    branches: [main]
    paths:
      - "AegisLab/**"
      - ".github/workflows/regression-test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: test-server
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale connection
        run: |
          for i in {1..5}; do
            ping -c 1 ${{ vars.HOST }} && break || sleep 2
          done

      - name: Run regression test via SSH
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              ${{ vars.USER }}@${{ vars.HOST }} \
              "cd ~/workspace/aegis && \
               git fetch origin && \
               git reset --hard origin/main && \
               echo '--- Starting Regression Test #${{ github.run_number }} ---' && \
               mkdir -p AegisLab/logs/test && \
               LOG_FILE=AegisLab/logs/test/remote_test_${{ github.run_number }}.txt && \
               (cd AegisLab && devbox run -- just regression-test) > \$LOG_FILE 2>&1 || (cat \$LOG_FILE && exit 1) && \
               cat \$LOG_FILE"

      - name: Cleanup
        if: always()
        run: echo "Cleaning up Tailscale connection"
