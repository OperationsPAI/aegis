name: Cascade submodule merges

# When a parent PR is merged, fast-forward each submodule's PR-head branch
# into that submodule's main branch. Keeps submodule mains in sync with
# what the workspace parent's main points at.
#
# Auth: requires repo secret CASCADE_TOKEN (a PAT or fine-grained token
# with `contents: write` on each of the 4 submodule repos under
# OperationsPAI). The built-in GITHUB_TOKEN does NOT have access to sibling
# repos in the same org, even though they share the org — GitHub scopes the
# default token to this repo only.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  cascade:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parent merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 2
          submodules: false

      - name: Detect changed submodule pointers
        id: detect
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          merge_sha="${{ github.event.pull_request.merge_commit_sha }}"
          # List files whose mode is 160000 (submodule gitlink) that changed.
          # Format per row: ":<oldmode> <newmode> <oldsha> <newsha> <status>\t<path>"
          git diff-tree -r --raw "$base_sha" "$merge_sha" \
            | awk '$2 == "160000" { print $4 " " $NF }' \
            > changed.txt
          echo "--- changed submodule pointers ---"
          cat changed.txt
          count=$(wc -l < changed.txt)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Cascade each submodule
        if: steps.detect.outputs.count != '0'
        env:
          TOKEN: ${{ secrets.CASCADE_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::CASCADE_TOKEN secret is not configured."
            echo "Create a fine-grained PAT with 'Contents: write' on the 4"
            echo "submodule repos (AegisLab, AegisLab-frontend, chaos-experiment,"
            echo "rcabench-platform) and add it as a repo secret named CASCADE_TOKEN."
            exit 1
          fi

          git config --global user.name "aegis-cascade[bot]"
          git config --global user.email "aegis-cascade@users.noreply.github.com"

          failures=()
          successes=()

          while IFS=' ' read -r new_sha path; do
            echo ""
            echo "=== cascading submodule: $path (new_sha=$new_sha) ==="
            url=$(git config -f .gitmodules --get "submodule.$path.url")
            auth_url=$(echo "$url" | sed -E "s#https://github.com/#https://x-access-token:${TOKEN}@github.com/#")

            tmp=$(mktemp -d)
            if ! git clone --quiet "$auth_url" "$tmp/sub"; then
              failures+=("$path: clone failed")
              continue
            fi
            cd "$tmp/sub"

            # Does the feature branch exist on the remote?
            if ! git ls-remote --heads --exit-code origin "$BRANCH" >/dev/null 2>&1; then
              echo "[$path] no branch '$BRANCH' on remote — pointer-only bump, skipping cascade."
              cd - >/dev/null
              continue
            fi

            git fetch --quiet origin "$BRANCH" main
            remote_sha=$(git rev-parse "origin/$BRANCH")

            if [ "$remote_sha" != "$new_sha" ]; then
              if git merge-base --is-ancestor "$new_sha" "origin/$BRANCH"; then
                echo "[$path] parent pin $new_sha is an ancestor of branch tip $remote_sha — continuing."
              else
                failures+=("$path: branch $BRANCH tip ($remote_sha) is not a descendant of parent pin ($new_sha)")
                cd - >/dev/null
                continue
              fi
            fi

            # Can main fast-forward onto the branch?
            if ! git merge-base --is-ancestor "origin/main" "origin/$BRANCH"; then
              failures+=("$path: main is not an ancestor of $BRANCH — cannot FF (rebase needed)")
              cd - >/dev/null
              continue
            fi

            git checkout --quiet main
            git merge --ff-only "origin/$BRANCH"
            if git push origin main; then
              successes+=("$path: FF main → $remote_sha")
              # Delete the feature branch (best-effort; don't fail cascade if it fails)
              git push origin --delete "$BRANCH" || echo "[$path] (branch delete failed, leaving it)"
            else
              failures+=("$path: push to main rejected (branch protection?)")
              cd - >/dev/null
              continue
            fi

            cd - >/dev/null
          done < changed.txt

          echo ""
          echo "========================================"
          echo "Cascade summary for parent PR #$PR_NUMBER"
          echo "========================================"
          echo "Successes (${#successes[@]}):"
          for s in "${successes[@]:-}"; do echo "  - $s"; done
          echo "Failures (${#failures[@]}):"
          for f in "${failures[@]:-}"; do echo "  - $f"; done

          if [ ${#failures[@]} -ne 0 ]; then
            echo "::error::Cascade had ${#failures[@]} failure(s). See log above. Submodule mains may be out of sync with parent main — manual intervention needed."
            exit 1
          fi
