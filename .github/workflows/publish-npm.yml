name: Publish NPM packages

# Unified NPM release flow for the two TypeScript SDKs generated from the
# aegislab backend OpenAPI spec:
#   - @lincyaw/portal  (generated into aegislab/sdk/typescript/portal/ — the
#                       generator emits @OperationsPAI/portal and the reusable
#                       workflow rewrites the scope before publish)
#   - @lincyaw/admin   (same: scope rewritten from @OperationsPAI/admin)
#
# Publishes to npmjs.org under the public @lincyaw scope using the NPM_TOKEN
# repo secret (type=Automation, bypasses 2FA so no OTP is needed). Versions
# are INDEPENDENT per package; the tag carries the version and the generator
# bakes it into the generated package.json.
#
# Ship both in one push:
#   git tag release-ts-portal/v1.3.0
#   git tag release-ts-admin/v1.3.0
#   git push origin release-ts-portal/v1.3.0 release-ts-admin/v1.3.0

on:
  push:
    tags:
      - "release-ts-portal/v[0-9]+.[0-9]+.[0-9]+*"
      - "release-ts-admin/v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      target:
        description: "Which package(s) to publish"
        required: true
        default: "both"
        type: choice
        options: [portal, admin, both]
      portal_version:
        description: "portal version (no leading v). Required if target includes portal."
        required: false
        type: string
      admin_version:
        description: "admin version (no leading v). Required if target includes admin."
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-portal:
    name: Publish @lincyaw/portal
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-ts-portal/'))
      || (github.event_name == 'workflow_dispatch' && (inputs.target == 'portal' || inputs.target == 'both'))
    uses: ./.github/workflows/_publish-ts-sdk.yml
    with:
      target: portal
      version: ${{ github.event_name == 'push' && '' || inputs.portal_version }}
    secrets: inherit

  publish-admin:
    name: Publish @lincyaw/admin
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-ts-admin/'))
      || (github.event_name == 'workflow_dispatch' && (inputs.target == 'admin' || inputs.target == 'both'))
    uses: ./.github/workflows/_publish-ts-sdk.yml
    with:
      target: admin
      version: ${{ github.event_name == 'push' && '' || inputs.admin_version }}
    secrets: inherit
