name: Release Docker images

# Monorepo replacement for the two separate release-docker workflows that
# previously lived under AegisLab/ and AegisLab-frontend/. Each component has
# its own tag namespace so a single `git push` can independently trigger the
# backend image, frontend image, or both.
#
# Tags:
#   release-backend/v<ver>  → opspai/rcabench             (context: AegisLab/)
#   release-frontend/v<ver> → opspai/rcabench-frontend    (context: AegisLab-frontend/)
#
# Auth is inherited from org-level vars/secrets used by shared-workflows:
#   vars.DOCKERHUB_REGISTRY, vars.DOCKERHUB_USERNAME, secrets.DOCKERHUB_PASSWORD

on:
  push:
    tags:
      - "release-backend/v[0-9]+.[0-9]+.[0-9]+*"
      - "release-frontend/v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  backend:
    if: startsWith(github.ref, 'refs/tags/release-backend/')
    uses: OperationsPAI/shared-workflows/.github/workflows/release-docker.yml@main
    with:
      caller: AegisLab
      image: opspai/rcabench
      context: AegisLab
      file: AegisLab/src/Dockerfile
      build-args: |
        GO_BUILD_TAGS=duckdb_arrow
      tag-push: true
      tag-prefix: "release-backend/"
    secrets: inherit

  frontend:
    if: startsWith(github.ref, 'refs/tags/release-frontend/')
    uses: OperationsPAI/shared-workflows/.github/workflows/release-docker.yml@main
    with:
      caller: AegisLab-frontend
      image: opspai/rcabench-frontend
      context: AegisLab-frontend
      file: AegisLab-frontend/Dockerfile
      tag-push: true
      tag-prefix: "release-frontend/"
    secrets: inherit
