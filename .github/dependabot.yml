# Dependabot config for the aegis monorepo. Each Python and Go project
# gets its own monthly grouped update PR.
# Reference: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/rcabench-platform"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns: ["*"]

  - package-ecosystem: "uv"
    directory: "/AegisLab/sdk/python"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns: ["*"]

  - package-ecosystem: "uv"
    directory: "/AegisLab/scripts/command"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/AegisLab/src"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/chaos-experiment"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
