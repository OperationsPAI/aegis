apiVersion: v1
kind: Namespace
metadata:
  name: otel
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: otel
spec:
  selector: { app: clickhouse }
  ports:
    - name: native
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: otel
spec:
  serviceName: clickhouse
  replicas: 1
  selector: { matchLabels: { app: clickhouse } }
  template:
    metadata:
      labels: { app: clickhouse }
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - { containerPort: 9000, name: native }
            - { containerPort: 8123, name: http }
          env:
            - { name: CLICKHOUSE_USER,     value: default }
            - { name: CLICKHOUSE_PASSWORD, value: "clickhouse" }
            - { name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT, value: "1" }
            - { name: CLICKHOUSE_DB,       value: otel }
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-cfg
  namespace: otel
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      clickhouse:
        endpoint: tcp://clickhouse.otel:9000?dial_timeout=10s
        database: otel
        username: default
        password: "clickhouse"
        ttl: 0
        create_schema: true
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
      debug:
        verbosity: basic
    service:
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [clickhouse, debug]
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: otel
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: otel
spec:
  replicas: 1
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.112.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - { containerPort: 4317, name: otlp-grpc }
            - { containerPort: 4318, name: otlp-http }
          volumeMounts:
            - name: cfg
              mountPath: /etc/otel
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      volumes:
        - name: cfg
          configMap: { name: otel-collector-cfg }
