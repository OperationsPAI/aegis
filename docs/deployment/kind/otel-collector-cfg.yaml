apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-cfg
  namespace: otel
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.deployment.name
            - k8s.statefulset.name
          labels:
            - tag_name: k8s.app.name
              key: app.kubernetes.io/name
              from: pod
            - tag_name: k8s.app.component
              key: app.kubernetes.io/component
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resource:
        attributes:
          - key: service.namespace
            from_attribute: k8s.namespace.name
            action: upsert
    exporters:
      clickhouse:
        endpoint: tcp://clickhouse.otel:9000?dial_timeout=10s
        database: otel
        username: default
        password: "clickhouse"
        ttl: 0
        create_schema: true
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
      debug:
        verbosity: basic
    service:
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [k8sattributes, resource, batch]
          exporters:  [clickhouse, debug]
        metrics:
          receivers:  [otlp]
          processors: [k8sattributes, resource, batch]
          exporters:  [clickhouse]
        logs:
          receivers:  [otlp]
          processors: [k8sattributes, resource, batch]
          exporters:  [clickhouse]
