version: '3.8'

services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aegislab-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - /app/node_modules
      - /app/client/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    stdin_open: true
    tty: true

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - NPM_TOKEN
    container_name: aegislab-frontend-prod
    ports:
      - "8080:80"
    environment:
      - API_TARGET=http://host.docker.internal:8082
    restart: unless-stopped

secrets:
  NPM_TOKEN:
    environment: NPM_TOKEN
