# NOTE: template should include keys {question} OR ({directory_path})
#
# RCABench: deliberately does NOT name which API endpoints / SLOs are
# violating — that would leak half of the diagnostic work the agent is
# supposed to do. The framing matches a real on-call scenario: the only
# upstream signal is a user complaint, and the agent must walk the
# telemetry to find which endpoints are actually affected before it
# even gets to "why".
#
# The fault_kind enum is intentionally NOT enumerated here. Whatever
# integrator is invoking this benchmark provides the candidate list to
# the agent at its own system-prompt layer — duplicating it in the
# augmentation prompt would conflict with that source of truth.

default: |
  {question}

RCABench: |
  A user has filed a support ticket reporting that their experience
  with the service has degraded — requests feel slow or are failing
  for them. The on-call team needs you to investigate.

  Telemetry parquets are stored in: `{directory_path}`
  Available files: abnormal_metrics.parquet, abnormal_traces.parquet,
  abnormal_logs.parquet, abnormal_metrics_histogram.parquet,
  abnormal_metrics_sum.parquet, normal_metrics.parquet,
  normal_traces.parquet, normal_logs.parquet.

  Walk the telemetry to identify which endpoints / services are
  actually affected, then determine the root cause(s) of the
  degradation.
