fault_type_name: NetworkDuplicate
target_kind: pod
seed_tier: degraded
description: |
  Pod-level packet duplication injected via netem. A configured fraction
  of packets are sent twice; TCP de-duplicates at the receiver via
  sequence numbers, so the protocol-level recovery is essentially free.
  Net effect is a small bandwidth/CPU overhead and a slight latency
  bump. Of the three packet-disturbance faults, this is the LEAST
  severe (Loss > Corrupt > Duplicate); bands are correspondingly
  loosest, reflecting that duplicate packets are mostly tolerated.

# Direction handling: same egress/ingress dispatch as other network
# faults via display_config.direction. The injecting pod is reachable;
# pod-level resource features (cpu/mem/throttle) do NOT fire.
#
# NOTE: the dataset contains zero `*-duplicate-*` cases at writing time
# (verified via `ls /home/ddq/AoyangSpace/dataset/rca/ | grep duplicate`).
# All bands here are theoretical, derived from the netem mechanism +
# the by-construction severity ordering (lower-bound each band slightly
# below NetworkCorrupt's lower-bound). Once empirical samples land,
# revisit and tighten.
entry_signature:
  # Disjunction. NetworkDuplicate's protocol-level recovery is essentially
  # free (TCP de-dup at receiver), so the dominant abnormal-window signal
  # is request-volume drop / span silence rather than latency / timeout.
  # Bands sit slightly looser than NetworkCorrupt reflecting Loss >
  # Corrupt > Duplicate severity ordering.
  entry_window_sec: 30
  required_features: []
  optional_features:
    - kind: span
      feature: latency_p99_ratio
      band: [1.15, .inf]
      magnitude_source: theoretical
    - kind: span
      feature: timeout_rate
      band: [0.02, 1.0]
      magnitude_source: theoretical
    - kind: span
      feature: latency_p50_ratio
      band: [1.1, .inf]
      magnitude_source: theoretical
    - kind: span
      feature: silent
      band: [1.0, .inf]
      magnitude_source: theoretical
  optional_min_match: 1

# Cascade is the shallowest of the network family. TCP de-dup is local;
# transitive callers are essentially shielded. We keep layer 2 narrow
# and do not extend to layer 3.
derivation_layers:
  - layer: 1
    # Add `silent` as a cascade signal: even though TCP de-dup is local,
    # the bandwidth/CPU overhead of receiving 2x the packet rate slows
    # the network stack enough to stall trace-SDK emission on adjacent
    # RPCs. Empirically this is the most reliable signature given the
    # latency and error bands are at the noise floor for this fault.
    edge_kinds: [calls, includes, routes_to]
    edge_directions: [forward, forward, backward]
    expected_features:
      - kind: span
        feature: latency_p99_ratio
        band: [1.1, .inf]
        magnitude_decay: 0.7
      - kind: span
        feature: latency_p50_ratio
        band: [1.05, .inf]
        magnitude_decay: 0.7
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
    max_fanout: 32
  - layer: 2
    # Same physics-based addition as layer 1: trace-SDK stall on the slow
    # upstream RPC produces silence at the deeper caller; latency and
    # timeout bands are kept as parallel signals.
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: latency_p99_ratio
        band: [1.05, .inf]
        magnitude_decay: 0.5
      - kind: span
        feature: timeout_rate
        band: [0.02, 1.0]
        magnitude_decay: null
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
    max_fanout: 16
  - layer: 3
    # Layer 3 mirrors NetworkLoss / NetworkCorrupt layer-3 rationale:
    # reach the SLO surface in deep service trees. Bands are loosest of
    # the trio reflecting Loss > Corrupt > Duplicate severity ordering.
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.05, .inf]
        magnitude_decay: 0.4
      - kind: span
        feature: timeout_rate
        band: [0.02, 1.0]
        magnitude_decay: null
    max_fanout: 8
  - layer: 4
    # Layer 4 mirrors NetworkLoss / NetworkCorrupt layer-4: covers
    # gateway/ingress alarms in deep service trees. FP control via
    # alarm-terminate filter.
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.02, .inf]
        magnitude_decay: 0.3
      - kind: span
        feature: timeout_rate
        band: [0.02, 1.0]
        magnitude_decay: null
    max_fanout: 4

hand_offs: []

terminals: []

multi_v_root: true
