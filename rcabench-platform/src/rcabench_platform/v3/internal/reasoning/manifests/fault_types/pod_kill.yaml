fault_type_name: PodKill
target_kind: pod
seed_tier: unavailable
description: |
  Pod terminated abruptly by chaos-mesh. The pod's endpoints disappear from
  the service routing table; the deployment controller schedules a fresh
  replica but the original pod identity is gone. Inbound traffic to the
  killed pod's service drops to near zero during the kill window and
  callers observe immediate connection failures rather than slowdowns.

entry_signature:
  entry_window_sec: 30
  required_features:
    - kind: pod
      feature: unavailable
      band: [1.0, .inf]
      magnitude_source: theoretical
    - kind: service
      feature: silent
      band: [1.0, .inf]
      magnitude_source: empirical
  optional_features:
    - kind: span
      feature: connection_refused_rate
      band: [0.1, 1.0]
      magnitude_source: empirical
    - kind: span
      feature: error_rate
      band: [0.1, 1.0]
      magnitude_source: empirical
  optional_min_match: 0

derivation_layers:
  - layer: 1
    edge_kinds: [routes_to, includes]
    edge_directions: [backward, forward]
    expected_features:
      - kind: service
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16
  - layer: 2
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
      - kind: span
        feature: connection_refused_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 32
  - layer: 3
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16

hand_offs: []

terminals: []
