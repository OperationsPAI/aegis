fault_type_name: PodKill
target_kind: pod
seed_tier: unavailable
description: |
  Pod terminated abruptly by chaos-mesh. The pod's endpoints disappear from
  the service routing table; the deployment controller schedules a fresh
  replica but the original pod identity is gone. Inbound traffic to the
  killed pod's service drops to near zero during the kill window and
  callers observe immediate connection failures rather than slowdowns.

entry_signature:
  # Disjunction-of-symptoms: any one suffices. PodKill can present as
  # pod.unavailable (kubelet observed), service.silent (endpoint removed),
  # span.silent (caller-side observation), connection_refused (caller hits
  # closed port), or elevated error_rate (in-flight aborts). Phase 4-真-final
  # showed required-AND structure dropped recall to 0/75; loosen to template
  # used successfully by JVMMemoryStress.
  entry_window_sec: 30
  required_features: []
  optional_features:
    - kind: pod
      feature: unavailable
      band: [1.0, .inf]
      magnitude_source: theoretical
    - kind: service
      feature: silent
      band: [1.0, .inf]
      magnitude_source: empirical
    - kind: span
      feature: silent
      band: [1.0, .inf]
      magnitude_source: empirical
    - kind: span
      feature: connection_refused_rate
      band: [0.1, 1.0]
      magnitude_source: empirical
    - kind: span
      feature: error_rate
      band: [0.1, 1.0]
      magnitude_source: empirical
    - kind: pod
      feature: restart_count
      band: [1.0, .inf]
      magnitude_source: theoretical
  # Real cases co-fire multiple features; sham single-silent FPs eliminated.
  optional_min_match: 2

derivation_layers:
  - layer: 1
    edge_kinds: [routes_to, includes]
    edge_directions: [backward, forward]
    expected_features:
      - kind: service
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16
  - layer: 2
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
      - kind: span
        feature: connection_refused_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 32
  - layer: 3
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16

hand_offs: []

terminals: []
