# JVMCPUStress — Byteman/JVM-level CPU saturation on a method.
#
# Same OR-of-channels cascade pattern as CPUStress: silent | p99 | error
# | timeout. The cgroup-level cpu_throttle still anchors entry; the
# difference vs CPUStress is the saturation is JVM-internal so the
# entry uses optional cpu_throttle (not strictly required) — the
# Byteman injection may not always trip cgroup throttle if no limit
# was configured, and the IR adapter still labels the pod DEGRADED
# from cpu_limit_utilization.
fault_type_name: JVMCPUStress
target_kind: container
seed_tier: degraded
description: |
  JVM-level CPU saturation injected via Byteman, burning user-mode
  cycles inside the target method. Manifests as cpu_limit_utilization
  saturation at the cgroup boundary even though no cgroup throttle
  was configured. K8sMetricsAdapter labels the resulting state as
  pod.DEGRADED + high_cpu (see ir/adapters/k8s_metrics.py).

entry_signature:
  entry_window_sec: 30
  required_features: []
  optional_features:
    - kind: container
      feature: cpu_throttle_ratio
      band: [2.0, .inf]
      magnitude_source: empirical
    - kind: pod
      feature: cpu_throttle_ratio
      band: [2.0, .inf]
      magnitude_source: empirical
    - kind: span
      feature: silent
      band: [1.0, .inf]
      magnitude_source: empirical
    - kind: span
      feature: latency_p99_ratio
      band: [1.15, .inf]
      magnitude_source: empirical
    - kind: container
      feature: gc_pause_ratio
      band: [0.1, 1.0]
      magnitude_source: theoretical
  optional_min_match: 1

derivation_layers:
  - layer: 1
    edge_kinds: [runs, routes_to, includes]
    edge_directions: [backward, backward, forward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: service
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.15, .inf]
        magnitude_decay: 0.7
      - kind: pod
        feature: cpu_throttle_ratio
        band: [3.0, .inf]
        magnitude_decay: 1.0
    max_fanout: 32
  - layer: 2
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.1, .inf]
        magnitude_decay: 0.5
      - kind: span
        feature: timeout_rate
        band: [0.05, 1.0]
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
    max_fanout: 32
  - layer: 3
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.05, .inf]
        magnitude_decay: 0.3
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
    max_fanout: 16

hand_offs:
  - to: HTTPResponseAbort
    trigger:
      kind: span
      feature: timeout_rate
      threshold: 0.3
    on_layer: 2
    rationale: |
      JVM-level CPU burn inside the targeted method blocks request
      handling; persistent upstream latency past timeout budget
      surfaces as response-abort at far-downstream callers.

terminals: []
