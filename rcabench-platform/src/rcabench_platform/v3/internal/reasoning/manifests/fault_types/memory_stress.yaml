# MemoryStress — cgroup memory pressure on a container.
#
# Real cases corroborated against the 21 hotel-reserv MemoryStress cases
# in the AegisLab dataset and the 65 JVMMemoryStress legacy cases. The
# cascade outward depends on stress severity:
#
# * Severe: working_set saturates → OOM-killer terminates container OR
#   process becomes too slow to complete handlers → inbound spans go
#   silent (=1.0), upstream callers see timeout / error.
# * Mild: process keeps serving but with elevated GC pause / paging
#   stalls → p99 rise on inbound spans, transitive cascade upstream.
#
# Same OR-of-channels pattern as CPUStress: silent | p99 | error |
# timeout. The memory_usage_ratio entry anchor filters non-stress sham.
fault_type_name: MemoryStress
target_kind: container
seed_tier: degraded
description: |
  Container-level memory pressure injected via cgroup memory ballast.
  Pushes working_set toward limit; on saturation the kernel may
  invoke OOM-killer, which the IR adapter records as
  container.UNAVAILABLE with the oom_killed specialization label
  (see ir/adapters/jvm.py).

entry_signature:
  entry_window_sec: 30
  required_features:
    - kind: container
      feature: memory_usage_ratio
      band: [0.85, 1.0]
      magnitude_source: theoretical
  optional_features:
    - kind: span
      feature: silent
      band: [1.0, .inf]
      magnitude_source: empirical
    - kind: span
      feature: latency_p99_ratio
      band: [1.15, .inf]
      magnitude_source: empirical
    - kind: container
      feature: gc_pause_ratio
      band: [0.2, 1.0]
      magnitude_source: theoretical
  optional_min_match: 0

derivation_layers:
  - layer: 1
    edge_kinds: [runs, routes_to, includes]
    edge_directions: [backward, backward, forward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: service
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.15, .inf]
        magnitude_decay: 0.7
      - kind: pod
        feature: memory_usage_ratio
        band: [0.85, 1.0]
        magnitude_decay: 1.0
    max_fanout: 32
  - layer: 2
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.1, .inf]
        magnitude_decay: 0.5
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
      - kind: span
        feature: timeout_rate
        band: [0.05, 1.0]
    max_fanout: 32
  - layer: 3
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.05, .inf]
        magnitude_decay: 0.3
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
    max_fanout: 16

hand_offs:
  - to: ContainerKill
    trigger:
      kind: container
      feature: memory_usage_ratio
      threshold: 0.98
    on_layer: 1
    rationale: |
      When memory pressure saturates the cgroup limit, the kernel
      OOM-killer terminates the container. The IR's JvmAugmenterAdapter
      emits container.UNAVAILABLE with the oom_killed specialization
      label (see ir/adapters/jvm.py:OOM_METRICS), which is the entry
      signature of ContainerKill. This hand-off models the cascade
      MemoryStress -> OOM -> container kill explicitly.

terminals: []
