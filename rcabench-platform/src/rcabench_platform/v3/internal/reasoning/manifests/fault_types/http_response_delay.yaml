fault_type_name: HTTPResponseDelay
target_kind: service
seed_tier: slow
description: |
  Outbound HTTP response held by the chaos sidecar after the target
  service has produced it. Caller-side spans show inflated P99 latency
  (and possibly timeouts if the delay exceeds the caller's budget) but
  error rate stays low when callers tolerate the wait. Resource
  counters at the container/pod level are unaffected.

entry_signature:
  entry_window_sec: 30
  required_features:
    - kind: span
      feature: latency_p99_ratio
      band: [5.0, .inf]
      magnitude_source: theoretical
  optional_features:
    - kind: span
      feature: latency_p50_ratio
      band: [3.0, .inf]
      magnitude_source: theoretical
    - kind: span
      feature: timeout_rate
      band: [0.05, 1.0]
      magnitude_source: theoretical
  optional_min_match: 0

derivation_layers:
  - layer: 1
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: latency_p99_ratio
        band: [2.5, .inf]
        magnitude_decay: 0.5
      - kind: span
        feature: timeout_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16

hand_offs: []

terminals: []
