# CPUStress — cgroup CPU throttle on a container.
#
# Real cases corroborated against the 522-case aegislab dataset and the
# 2 JVMCPUStress legacy cases. cpu_throttle saturates well past 3.0
# (262× observed on hotel-reserv search). The cascade outward depends
# on stress severity:
#
# * Severe: container can't serve requests → its inbound spans appear
#   missing in abnormal traces (silent=1.0); upstream callers see
#   timeout / error.
# * Mild: container keeps serving but slowly → p99 rises on inbound
#   spans, then rises transitively at upstream callers.
#
# The manifest accepts both modalities via OR-of-channels at every
# cascade layer: silent | p99_ratio | error_rate | timeout_rate. The
# cpu_throttle entry signature is the strict anchor that filters out
# non-stress sham cases.
fault_type_name: CPUStress
target_kind: container
seed_tier: degraded
description: |
  Container-level CPU contention injected via cgroup CPU throttle.
  Throttling causes thread queue buildup that surfaces as either span
  silence (severe) or p99 latency rise (mild) on inbound spans handled
  by the affected container, with the cascade transitively touching
  upstream callers via the call graph.

entry_signature:
  entry_window_sec: 30
  required_features:
    - kind: container
      feature: cpu_throttle_ratio
      band: [3.0, .inf]
      magnitude_source: empirical
  optional_features:
    - kind: container
      feature: thread_queue_depth
      band: [2.0, .inf]
      magnitude_source: theoretical
    - kind: span
      feature: silent
      band: [1.0, .inf]
      magnitude_source: empirical
    - kind: span
      feature: latency_p99_ratio
      band: [1.15, .inf]
      magnitude_source: empirical
  optional_min_match: 1

derivation_layers:
  - layer: 1
    edge_kinds: [runs, routes_to, includes]
    edge_directions: [backward, backward, forward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: service
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.15, .inf]
        magnitude_decay: 0.7
      - kind: pod
        feature: cpu_throttle_ratio
        band: [3.0, .inf]
        magnitude_decay: 1.0
    max_fanout: 32
  - layer: 2
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.1, .inf]
        magnitude_decay: 0.5
      - kind: span
        feature: timeout_rate
        band: [0.05, 1.0]
    max_fanout: 32
  - layer: 3
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.05, .inf]
        magnitude_decay: 0.3
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
    max_fanout: 16

hand_offs:
  - to: HTTPResponseAbort
    trigger:
      kind: span
      feature: timeout_rate
      threshold: 0.3
    on_layer: 2
    rationale: |
      Persistent upstream latency past timeout budget produces
      response-abort symptoms at far-downstream callers.

terminals: []
