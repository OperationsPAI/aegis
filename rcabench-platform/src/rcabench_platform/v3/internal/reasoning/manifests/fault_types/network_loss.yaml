fault_type_name: NetworkLoss
target_kind: pod
seed_tier: degraded
description: |
  Pod-level packet loss injected via netem. A configured fraction of
  packets on the targeted interface are dropped; TCP recovers via
  retransmission, producing moderate latency increase plus a non-trivial
  timeout rate. Sample injections in the dataset use loss percentages
  ranging 53–97%, so the dominant signature is a clear timeout/error
  band on top of the latency lift, NOT pure latency. This is the most
  severe of the trio (Loss > Corrupt > Duplicate).

# Direction handling identical to network_delay.yaml:
#   "from" → egress; "to" → ingress; "both" → both.
# Symptom is on adjacent spans either way. Pod-level features (cpu,
# memory, throttle) do NOT fire; this is purely a transport-layer fault.
entry_signature:
  # Disjunction-of-symptoms. NetworkLoss varies in severity (53-97%) so any
  # one of timeout / latency_p99 / error_rate suffices; demanding all three
  # in conjunction dropped Phase 4-真-final recall well below acceptable.
  entry_window_sec: 30
  required_features: []
  optional_features:
    - kind: span
      feature: timeout_rate
      band: [0.05, 1.0]
      magnitude_source: empirical
    - kind: span
      feature: latency_p99_ratio
      band: [1.3, .inf]
      magnitude_source: empirical
    - kind: span
      feature: error_rate
      band: [0.05, 1.0]
      magnitude_source: empirical
    - kind: span
      feature: silent
      band: [1.0, .inf]
      magnitude_source: theoretical
  optional_min_match: 1

# Layer 1: directly-called services see the timeout/latency. Layer 2:
# transitive callers absorb retries; tail still propagates as elevated
# error rate when retry budget exhausts.
derivation_layers:
  - layer: 1
    # Add `silent` as alternative: when loss saturates, the few packets
    # that get through are FASTER (less queuing) so p99 ratio paradoxically
    # drops below 1.0. Adjacent spans look silent (timeline empty) — that
    # silence IS the cascade signal.
    edge_kinds: [calls, includes, routes_to]
    edge_directions: [forward, forward, backward]
    expected_features:
      - kind: span
        feature: timeout_rate
        band: [0.05, 1.0]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.2, .inf]
        magnitude_decay: 0.7
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
    max_fanout: 32
  - layer: 2
    # Add `silent` here: the deterministic surface of TCP retransmit-driven
    # slowdown at the upstream caller is a span-emission stall (request
    # volume drop or trace SDK queue clogged on the slow upstream RPC).
    # Real data: alarm spans 2 hops upstream consistently show silent=1.0
    # with error_rate/timeout_rate at zero (caller's retry succeeded),
    # so an error/timeout-only band leaves the cascade dead at layer 2.
    # Path-level FP control comes from the alarm-terminate filter — only
    # paths that land on a real alarm node survive.
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
      - kind: span
        feature: timeout_rate
        band: [0.02, 1.0]
        magnitude_decay: null
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.2, .inf]
        magnitude_decay: 0.5
    max_fanout: 16
  - layer: 3
    # Layer 3 reaches the SLO surface in deep service trees (e.g., otel-demo
    # has frontend-proxy → frontend → checkout, so the alarm at frontend-proxy
    # is 3-4 hops from a checkout-side injection). The cascade signature stays
    # the same: silence + latency lift at the ingress span, with error/
    # timeout firing only when the entry point itself surfaces a 5xx. Fanout
    # is tighter (8) because layer-2 already disambiguated.
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.02, 1.0]
        magnitude_decay: null
      - kind: span
        feature: timeout_rate
        band: [0.02, 1.0]
        magnitude_decay: null
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.15, .inf]
        magnitude_decay: 0.4
    max_fanout: 8
  - layer: 4
    # Layer 4 covers gateway/ingress alarms in systems with Next.js-style
    # route handlers (otel-demo: frontend-proxy → frontend POST → frontend
    # executing api route → frontend grpc). The fanout is tightest (4)
    # because at this depth the call graph has fanned in to the entry
    # span. Alarm-terminate filter at the propagator level drops any path
    # whose terminal isn't a real alarm node.
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.02, 1.0]
        magnitude_decay: null
      - kind: span
        feature: timeout_rate
        band: [0.02, 1.0]
        magnitude_decay: null
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.1, .inf]
        magnitude_decay: 0.3
    max_fanout: 4

# Within-family hand-off: when loss saturates (≥95%), recovery via
# retransmit is impossible and the link is functionally partitioned.
# Verification continues under NetworkPartition. No cross-family
# hand-offs are added — universal triggers (`silent`, `error_rate>0.2`)
# are already covered by HTTPResponseAbort/NetworkPartition manifests.
hand_offs:
  - to: NetworkPartition
    trigger:
      kind: span
      feature: timeout_rate
      threshold: 0.5
    on_layer: 1
    rationale: |
      When configured loss approaches 100% (sample injections include
      loss=97), TCP retransmits never succeed within window; adjacent
      spans show timeout_rate ≥ 0.5 indistinguishable from outright
      partition. Hand off so layer-2 verification reuses partition's
      silence-aware derivation.

terminals: []

multi_v_root: true
