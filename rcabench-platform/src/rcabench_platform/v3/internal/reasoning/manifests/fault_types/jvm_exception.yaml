fault_type_name: JVMException
target_kind: container
seed_tier: erroring
description: |
  JVM method-level exception injection: a specific Java method on the
  affected container is rewritten to throw a (typically RuntimeException-
  subclass) exception unconditionally. Inbound spans that route through the
  patched method are tagged ERROR; sibling methods on the same service are
  unaffected. Manifest matches at service granularity because the IR does
  not currently bucket spans by operation/method.

entry_signature:
  entry_window_sec: 30
  required_features: []
  optional_features:
    - kind: span
      feature: error_rate
      band: [0.10, 1.0]
      magnitude_source: empirical
    - kind: span
      feature: latency_p99_ratio
      band: [1.5, .inf]
      magnitude_source: empirical
    - kind: span
      feature: timeout_rate
      band: [0.05, 1.0]
      magnitude_source: theoretical
    - kind: container
      feature: cpu_throttle_ratio
      band: [1.5, .inf]
      magnitude_source: theoretical
  # Real cases co-fire ≥2 features (e.g., error + p99). Sham latency-alone
  # FPs eliminated.
  optional_min_match: 2

derivation_layers:
  - layer: 1
    edge_kinds: [calls, includes]
    edge_directions: [backward, backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.10, 1.0]
        magnitude_decay: null
      - kind: span
        feature: latency_p99_ratio
        band: [1.2, .inf]
        magnitude_decay: 0.6
    max_fanout: 16
  - layer: 2
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16

hand_offs:
  - to: HTTPResponseAbort
    trigger:
      kind: span
      feature: error_rate
      threshold: 0.5
    on_layer: 1
    rationale: |
      Empirical p5 of error_rate at the GT service is ~0.63 across five
      JVMException injection cases. When this saturates above 0.5 at the
      caller layer, downstream observers see response-abort symptoms;
      universal cross-family trigger.

terminals: []
