fault_type_name: PodFailure
target_kind: pod
seed_tier: unavailable
description: |
  Pod stops serving without termination: the process is alive but readiness
  probes fail, so the kubelet removes its endpoints from service routing.
  Unlike PodKill, no restart event is generated; the pod simply goes silent
  on the inbound channel for the duration of the injection.

entry_signature:
  # Disjunction-of-symptoms (see pod_kill.yaml rationale). PodFailure
  # differs from PodKill in producing no restart event, but the inbound
  # symptoms are otherwise identical, so the entry signature mirrors PodKill
  # minus restart_count.
  entry_window_sec: 30
  required_features: []
  optional_features:
    - kind: pod
      feature: unavailable
      band: [1.0, .inf]
      magnitude_source: theoretical
    - kind: service
      feature: silent
      band: [1.0, .inf]
      magnitude_source: empirical
    - kind: span
      feature: silent
      band: [1.0, .inf]
      magnitude_source: empirical
    - kind: span
      feature: connection_refused_rate
      band: [0.1, 1.0]
      magnitude_source: empirical
    - kind: span
      feature: error_rate
      band: [0.1, 1.0]
      magnitude_source: empirical
    - kind: span
      feature: timeout_rate
      band: [0.05, 1.0]
      magnitude_source: empirical
  optional_min_match: 1

derivation_layers:
  - layer: 1
    edge_kinds: [routes_to, includes]
    edge_directions: [backward, forward]
    expected_features:
      - kind: service
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16
  - layer: 2
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
      - kind: span
        feature: timeout_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 32
  - layer: 3
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: silent
        band: [1.0, .inf]
        magnitude_decay: null
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16

hand_offs: []

terminals: []

extension:
  max_extra_hops: 6
  max_frontier: 256
