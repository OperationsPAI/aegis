fault_type_name: HTTPResponsePatchBody
target_kind: service
seed_tier: erroring
description: |
  Outbound response body partially mangled (a JSON Patch / field rewrite)
  by the chaos sidecar. Effect is ambiguous: only callers that validate
  the affected fields will fail; others see normal 2xx responses. We
  expect modest error_rate uplift on caller spans at best. Sample
  population in the dataset is small (<3 cases), so all magnitudes are
  marked theoretical.

entry_signature:
  entry_window_sec: 30
  required_features:
    - kind: span
      feature: error_rate
      band: [0.1, 1.0]
      magnitude_source: theoretical
  optional_features:
    - kind: span
      feature: latency_p99_ratio
      band: [0.0, 3.0]
      magnitude_source: theoretical
  optional_min_match: 0

derivation_layers:
  - layer: 1
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16

hand_offs: []

terminals: []
