fault_type_name: JVMMySQLLatency
target_kind: container
seed_tier: slow
description: |
  JVM-side JDBC latency injection: only spans crossing the JDBC call boundary
  on the affected container experience artificial latency (display_config
  field latency_ms, observed value 3669 ms in the single dataset case).
  Methods that do not touch the DB are unaffected, so the entry signature
  is scoped to the GT service AND must coexist with DB-touching span context.
  Bands are theoretical because <3 sample cases exist for this fault type.

entry_signature:
  entry_window_sec: 30
  required_features: []
  optional_features:
    - kind: span
      feature: latency_p99_ratio
      band: [2.0, .inf]
      magnitude_source: theoretical
    - kind: span
      feature: latency_p50_ratio
      band: [1.5, .inf]
      magnitude_source: theoretical
    - kind: span
      feature: timeout_rate
      band: [0.05, 1.0]
      magnitude_source: theoretical
    - kind: span
      feature: error_rate
      band: [0.05, 1.0]
      magnitude_source: theoretical
  optional_min_match: 1

derivation_layers:
  - layer: 1
    edge_kinds: [calls, includes]
    edge_directions: [backward, backward]
    expected_features:
      - kind: span
        feature: latency_p99_ratio
        band: [2.0, .inf]
        magnitude_decay: 0.4
      - kind: span
        feature: timeout_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16
  - layer: 2
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: latency_p99_ratio
        band: [1.3, .inf]
        magnitude_decay: 0.5
      - kind: span
        feature: error_rate
        band: [0.05, 1.0]
        magnitude_decay: null
    max_fanout: 16

hand_offs:
  - to: HTTPResponseDelay
    trigger:
      kind: span
      feature: latency_p99_ratio
      threshold: 10.0
    on_layer: 1
    rationale: |
      Sustained high upstream latency past timeout budgets surfaces at far
      callers as response-delay symptoms. Mirrors the JVMLatency hand-off
      since the cascade signature is identical once the DB-touch context is
      lost downstream.

terminals: []

extension:
  max_extra_hops: 6
  max_frontier: 256

corroborator:
  kind: span
  feature: request_count_ratio
  band: [0.0, 0.7]
