fault_type_name: HTTPRequestReplaceMethod
target_kind: service
seed_tier: erroring
description: |
  Inbound HTTP method mangled by the chaos sidecar (e.g., POST → PUT) so
  the target service returns 405 Method Not Allowed (or 404 if no route
  matches). Errors are immediate; latency is unchanged. No 4xx-specific
  span feature in the vocabulary, so error_rate is used (see evidence MD).

entry_signature:
  entry_window_sec: 30
  required_features:
    - kind: span
      feature: error_rate
      band: [0.08, 1.0]
      magnitude_source: empirical
  optional_features:
    - kind: span
      feature: latency_p99_ratio
      band: [0.0, 2.0]
      magnitude_source: theoretical
  optional_min_match: 0

derivation_layers:
  - layer: 1
    edge_kinds: [calls]
    edge_directions: [backward]
    expected_features:
      - kind: span
        feature: error_rate
        band: [0.08, 1.0]
        magnitude_decay: null
    max_fanout: 16

hand_offs: []

terminals: []

extension:
  max_extra_hops: 4
  max_frontier: 256
  requires_strict_anchor: true
