          description: API key enabled successfully
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "404":
          description: API key not found
          schema:
