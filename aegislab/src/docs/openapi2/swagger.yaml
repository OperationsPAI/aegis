        "404":
          description: Not found
          schema:
            type: string
        "410":
          description: Share link no longer available
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Resolve a public share link
      tags:
      - Share
  /token:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: OIDC token endpoint. Authenticates the client via Basic auth or
        `client_id`/`client_secret` form fields and dispatches on `grant_type` (`authorization_code`,
        `refresh_token`, `client_credentials`, `password`).
      operationId: oidc_token
      parameters:
      - description: OAuth2 grant type
        in: formData
        name: grant_type
        required: true
        type: string
      - description: Authorization code (for `authorization_code`)
        in: formData
        name: code
        type: string
      - description: Redirect URI used at /authorize
        in: formData
        name: redirect_uri
        type: string
      - description: PKCE code verifier
        in: formData
        name: code_verifier
        type: string
      - description: Refresh token (for `refresh_token`)
        in: formData
        name: refresh_token
        type: string
      - description: Username (for `password`)
        in: formData
        name: username
        type: string
      - description: Password (for `password`)
        in: formData
        name: password
        type: string
      - description: Client id (when not using Basic auth)
        in: formData
        name: client_id
        type: string
      - description: Client secret (when not using Basic auth)
        in: formData
        name: client_secret
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token response
