        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "404":
          description: API key not found
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
      security:
      - BearerAuth: []
      summary: Rotate API key secret
      tags:
      - Authentication
      x-api-type:
        portal: "true"
  /api/v2/auth/api-key/token:
    post:
      description: Exchange a signed Key ID / Key Secret request for a short-lived
        bearer token. SDK and CLI callers sign `METHOD\\nPATH\\nTIMESTAMP\\nNONCE\\nSHA256(BODY)`
        with the key secret and send the result via `X-Key-Id`, `X-Timestamp`, `X-Nonce`,
        and `X-Signature`.
      operationId: exchange_api_key_token
      parameters:
      - description: Public key identifier
        in: header
        name: X-Key-Id
        required: true
        type: string
      - description: Unix timestamp in seconds
        in: header
        name: X-Timestamp
        required: true
        type: string
      - description: Unique request nonce
        in: header
        name: X-Nonce
        required: true
        type: string
      - description: |-
          Hex encoded HMAC-SHA256 signature of METHOD\
          PATH\
          TIMESTAMP\
          NONCE\
          SHA256(BODY)
        in: header
        name: X-Signature
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: API key token issued successfully
          schema:
            $ref: '#/definitions/dto.GenericResponse-auth_APIKeyTokenResp'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "401":
          description: Invalid signature or replayed request
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
      summary: Exchange API key for token
      tags:
      - Authentication
      x-api-type:
        sdk: "true"
  /api/v2/auth/change-password:
