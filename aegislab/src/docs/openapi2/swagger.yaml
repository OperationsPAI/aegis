  /authorize:
    get:
      description: Standard OIDC authorize endpoint. Validates `client_id`, `redirect_uri`,
        `response_type=code`, and (for public clients) PKCE; either renders the inline
        login form or 302-redirects to the configured `sso.login_redirect` console
        URL with the OIDC params preserved.
      operationId: oidc_authorize
      parameters:
      - description: OIDC client_id
        in: query
        name: client_id
        required: true
        type: string
      - description: Registered redirect URI
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: Must be `code`
        in: query
        name: response_type
        required: true
        type: string
      - description: Opaque state echoed back to redirect_uri
        in: query
        name: state
        type: string
      - description: Requested scope
        in: query
        name: scope
        type: string
      - description: PKCE code challenge (required for public clients)
        in: query
        name: code_challenge
        type: string
      - description: PKCE method (`S256` or `plain`)
        in: query
        name: code_challenge_method
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Inline login HTML
          schema:
            type: string
        "302":
          description: Redirect to configured login UI
          schema:
            type: string
        "400":
          description: Invalid request
          schema:
            type: string
      summary: OIDC authorize endpoint
      tags:
      - OIDC
  /login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticate the resource owner from the inline authorize form
        (or the console hand-off), persist the auth request, and 302-redirect back
        to the relying party with `code` and `state`.
      operationId: oidc_inline_login
      parameters:
      - description: OIDC client_id
        in: formData
        name: client_id
        required: true
        type: string
      - description: Registered redirect URI
        in: formData
        name: redirect_uri
        required: true
        type: string
      - description: Opaque state echoed back
        in: formData
        name: state
        type: string
      - description: Requested scope
        in: formData
        name: scope
        type: string
      - description: Username or email
        in: formData
        name: username
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      - description: PKCE code challenge
        in: formData
        name: code_challenge
        type: string
      - description: PKCE method
        in: formData
        name: code_challenge_method
        type: string
      responses:
        "302":
          description: Redirect to relying party with code
          schema:
            type: string
        "400":
          description: Invalid client or redirect
          schema:
            type: string
        "401":
          description: Invalid credentials
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: SSO inline login
      tags:
      - OIDC
  /s/{code}:
    get:
      description: Public unauthenticated entry point. Either redirects (302) to a
        presigned URL or streams the file bytes directly.
      operationId: share_redirect
      parameters:
      - description: Share short code
        in: path
        name: code
        required: true
