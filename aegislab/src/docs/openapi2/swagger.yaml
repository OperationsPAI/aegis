host: http://localhost:8082
info:
  contact:
    email: team@rcabench.com
    name: RCABench Team
  description: RCABench - A comprehensive root cause analysis benchmarking platform
    for microservices
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: RCABench API
  version: 1.0.0
paths:
  /.well-known/jwks.json:
    get:
      description: Public key set (JWKS) for verifying SSO-issued JWTs.
      operationId: oidc_jwks
      produces:
      - application/json
      responses:
        "200":
          description: JWKS document
          schema:
            additionalProperties: true
            type: object
      summary: JWKS
      tags:
      - OIDC
  /.well-known/openid-configuration:
    get:
      description: OIDC 1.0 discovery metadata for the SSO issuer (endpoints, supported
        grants, scopes, signing algs).
      operationId: oidc_discovery
      produces:
      - application/json
      responses:
        "200":
          description: Discovery document
          schema:
            additionalProperties: true
            type: object
      summary: OIDC discovery document
      tags:
      - OIDC
  /api/v2/admin/chaos/prune:
    post:
      consumes:
      - application/json
      description: |-
        Find and (optionally) delete chaos-mesh CRs whose backing
        injection task is in a terminal state or no longer exists.
        Defaults to dry-run; pass `"dry_run": false` to actually
        delete. Admin-only.
      operationId: prune_chaos
      parameters:
      - description: Prune parameters
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/chaosprune.PruneReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GenericResponse-chaosprune_PruneResp'
      security:
      - BearerAuth: []
      summary: Prune orphaned chaos-mesh CRs
      tags:
      - ChaosPrune
  /api/v2/api-keys:
    get:
      description: List Key ID / Key Secret credentials owned by the current authenticated
        user
      operationId: list_api_keys
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: API keys listed successfully
          schema:
            $ref: '#/definitions/dto.GenericResponse-auth_ListAPIKeyResp'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - Authentication
      x-api-type:
        portal: "true"
    post:
      consumes:
      - application/json
      description: Create a Key ID / Key Secret credential for the current authenticated
        user. This Portal response is the only time the `key_secret` is returned in
        plaintext, so callers must save it immediately.
      operationId: create_api_key
      parameters:
      - description: API key create request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.CreateAPIKeyReq'
      produces:
      - application/json
      responses:
        "201":
          description: API key created successfully
          schema:
            $ref: '#/definitions/dto.GenericResponse-auth_APIKeyWithSecretResp'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
      security:
      - BearerAuth: []
      summary: Create API key
      tags:
      - Authentication
      x-api-type:
        portal: "true"
  /api/v2/api-keys/{id}:
    delete:
      description: Delete a Key ID / Key Secret credential owned by the current authenticated
        user
      operationId: delete_api_key
      parameters:
      - description: API key record ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: API key deleted successfully
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "404":
          description: API key not found
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
      security:
      - BearerAuth: []
      summary: Delete API key
      tags:
      - Authentication
      x-api-type:
        portal: "true"
    get:
      description: Get metadata for a Key ID / Key Secret credential owned by the
        current authenticated user
      operationId: get_api_key
      parameters:
      - description: API key record ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: API key detail retrieved successfully
          schema:
            $ref: '#/definitions/dto.GenericResponse-auth_APIKeyInfo'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "404":
          description: API key not found
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
      security:
      - BearerAuth: []
      summary: Get API key detail
      tags:
      - Authentication
      x-api-type:
        portal: "true"
  /api/v2/api-keys/{id}/disable:
    post:
      description: Disable a Key ID / Key Secret credential owned by the current authenticated
