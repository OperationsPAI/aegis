      x-api-type:
        portal: "true"
  /api/v2/api-keys/{id}/rotate:
    post:
      description: Rotate the key secret half of a Key ID / Key Secret credential
        owned by the current authenticated user
      operationId: rotate_api_key
      parameters:
      - description: API key record ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
