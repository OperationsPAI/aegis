  /api/v2/api-keys/{id}/revoke:
    post:
      description: Permanently revoke a Key ID / Key Secret credential owned by the
        current authenticated user. Revoked API keys can no longer be re-enabled or
        used to exchange bearer tokens.
      operationId: revoke_api_key
      parameters:
      - description: API key record ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: API key revoked successfully
          schema:
            $ref: '#/definitions/dto.GenericResponse-any'
        "401":
          description: Authentication required
          schema:
