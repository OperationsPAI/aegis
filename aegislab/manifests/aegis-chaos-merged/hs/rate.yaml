apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "rate"
  system: "hs"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "rate"
        namespace: "hs"
    - capability: "pod_failure"
      target:
        app: "rate"
        namespace: "hs"
    - capability: "container_kill"
      target:
        app: "rate"
        container: "rate"
        namespace: "hs"
    - capability: "cpu_stress"
      target:
        app: "rate"
        container: "rate"
        namespace: "hs"
    - capability: "time_skew"
      target:
        app: "rate"
        container: "rate"
        namespace: "hs"
    - capability: "http_request_delay"
      target:
        app: "rate"
        method: "POST"
        namespace: "hs"
        path: "/rate.Rate/GetRates"
        server_address: "rate"
    - capability: "http_request_abort"
      target:
        app: "rate"
        method: "POST"
        namespace: "hs"
        path: "/rate.Rate/GetRates"
        server_address: "rate"
