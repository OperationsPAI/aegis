apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "shipping"
  system: "sockshop"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "shipping"
        namespace: "sockshop"
    - capability: "pod_failure"
      target:
        app: "shipping"
        namespace: "sockshop"
    - capability: "container_kill"
      target:
        app: "shipping"
        container: "shipping"
        namespace: "sockshop"
    - capability: "cpu_stress"
      target:
        app: "shipping"
        container: "shipping"
        namespace: "sockshop"
    - capability: "time_skew"
      target:
        app: "shipping"
        container: "shipping"
        namespace: "sockshop"
    - capability: "http_request_delay"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
        server_address: "shipping"
        span_name: "GET /"
    - capability: "http_request_abort"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
        server_address: "shipping"
        span_name: "GET /"
    - capability: "http_response_abort"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
    - capability: "http_response_delay"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
    - capability: "http_response_replace_code"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
    - capability: "http_response_patch_body"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
    - capability: "http_response_replace_body"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
    - capability: "http_request_replace_method"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
    - capability: "http_request_replace_path"
      target:
        app: "shipping"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 6676
