# Prometheus configuration for aegislab local development
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Loki metrics
  - job_name: "loki"
    static_configs:
      - targets: ["localhost:3100"]
        labels:
          instance: "loki-dev"

  # Alloy discovery for self-monitoring
  - job_name: "alloy-discovery"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["exp"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_container_name]
        action: keep
        regex: alloy-daemon
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        target_label: __address__
        replacement: $1:12345
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance