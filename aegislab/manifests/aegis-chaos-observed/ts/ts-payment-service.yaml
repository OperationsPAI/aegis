apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "ts-payment-service"
  system: "ts"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "ts-payment-service"
        namespace: "ts"
    - capability: "pod_failure"
      target:
        app: "ts-payment-service"
        namespace: "ts"
    - capability: "container_kill"
      target:
        app: "ts-payment-service"
        container: "ts-payment-service"
        namespace: "ts"
    - capability: "cpu_stress"
      target:
        app: "ts-payment-service"
        container: "ts-payment-service"
        namespace: "ts"
    - capability: "time_skew"
      target:
        app: "ts-payment-service"
        container: "ts-payment-service"
        namespace: "ts"
    - capability: "http_request_delay"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
        server_address: "ts-payment-service"
        span_name: "POST /api/v1/paymentservice/payment"
    - capability: "http_request_abort"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
        server_address: "ts-payment-service"
        span_name: "POST /api/v1/paymentservice/payment"
    - capability: "http_response_abort"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "ts-payment-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/paymentservice/payment"
        port: 8080
    - capability: "network_delay"
      target:
        namespace: "ts"
        source_app: "ts-payment-service"
        target_service: "mysql"
    - capability: "network_loss"
      target:
        namespace: "ts"
        source_app: "ts-payment-service"
        target_service: "mysql"
    - capability: "network_duplicate"
      target:
        namespace: "ts"
        source_app: "ts-payment-service"
        target_service: "mysql"
    - capability: "network_corrupt"
      target:
        namespace: "ts"
        source_app: "ts-payment-service"
        target_service: "mysql"
    - capability: "network_bandwidth"
      target:
        namespace: "ts"
        source_app: "ts-payment-service"
        target_service: "mysql"
    - capability: "network_partition"
      target:
        namespace: "ts"
        source_app: "ts-payment-service"
        target_service: "mysql"
    - capability: "jvm_mysql_latency"
      target:
        app: "ts-payment-service"
        db_name: "ts"
        namespace: "ts"
        sql_type: "select"
        table: "payment"
    - capability: "jvm_mysql_exception"
      target:
        app: "ts-payment-service"
        db_name: "ts"
        namespace: "ts"
        sql_type: "select"
        table: "payment"
    - capability: "jvm_mysql_latency"
      target:
        app: "ts-payment-service"
        db_name: "ts"
        namespace: "ts"
        sql_type: "insert"
        table: "payment"
    - capability: "jvm_mysql_exception"
      target:
        app: "ts-payment-service"
        db_name: "ts"
        namespace: "ts"
        sql_type: "insert"
        table: "payment"
