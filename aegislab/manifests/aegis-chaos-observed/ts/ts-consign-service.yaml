        method: "PUT"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns"
        port: 8080
    - capability: "dns_error"
      target:
        app: "ts-consign-service"
        domain_patterns:
          - "ts-consign-price-service"
        namespace: "ts"
    - capability: "dns_random"
      target:
        app: "ts-consign-service"
        domain_patterns:
          - "ts-consign-price-service"
        namespace: "ts"
    - capability: "network_delay"
      target:
        namespace: "ts"
        source_app: "ts-consign-service"
        span_names:
          - "GET /api/v1/consignpriceservice/consignprice/{weight}/{isWithinRegion}"
        target_service: "ts-consign-price-service"
    - capability: "network_loss"
      target:
