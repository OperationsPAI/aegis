      target:
        app: "ts-consign-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns/account/{id}"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "ts-consign-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns/account/{id}"
        port: 8080
    - capability: "http_request_delay"
