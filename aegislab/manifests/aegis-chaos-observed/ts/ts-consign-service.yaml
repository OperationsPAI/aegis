apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "ts-consign-service"
  system: "ts"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "ts-consign-service"
        namespace: "ts"
    - capability: "pod_failure"
      target:
        app: "ts-consign-service"
        namespace: "ts"
    - capability: "container_kill"
      target:
        app: "ts-consign-service"
        container: "ts-consign-service"
        namespace: "ts"
    - capability: "cpu_stress"
      target:
        app: "ts-consign-service"
        container: "ts-consign-service"
        namespace: "ts"
    - capability: "time_skew"
      target:
        app: "ts-consign-service"
        container: "ts-consign-service"
        namespace: "ts"
    - capability: "http_request_delay"
      target:
        app: "ts-consign-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns/account/{id}"
        port: 8080
        server_address: "ts-consign-service"
        span_name: "GET /api/v1/consignservice/consigns/account/{id}"
    - capability: "http_request_abort"
      target:
        app: "ts-consign-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns/account/{id}"
        port: 8080
        server_address: "ts-consign-service"
        span_name: "GET /api/v1/consignservice/consigns/account/{id}"
    - capability: "http_response_abort"
      target:
        app: "ts-consign-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns/account/{id}"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "ts-consign-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns/account/{id}"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "ts-consign-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns/account/{id}"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "ts-consign-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/consignservice/consigns/account/{id}"
        port: 8080
