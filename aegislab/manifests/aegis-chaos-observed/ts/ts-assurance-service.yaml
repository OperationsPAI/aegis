apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "ts-assurance-service"
  system: "ts"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "ts-assurance-service"
        namespace: "ts"
    - capability: "pod_failure"
      target:
        app: "ts-assurance-service"
        namespace: "ts"
    - capability: "container_kill"
      target:
        app: "ts-assurance-service"
        container: "ts-assurance-service"
        namespace: "ts"
    - capability: "cpu_stress"
      target:
        app: "ts-assurance-service"
        container: "ts-assurance-service"
        namespace: "ts"
    - capability: "time_skew"
      target:
        app: "ts-assurance-service"
        container: "ts-assurance-service"
        namespace: "ts"
    - capability: "http_request_delay"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
        server_address: "ts-assurance-service"
        span_name: "GET /api/v1/assuranceservice/assurances/types"
    - capability: "http_request_abort"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
        server_address: "ts-assurance-service"
        span_name: "GET /api/v1/assuranceservice/assurances/types"
    - capability: "http_response_abort"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/types"
        port: 8080
    - capability: "http_request_delay"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
        server_address: "ts-assurance-service"
        span_name: "GET /api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
    - capability: "http_request_abort"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
        server_address: "ts-assurance-service"
        span_name: "GET /api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
    - capability: "http_response_abort"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "ts-assurance-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/assuranceservice/assurances/{typeIndex}/{orderId}"
        port: 8080
