apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "text-service"
  system: "media"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "text-service"
        namespace: "media"
    - capability: "pod_failure"
      target:
        app: "text-service"
        namespace: "media"
    - capability: "container_kill"
      target:
        app: "text-service"
        container: "text-service"
        namespace: "media"
    - capability: "cpu_stress"
      target:
        app: "text-service"
        container: "text-service"
        namespace: "media"
    - capability: "time_skew"
      target:
        app: "text-service"
        container: "text-service"
        namespace: "media"
    - capability: "http_request_delay"
      target:
        app: "text-service"
        method: "POST"
        namespace: "media"
        path: "/TextService/UploadText"
        server_address: "text-service"
    - capability: "http_request_abort"
      target:
        app: "text-service"
        method: "POST"
        namespace: "media"
        path: "/TextService/UploadText"
        server_address: "text-service"
    - capability: "dns_error"
      target:
        app: "text-service"
        domain_patterns:
          - "compose-review-service"
        namespace: "media"
    - capability: "dns_random"
      target:
        app: "text-service"
        domain_patterns:
          - "compose-review-service"
        namespace: "media"
    - capability: "network_delay"
      target:
        namespace: "media"
        source_app: "text-service"
        span_names:
          - "UploadText"
        target_service: "compose-review-service"
    - capability: "network_loss"
      target:
        namespace: "media"
        source_app: "text-service"
        span_names:
          - "UploadText"
        target_service: "compose-review-service"
    - capability: "network_duplicate"
      target:
        namespace: "media"
        source_app: "text-service"
        span_names:
          - "UploadText"
        target_service: "compose-review-service"
    - capability: "network_corrupt"
      target:
        namespace: "media"
        source_app: "text-service"
        span_names:
          - "UploadText"
        target_service: "compose-review-service"
    - capability: "network_bandwidth"
      target:
        namespace: "media"
        source_app: "text-service"
        span_names:
          - "UploadText"
        target_service: "compose-review-service"
    - capability: "network_partition"
      target:
        namespace: "media"
        source_app: "text-service"
        span_names:
          - "UploadText"
        target_service: "compose-review-service"
