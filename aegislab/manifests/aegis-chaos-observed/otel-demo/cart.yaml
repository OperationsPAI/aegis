apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "cart"
  system: "otel-demo"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "cart"
        namespace: "otel-demo"
    - capability: "pod_failure"
      target:
        app: "cart"
        namespace: "otel-demo"
    - capability: "container_kill"
      target:
        app: "cart"
        container: "cart"
        namespace: "otel-demo"
    - capability: "cpu_stress"
      target:
        app: "cart"
        container: "cart"
        namespace: "otel-demo"
    - capability: "time_skew"
      target:
        app: "cart"
        container: "cart"
        namespace: "otel-demo"
    - capability: "http_request_delay"
      target:
        app: "cart"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/GetCart"
        port: 8080
        server_address: "cart"
        span_name: "POST /oteldemo.CartService/GetCart"
    - capability: "http_request_abort"
      target:
        app: "cart"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/GetCart"
        port: 8080
        server_address: "cart"
        span_name: "POST /oteldemo.CartService/GetCart"
    - capability: "http_request_delay"
      target:
        app: "cart"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/AddItem"
        port: 8080
        server_address: "cart"
        span_name: "POST /oteldemo.CartService/AddItem"
    - capability: "http_request_abort"
      target:
        app: "cart"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/AddItem"
        port: 8080
        server_address: "cart"
        span_name: "POST /oteldemo.CartService/AddItem"
    - capability: "http_request_delay"
      target:
        app: "cart"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/EmptyCart"
        port: 8080
        server_address: "cart"
        span_name: "POST /oteldemo.CartService/EmptyCart"
    - capability: "http_request_abort"
      target:
        app: "cart"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/EmptyCart"
        port: 8080
        server_address: "cart"
        span_name: "POST /oteldemo.CartService/EmptyCart"
    - capability: "dns_error"
      target:
        app: "cart"
        domain_patterns:
          - "flagd"
        namespace: "otel-demo"
    - capability: "dns_random"
      target:
        app: "cart"
        domain_patterns:
          - "flagd"
        namespace: "otel-demo"
    - capability: "network_delay"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        span_names:
          - "flagd.evaluation.v1.Service/ResolveBoolean"
        target_service: "flagd"
    - capability: "network_loss"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        span_names:
          - "flagd.evaluation.v1.Service/ResolveBoolean"
        target_service: "flagd"
    - capability: "network_duplicate"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        span_names:
          - "flagd.evaluation.v1.Service/ResolveBoolean"
        target_service: "flagd"
    - capability: "network_corrupt"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        span_names:
          - "flagd.evaluation.v1.Service/ResolveBoolean"
        target_service: "flagd"
    - capability: "network_bandwidth"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        span_names:
          - "flagd.evaluation.v1.Service/ResolveBoolean"
        target_service: "flagd"
    - capability: "network_partition"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        span_names:
          - "flagd.evaluation.v1.Service/ResolveBoolean"
        target_service: "flagd"
    - capability: "network_delay"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        target_service: "valkey-cart"
    - capability: "network_loss"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        target_service: "valkey-cart"
    - capability: "network_duplicate"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        target_service: "valkey-cart"
    - capability: "network_corrupt"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        target_service: "valkey-cart"
    - capability: "network_bandwidth"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        target_service: "valkey-cart"
    - capability: "network_partition"
      target:
        namespace: "otel-demo"
        source_app: "cart"
        target_service: "valkey-cart"
