apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "image-provider"
  system: "otel-demo"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "image-provider"
        namespace: "otel-demo"
    - capability: "pod_failure"
      target:
        app: "image-provider"
        namespace: "otel-demo"
    - capability: "container_kill"
      target:
        app: "image-provider"
        container: "image-provider"
        namespace: "otel-demo"
    - capability: "cpu_stress"
      target:
        app: "image-provider"
        container: "image-provider"
        namespace: "otel-demo"
    - capability: "time_skew"
      target:
        app: "image-provider"
        container: "image-provider"
        namespace: "otel-demo"
    - capability: "http_request_delay"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
        server_address: "image-provider"
        span_name: "image-provider"
    - capability: "http_request_abort"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
        server_address: "image-provider"
        span_name: "image-provider"
    - capability: "http_response_abort"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
    - capability: "http_response_delay"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
    - capability: "http_response_replace_code"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
    - capability: "http_response_patch_body"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
    - capability: "http_response_replace_body"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
    - capability: "http_request_replace_method"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
    - capability: "http_request_replace_path"
      target:
        app: "image-provider"
        method: "GET"
        namespace: "otel-demo"
        path: "/status"
        port: 8081
