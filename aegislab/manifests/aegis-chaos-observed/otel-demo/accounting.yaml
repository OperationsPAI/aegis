apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "accounting"
  system: "otel-demo"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "accounting"
        namespace: "otel-demo"
    - capability: "pod_failure"
      target:
        app: "accounting"
        namespace: "otel-demo"
    - capability: "container_kill"
      target:
        app: "accounting"
        container: "accounting"
        namespace: "otel-demo"
    - capability: "cpu_stress"
      target:
        app: "accounting"
        container: "accounting"
        namespace: "otel-demo"
    - capability: "time_skew"
      target:
        app: "accounting"
        container: "accounting"
        namespace: "otel-demo"
    - capability: "network_delay"
      target:
        namespace: "otel-demo"
        source_app: "accounting"
        target_service: "postgresql"
    - capability: "network_loss"
      target:
        namespace: "otel-demo"
        source_app: "accounting"
        target_service: "postgresql"
    - capability: "network_duplicate"
      target:
        namespace: "otel-demo"
        source_app: "accounting"
        target_service: "postgresql"
    - capability: "network_corrupt"
      target:
        namespace: "otel-demo"
        source_app: "accounting"
        target_service: "postgresql"
    - capability: "network_bandwidth"
      target:
        namespace: "otel-demo"
        source_app: "accounting"
        target_service: "postgresql"
    - capability: "network_partition"
      target:
        namespace: "otel-demo"
        source_app: "accounting"
        target_service: "postgresql"
