global:
  imageRegistry: pair-diag-cn-guangzhou.cr.volces.com
  images:
    rcabench:
      name: pair/rcabench
      tag: "1.0.0"

images:
  busybox:
    name: pair/busybox
  buildkit:
    name: pair/buildkit
  init_data:
    name: pair/init-data

buildkit:
  enabled: false

harbor:
  enabled: false

initialization:
  initDrainTemplate:
    image:
      name: pair/init-drain-template

  initHelmCharts:
    image:
      name: pair/init-helm-charts

configmap:
  system:
    env_mode: "prod"
  k8s:
    init_container:
      busybox_image: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox:1.35

persistence:
  storageType: volcengine

mysql:
  image:
    name: pair/mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  persistence:
    storageClass: rcabench

# redis subchart overrides (mirrors legacy images.redis + persistence.redis).
redis:
  image:
    name: pair/redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent
  persistence:
    storageClass: rcabench

# etcd subchart overrides (mirrors legacy images.etcd + persistence.etcd).
etcd:
  image:
    name: pair/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
  persistence:
    storageClass: rcabench
