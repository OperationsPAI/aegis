apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "auth"
  system: "teastore"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "auth"
        container: "teastore-auth"
        namespace: "teastore"
    - capability: "cpu_stress"
      target:
        app: "auth"
        container: "teastore-auth"
        namespace: "teastore"
    - capability: "http_request_abort"
      target:
        app: "auth"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.registry/rest/services/tools.descartes.teastore.persistence/"
        port: 8080
        server_address: "teastore-registry"
        span_name: "GET"
    - capability: "http_request_abort"
      target:
        app: "auth"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.auth/rest/cart/add/*"
        port: 8080
        server_address: "teastore-auth"
        span_name: "POST /tools.descartes.teastore.auth/rest/cart/add/{pid}"
    - capability: "http_request_abort"
      target:
        app: "auth"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.auth/rest/useractions/isloggedin"
        port: 8080
        server_address: "teastore-auth"
        span_name: "POST /tools.descartes.teastore.auth/rest/useractions/isloggedin"
    - capability: "http_request_abort"
      target:
        app: "auth"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.auth/rest/useractions/login"
        port: 8080
        server_address: "teastore-auth"
        span_name: "POST /tools.descartes.teastore.auth/rest/useractions/login"
    - capability: "http_request_abort"
      target:
        app: "auth"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.auth/rest/useractions/logout"
        port: 8080
        server_address: "teastore-auth"
        span_name: "POST /tools.descartes.teastore.auth/rest/useractions/logout"
    - capability: "http_request_abort"
      target:
        app: "auth"
        method: "PUT"
        namespace: "teastore"
        path: "/tools.descartes.teastore.registry/rest/services/tools.descartes.teastore.auth/teastore-auth-0.teastore-auth"
        port: 8080
        server_address: "teastore-registry"
        span_name: "PUT"
    - capability: "http_request_delay"
      target:
        app: "auth"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.registry/rest/services/tools.descartes.teastore.persistence/"
        port: 8080
        server_address: "teastore-registry"
        span_name: "GET"
    - capability: "http_request_delay"
      target:
        app: "auth"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.auth/rest/cart/add/*"
        port: 8080
        server_address: "teastore-auth"
        span_name: "POST /tools.descartes.teastore.auth/rest/cart/add/{pid}"
    - capability: "http_request_delay"
      target:
        app: "auth"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.auth/rest/useractions/isloggedin"
        port: 8080
        server_address: "teastore-auth"
        span_name: "POST /tools.descartes.teastore.auth/rest/useractions/isloggedin"
    - capability: "http_request_delay"
      target:
        app: "auth"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.auth/rest/useractions/login"
        port: 8080
        server_address: "teastore-auth"
        span_name: "POST /tools.descartes.teastore.auth/rest/useractions/login"
    - capability: "http_request_delay"
      target:
        app: "auth"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.auth/rest/useractions/logout"
        port: 8080
        server_address: "teastore-auth"
        span_name: "POST /tools.descartes.teastore.auth/rest/useractions/logout"
    - capability: "http_request_delay"
      target:
        app: "auth"
        method: "PUT"
        namespace: "teastore"
        path: "/tools.descartes.teastore.registry/rest/services/tools.descartes.teastore.auth/teastore-auth-0.teastore-auth"
        port: 8080
        server_address: "teastore-registry"
        span_name: "PUT"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.rest.AuthCartRest"
        method: "addProductToCart"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.rest.AuthCartRest"
        method: "removeProductFromCart"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.rest.AuthCartRest"
        method: "updateQuantity"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.rest.AuthUserActionsRest"
        method: "isLoggedIn"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.rest.AuthUserActionsRest"
        method: "login"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.rest.AuthUserActionsRest"
        method: "logout"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.rest.AuthUserActionsRest"
        method: "placeOrder"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.rest.ReadyRest"
        method: "isReady"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.BCryptProvider"
        method: "BCryptProvider"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.BCryptProvider"
        method: "checkPassword"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.ConstantKeyProvider"
        method: "getKey"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.RandomSessionIdGenerator"
        method: "getSessionId"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.ShaSecurityProvider"
        method: "blobToString"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.ShaSecurityProvider"
        method: "getKeyProvider"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.ShaSecurityProvider"
        method: "getSha512"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.ShaSecurityProvider"
        method: "secure"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.security.ShaSecurityProvider"
        method: "validate"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.startup.AuthStartup"
        method: "AuthStartup"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.startup.AuthStartup"
        method: "contextDestroyed"
        namespace: "teastore"
    - capability: "jvm_method_latency"
      target:
        app: "auth"
        class: "tools.descartes.teastore.auth.startup.AuthStartup"
        method: "contextInitialized"
        namespace: "teastore"
    - capability: "memory_stress"
      target:
        app: "auth"
        container: "teastore-auth"
        namespace: "teastore"
    - capability: "pod_failure"
      target:
        app: "auth"
        namespace: "teastore"
    - capability: "pod_kill"
      target:
        app: "auth"
        namespace: "teastore"
    - capability: "time_skew"
      target:
        app: "auth"
        container: "teastore-auth"
        namespace: "teastore"
