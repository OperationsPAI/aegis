apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "teastore-webui"
  system: "teastore"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "teastore-webui"
        namespace: "teastore"
    - capability: "pod_failure"
      target:
        app: "teastore-webui"
        namespace: "teastore"
    - capability: "container_kill"
      target:
        app: "teastore-webui"
        container: "webui"
        namespace: "teastore"
    - capability: "cpu_stress"
      target:
        app: "teastore-webui"
        container: "webui"
        namespace: "teastore"
    - capability: "time_skew"
      target:
        app: "teastore-webui"
        container: "webui"
        namespace: "teastore"
    - capability: "http_request_delay"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/index"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /tools.descartes.teastore.webui/index"
    - capability: "http_request_abort"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/index"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /tools.descartes.teastore.webui/index"
    - capability: "http_request_delay"
      target:
        app: "teastore-webui"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/loginAction"
        port: 8080
        server_address: "teastore-webui"
        span_name: "POST /tools.descartes.teastore.webui/loginAction"
    - capability: "http_request_abort"
      target:
        app: "teastore-webui"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/loginAction"
        port: 8080
        server_address: "teastore-webui"
        span_name: "POST /tools.descartes.teastore.webui/loginAction"
    - capability: "http_request_delay"
      target:
        app: "teastore-webui"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/cartAction"
        port: 8080
        server_address: "teastore-webui"
        span_name: "POST /tools.descartes.teastore.webui/cartAction"
    - capability: "http_request_abort"
      target:
        app: "teastore-webui"
        method: "POST"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/cartAction"
        port: 8080
        server_address: "teastore-webui"
        span_name: "POST /tools.descartes.teastore.webui/cartAction"
    - capability: "http_request_delay"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/cart"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /tools.descartes.teastore.webui/cart"
    - capability: "http_request_abort"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/cart"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /tools.descartes.teastore.webui/cart"
    - capability: "http_request_delay"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/category"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /tools.descartes.teastore.webui/category"
    - capability: "http_request_abort"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/category"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /tools.descartes.teastore.webui/category"
    - capability: "http_request_delay"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/product"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /tools.descartes.teastore.webui/product"
    - capability: "http_request_abort"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.webui/product"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /tools.descartes.teastore.webui/product"
    - capability: "http_request_delay"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /*"
    - capability: "http_request_abort"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /*"
    - capability: "http_response_abort"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "teastore-webui"
        method: "GET"
        namespace: "teastore"
        path: "/*"
        port: 8080
    - capability: "dns_error"
      target:
        app: "teastore-webui"
        domain_patterns:
          - "teastore-registry"
        namespace: "teastore"
    - capability: "dns_random"
      target:
        app: "teastore-webui"
        domain_patterns:
          - "teastore-registry"
        namespace: "teastore"
    - capability: "network_delay"
      target:
        namespace: "teastore"
        source_app: "teastore-webui"
        span_names:
          - "GET /rest/services/{name}"
          - "PUT /rest/services/{name}/{location}"
        target_service: "teastore-registry"
    - capability: "network_loss"
      target:
        namespace: "teastore"
        source_app: "teastore-webui"
        span_names:
          - "GET /rest/services/{name}"
          - "PUT /rest/services/{name}/{location}"
        target_service: "teastore-registry"
    - capability: "network_duplicate"
      target:
        namespace: "teastore"
        source_app: "teastore-webui"
        span_names:
          - "GET /rest/services/{name}"
          - "PUT /rest/services/{name}/{location}"
        target_service: "teastore-registry"
    - capability: "network_corrupt"
      target:
        namespace: "teastore"
        source_app: "teastore-webui"
        span_names:
          - "GET /rest/services/{name}"
          - "PUT /rest/services/{name}/{location}"
        target_service: "teastore-registry"
    - capability: "network_bandwidth"
      target:
        namespace: "teastore"
        source_app: "teastore-webui"
        span_names:
          - "GET /rest/services/{name}"
          - "PUT /rest/services/{name}/{location}"
        target_service: "teastore-registry"
    - capability: "network_partition"
      target:
        namespace: "teastore"
        source_app: "teastore-webui"
        span_names:
          - "GET /rest/services/{name}"
          - "PUT /rest/services/{name}/{location}"
        target_service: "teastore-registry"
