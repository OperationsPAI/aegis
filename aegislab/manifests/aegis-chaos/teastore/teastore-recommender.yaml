apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "teastore-recommender"
  system: "teastore"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "teastore-recommender"
        container: "teastore-recommender"
        namespace: "teastore"
    - capability: "cpu_stress"
      target:
        app: "teastore-recommender"
        container: "teastore-recommender"
        namespace: "teastore"
    - capability: "http_request_abort"
      target:
        app: "teastore-recommender"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.registry/rest/services/tools.descartes.teastore.persistence/"
        port: 8080
    - capability: "http_request_abort"
      target:
        app: "teastore-recommender"
        method: "GET"
        namespace: "teastore"
        path: "/tools.descartes.teastore.registry/rest/services/tools.descartes.teastore.recommender/"
        port: 8080
