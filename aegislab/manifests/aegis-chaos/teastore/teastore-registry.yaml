apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "teastore-registry"
  system: "teastore"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "teastore-registry"
        namespace: "teastore"
    - capability: "pod_failure"
      target:
        app: "teastore-registry"
        namespace: "teastore"
    - capability: "container_kill"
      target:
        app: "teastore-registry"
        container: "registry"
        namespace: "teastore"
    - capability: "cpu_stress"
      target:
        app: "teastore-registry"
        container: "registry"
        namespace: "teastore"
    - capability: "time_skew"
      target:
        app: "teastore-registry"
        container: "registry"
        namespace: "teastore"
    - capability: "http_request_delay"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
        server_address: "teastore-registry"
        span_name: "GET /rest/services/{name}"
    - capability: "http_request_abort"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
        server_address: "teastore-registry"
        span_name: "GET /rest/services/{name}"
    - capability: "http_response_abort"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "teastore-registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/{name}"
        port: 8080
    - capability: "http_request_delay"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
        server_address: "teastore-registry"
        span_name: "PUT /rest/services/{name}/{location}"
    - capability: "http_request_abort"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
        server_address: "teastore-registry"
        span_name: "PUT /rest/services/{name}/{location}"
    - capability: "http_response_abort"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "teastore-registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/{name}/{location}"
        port: 8080
