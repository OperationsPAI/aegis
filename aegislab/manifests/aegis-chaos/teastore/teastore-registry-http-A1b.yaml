apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: teastore-registry
  system: teastore
spec:
  points:
  - capability: http_request_replace_method
    target:
      app: teastore-registry
      method: GET
      namespace: teastore
      path: /rest/services/*
      port: 8080
  - capability: http_request_replace_method
    target:
      app: teastore-registry
      method: PUT
      namespace: teastore
      path: /rest/services/*/*
      port: 8080
  - capability: http_request_replace_path
    target:
      app: teastore-registry
      method: GET
      namespace: teastore
      path: /rest/services/*
      port: 8080
  - capability: http_request_replace_path
    target:
      app: teastore-registry
      method: PUT
      namespace: teastore
      path: /rest/services/*/*
      port: 8080
  - capability: http_response_abort
    target:
      app: teastore-registry
      method: GET
      namespace: teastore
      path: /rest/services/*
      port: 8080
  - capability: http_response_abort
    target:
      app: teastore-registry
      method: PUT
      namespace: teastore
      path: /rest/services/*/*
      port: 8080
  - capability: http_response_delay
    target:
      app: teastore-registry
      method: GET
      namespace: teastore
      path: /rest/services/*
      port: 8080
  - capability: http_response_delay
    target:
      app: teastore-registry
      method: PUT
      namespace: teastore
      path: /rest/services/*/*
      port: 8080
  - capability: http_response_patch_body
    target:
      app: teastore-registry
      method: GET
      namespace: teastore
      path: /rest/services/*
      port: 8080
  - capability: http_response_patch_body
    target:
      app: teastore-registry
      method: PUT
      namespace: teastore
      path: /rest/services/*/*
      port: 8080
  - capability: http_response_replace_body
    target:
      app: teastore-registry
      method: GET
      namespace: teastore
      path: /rest/services/*
      port: 8080
  - capability: http_response_replace_body
    target:
      app: teastore-registry
      method: PUT
      namespace: teastore
      path: /rest/services/*/*
      port: 8080
  - capability: http_response_replace_code
    target:
      app: teastore-registry
      method: GET
      namespace: teastore
      path: /rest/services/*
      port: 8080
  - capability: http_response_replace_code
    target:
      app: teastore-registry
      method: PUT
      namespace: teastore
      path: /rest/services/*/*
      port: 8080
  replace_scope: service
