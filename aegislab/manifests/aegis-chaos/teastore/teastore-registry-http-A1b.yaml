      target:
        app: "registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/*/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "PUT /rest/services/{name}/{location}"
    - capability: "http_response_replace_body"
      target:
        app: "registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /rest/services/{name}"
    - capability: "http_response_replace_body"
      target:
        app: "registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/*/*"
        port: 8080
