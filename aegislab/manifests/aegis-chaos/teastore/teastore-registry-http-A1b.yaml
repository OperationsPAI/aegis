apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "registry"
  system: "teastore"
spec:
  replace_scope: "service"
  points:
    - capability: "http_request_replace_method"
      target:
        app: "registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /rest/services/{name}"
    - capability: "http_request_replace_method"
      target:
        app: "registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/*/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "PUT /rest/services/{name}/{location}"
    - capability: "http_request_replace_path"
      target:
        app: "registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /rest/services/{name}"
    - capability: "http_request_replace_path"
      target:
        app: "registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/*/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "PUT /rest/services/{name}/{location}"
    - capability: "http_response_abort"
      target:
        app: "registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /rest/services/{name}"
    - capability: "http_response_abort"
      target:
        app: "registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/*/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "PUT /rest/services/{name}/{location}"
    - capability: "http_response_delay"
      target:
        app: "registry"
        method: "GET"
        namespace: "teastore"
        path: "/rest/services/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "GET /rest/services/{name}"
    - capability: "http_response_delay"
      target:
        app: "registry"
        method: "PUT"
        namespace: "teastore"
        path: "/rest/services/*/*"
        port: 8080
        server_address: "teastore-webui"
        span_name: "PUT /rest/services/{name}/{location}"
    - capability: "http_response_patch_body"
      target:
