apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: ts-route-plan-service
  system: ts
spec:
  points:
  - capability: dns_error
    target:
      app: ts-route-plan-service
      domain_patterns:
      - ts-route-service
      namespace: ts
  - capability: dns_error
    target:
      app: ts-route-plan-service
      domain_patterns:
      - ts-travel-service
      namespace: ts
  - capability: dns_error
    target:
      app: ts-route-plan-service
      domain_patterns:
      - ts-travel2-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-route-plan-service
      domain_patterns:
      - ts-route-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-route-plan-service
      domain_patterns:
      - ts-travel-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-route-plan-service
      domain_patterns:
      - ts-travel2-service
      namespace: ts
  replace_scope: service
