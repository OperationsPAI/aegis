apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "ts-payment-service"
  system: "ts"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "ts-payment-service"
        container: "ts-payment-service"
        namespace: "ts"
    - capability: "cpu_stress"
      target:
        app: "ts-payment-service"
        container: "ts-payment-service"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.PaymentApplication"
        method: "main"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.controller.PaymentController"
        method: "addMoney"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.controller.PaymentController"
        method: "home"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.controller.PaymentController"
        method: "pay"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.controller.PaymentController"
        method: "query"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.entity.Payment"
        method: "Payment"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.init.InitData"
        method: "run"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.service.PaymentServiceImpl"
        method: "addMoney"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.service.PaymentServiceImpl"
        method: "initPayment"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.service.PaymentServiceImpl"
        method: "pay"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-payment-service"
        class: "com.trainticket.service.PaymentServiceImpl"
        method: "query"
        namespace: "ts"
    - capability: "memory_stress"
      target:
        app: "ts-payment-service"
        container: "ts-payment-service"
        namespace: "ts"
    - capability: "pod_failure"
      target:
        app: "ts-payment-service"
        namespace: "ts"
    - capability: "pod_kill"
      target:
        app: "ts-payment-service"
        namespace: "ts"
    - capability: "time_skew"
      target:
        app: "ts-payment-service"
        container: "ts-payment-service"
        namespace: "ts"
