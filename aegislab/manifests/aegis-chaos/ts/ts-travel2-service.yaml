    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "getTrainTypeByName"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "getTrainTypeByTripId"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "getTripAllDetailInfo"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "getTripByRoute"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "query"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "queryAll"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "queryByBatch"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
