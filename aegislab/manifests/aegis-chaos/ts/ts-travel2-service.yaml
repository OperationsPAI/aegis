        method: "getRouteByRouteId"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "getRouteByTripId"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
        class: "travel2.service.TravelServiceImpl"
        method: "getServiceUrl"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel2-service"
