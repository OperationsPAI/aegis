apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "loadgenerator"
  system: "ts"
spec:
  replace_scope: "service"
  points:
    - capability: "network_bandwidth"
      target:
        namespace: "ts"
        source_app: "loadgenerator"
        span_names:
          - "HTTP DELETE http://ts-ui-dashboard:8080/api/v1/adminrouteservice/adminroute/{uuid}"
          - "HTTP GET http://ts-ui-dashboard:8080/api/v1/assuranceservice/assurances/types"
          - "HTTP POST http://ts-ui-dashboard:8080/api/v1/users/login"
          - "HTTP PUT http://ts-ui-dashboard:8080/api/v1/adminbasicservice/adminbasic/stations"
        target_service: "ts-rabbitmq"
    - capability: "network_corrupt"
      target:
        namespace: "ts"
        source_app: "loadgenerator"
        span_names:
          - "HTTP DELETE http://ts-ui-dashboard:8080/api/v1/adminrouteservice/adminroute/{uuid}"
          - "HTTP GET http://ts-ui-dashboard:8080/api/v1/assuranceservice/assurances/types"
          - "HTTP POST http://ts-ui-dashboard:8080/api/v1/users/login"
          - "HTTP PUT http://ts-ui-dashboard:8080/api/v1/adminbasicservice/adminbasic/stations"
        target_service: "ts-rabbitmq"
    - capability: "network_delay"
      target:
        namespace: "ts"
        source_app: "loadgenerator"
        span_names:
          - "HTTP DELETE http://ts-ui-dashboard:8080/api/v1/adminrouteservice/adminroute/{uuid}"
          - "HTTP GET http://ts-ui-dashboard:8080/api/v1/assuranceservice/assurances/types"
          - "HTTP POST http://ts-ui-dashboard:8080/api/v1/users/login"
          - "HTTP PUT http://ts-ui-dashboard:8080/api/v1/adminbasicservice/adminbasic/stations"
        target_service: "ts-rabbitmq"
    - capability: "network_duplicate"
      target:
        namespace: "ts"
        source_app: "loadgenerator"
        span_names:
          - "HTTP DELETE http://ts-ui-dashboard:8080/api/v1/adminrouteservice/adminroute/{uuid}"
          - "HTTP GET http://ts-ui-dashboard:8080/api/v1/assuranceservice/assurances/types"
          - "HTTP POST http://ts-ui-dashboard:8080/api/v1/users/login"
          - "HTTP PUT http://ts-ui-dashboard:8080/api/v1/adminbasicservice/adminbasic/stations"
        target_service: "ts-rabbitmq"
    - capability: "network_loss"
      target:
        namespace: "ts"
        source_app: "loadgenerator"
        span_names:
          - "HTTP DELETE http://ts-ui-dashboard:8080/api/v1/adminrouteservice/adminroute/{uuid}"
          - "HTTP GET http://ts-ui-dashboard:8080/api/v1/assuranceservice/assurances/types"
          - "HTTP POST http://ts-ui-dashboard:8080/api/v1/users/login"
          - "HTTP PUT http://ts-ui-dashboard:8080/api/v1/adminbasicservice/adminbasic/stations"
        target_service: "ts-rabbitmq"
    - capability: "network_partition"
      target:
        namespace: "ts"
        source_app: "loadgenerator"
        span_names:
          - "HTTP DELETE http://ts-ui-dashboard:8080/api/v1/adminrouteservice/adminroute/{uuid}"
          - "HTTP GET http://ts-ui-dashboard:8080/api/v1/assuranceservice/assurances/types"
          - "HTTP POST http://ts-ui-dashboard:8080/api/v1/users/login"
          - "HTTP PUT http://ts-ui-dashboard:8080/api/v1/adminbasicservice/adminbasic/stations"
        target_service: "ts-rabbitmq"
