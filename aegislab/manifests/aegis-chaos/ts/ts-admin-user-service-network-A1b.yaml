apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: ts-admin-user-service
  system: ts
spec:
  points:
  - capability: network_bandwidth
    target:
      namespace: ts
      source_app: ts-admin-user-service
      span_names:
      - DELETE
      - GET
      - POST
      - PUT
      target_service: ts-user-service
  - capability: network_corrupt
    target:
      namespace: ts
      source_app: ts-admin-user-service
      span_names:
      - DELETE
      - GET
      - POST
      - PUT
      target_service: ts-user-service
  - capability: network_delay
    target:
      namespace: ts
      source_app: ts-admin-user-service
      span_names:
      - DELETE
      - GET
      - POST
      - PUT
      target_service: ts-user-service
  - capability: network_duplicate
    target:
      namespace: ts
      source_app: ts-admin-user-service
      span_names:
      - DELETE
      - GET
      - POST
      - PUT
      target_service: ts-user-service
  - capability: network_loss
    target:
      namespace: ts
      source_app: ts-admin-user-service
      span_names:
      - DELETE
      - GET
      - POST
      - PUT
      target_service: ts-user-service
  - capability: network_partition
    target:
      namespace: ts
      source_app: ts-admin-user-service
      span_names:
      - DELETE
      - GET
      - POST
      - PUT
      target_service: ts-user-service
  replace_scope: service
