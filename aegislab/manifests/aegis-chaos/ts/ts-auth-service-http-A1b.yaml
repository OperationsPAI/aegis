apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: ts-auth-service
  system: ts
spec:
  points:
  - capability: http_request_replace_method
    target:
      app: ts-auth-service
      method: GET
      namespace: ts
      path: /api/v1/verifycode/verify/*
      port: 8080
  - capability: http_request_replace_path
    target:
      app: ts-auth-service
      method: GET
      namespace: ts
      path: /api/v1/verifycode/verify/*
      port: 8080
  - capability: http_response_abort
    target:
      app: ts-auth-service
      method: GET
      namespace: ts
      path: /api/v1/verifycode/verify/*
      port: 8080
  - capability: http_response_delay
    target:
      app: ts-auth-service
      method: GET
      namespace: ts
      path: /api/v1/verifycode/verify/*
      port: 8080
  - capability: http_response_patch_body
    target:
      app: ts-auth-service
      method: GET
      namespace: ts
      path: /api/v1/verifycode/verify/*
      port: 8080
  - capability: http_response_replace_body
    target:
      app: ts-auth-service
      method: GET
      namespace: ts
      path: /api/v1/verifycode/verify/*
      port: 8080
  - capability: http_response_replace_code
    target:
      app: ts-auth-service
      method: GET
      namespace: ts
      path: /api/v1/verifycode/verify/*
      port: 8080
  replace_scope: service
