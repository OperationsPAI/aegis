apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "ts-security-service"
  system: "ts"
spec:
  replace_scope: "service"
  points:
    - capability: "http_request_replace_method"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderOtherService/orderOther/security/*/*"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderservice/order/security/*/*"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderOtherService/orderOther/security/*/*"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderservice/order/security/*/*"
        port: 8080
    - capability: "http_response_abort"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderOtherService/orderOther/security/*/*"
        port: 8080
    - capability: "http_response_abort"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderservice/order/security/*/*"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderOtherService/orderOther/security/*/*"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderservice/order/security/*/*"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderOtherService/orderOther/security/*/*"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderservice/order/security/*/*"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderOtherService/orderOther/security/*/*"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderservice/order/security/*/*"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderOtherService/orderOther/security/*/*"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "ts-security-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/orderservice/order/security/*/*"
        port: 8080
