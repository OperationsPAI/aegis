apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: ts-food-service
  system: ts
spec:
  points:
  - capability: dns_error
    target:
      app: ts-food-service
      domain_patterns:
      - mysql
      namespace: ts
  - capability: dns_error
    target:
      app: ts-food-service
      domain_patterns:
      - ts-rabbitmq
      namespace: ts
  - capability: dns_error
    target:
      app: ts-food-service
      domain_patterns:
      - ts-station-food-service
      namespace: ts
  - capability: dns_error
    target:
      app: ts-food-service
      domain_patterns:
      - ts-train-food-service
      namespace: ts
  - capability: dns_error
    target:
      app: ts-food-service
      domain_patterns:
      - ts-travel-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-food-service
      domain_patterns:
      - mysql
      namespace: ts
  - capability: dns_random
    target:
      app: ts-food-service
      domain_patterns:
      - ts-rabbitmq
      namespace: ts
  - capability: dns_random
    target:
      app: ts-food-service
      domain_patterns:
      - ts-station-food-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-food-service
      domain_patterns:
      - ts-train-food-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-food-service
      domain_patterns:
      - ts-travel-service
      namespace: ts
  replace_scope: service
