apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "ts-admin-travel-service"
  system: "ts"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "ts-admin-travel-service"
        container: "ts-admin-travel-service"
        namespace: "ts"
    - capability: "cpu_stress"
      target:
        app: "ts-admin-travel-service"
        container: "ts-admin-travel-service"
        namespace: "ts"
    - capability: "http_request_abort"
      target:
        app: "ts-admin-travel-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/routeservice/routes/*"
        port: 8080
        server_address: "ts-route-service"
        span_name: "GET"
    - capability: "http_request_abort"
      target:
        app: "ts-admin-travel-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/trainservice/trains/byName/*"
        port: 8080
        server_address: "ts-train-service"
        span_name: "GET"
    - capability: "http_request_abort"
      target:
        app: "ts-admin-travel-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/travel2service/admin_trip"
        port: 8080
        server_address: "ts-travel2-service"
        span_name: "GET"
    - capability: "http_request_abort"
      target:
        app: "ts-admin-travel-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/travelservice/admin_trip"
        port: 8080
        server_address: "ts-travel-service"
        span_name: "GET"
    - capability: "http_request_abort"
      target:
        app: "ts-admin-travel-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/stationservice/stations/idlist"
        port: 8080
        server_address: "ts-station-service"
        span_name: "POST"
    - capability: "http_request_delay"
      target:
        app: "ts-admin-travel-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/routeservice/routes/*"
        port: 8080
        server_address: "ts-route-service"
        span_name: "GET"
    - capability: "http_request_delay"
      target:
        app: "ts-admin-travel-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/trainservice/trains/byName/*"
        port: 8080
        server_address: "ts-train-service"
        span_name: "GET"
    - capability: "http_request_delay"
      target:
        app: "ts-admin-travel-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/travel2service/admin_trip"
        port: 8080
        server_address: "ts-travel2-service"
        span_name: "GET"
    - capability: "http_request_delay"
      target:
        app: "ts-admin-travel-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/travelservice/admin_trip"
        port: 8080
        server_address: "ts-travel-service"
        span_name: "GET"
    - capability: "http_request_delay"
      target:
        app: "ts-admin-travel-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/stationservice/stations/idlist"
        port: 8080
        server_address: "ts-station-service"
        span_name: "POST"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.AdminTravelApplication"
        method: "main"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.controller.AdminTravelController"
        method: "addTravel"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.controller.AdminTravelController"
        method: "deleteTravel"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.controller.AdminTravelController"
        method: "getAllTravels"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.controller.AdminTravelController"
        method: "home"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.controller.AdminTravelController"
        method: "updateTravel"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "addTravel"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "checkStationsExists"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "checkTravelInfo"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "deleteTravel"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "getAllTravels"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "getRouteByRouteId"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "getServiceUrl"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "queryTrainTypeByName"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-admin-travel-service"
        class: "admintravel.service.AdminTravelServiceImpl"
        method: "updateTravel"
        namespace: "ts"
    - capability: "pod_failure"
      target:
        app: "ts-admin-travel-service"
        namespace: "ts"
    - capability: "pod_kill"
      target:
        app: "ts-admin-travel-service"
        namespace: "ts"
    - capability: "time_skew"
      target:
        app: "ts-admin-travel-service"
        container: "ts-admin-travel-service"
        namespace: "ts"
