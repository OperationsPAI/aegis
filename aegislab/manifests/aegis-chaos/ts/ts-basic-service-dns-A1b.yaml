apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: ts-basic-service
  system: ts
spec:
  points:
  - capability: dns_error
    target:
      app: ts-basic-service
      domain_patterns:
      - ts-price-service
      namespace: ts
  - capability: dns_error
    target:
      app: ts-basic-service
      domain_patterns:
      - ts-route-service
      namespace: ts
  - capability: dns_error
    target:
      app: ts-basic-service
      domain_patterns:
      - ts-station-service
      namespace: ts
  - capability: dns_error
    target:
      app: ts-basic-service
      domain_patterns:
      - ts-train-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-basic-service
      domain_patterns:
      - ts-price-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-basic-service
      domain_patterns:
      - ts-route-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-basic-service
      domain_patterns:
      - ts-station-service
      namespace: ts
  - capability: dns_random
    target:
      app: ts-basic-service
      domain_patterns:
      - ts-train-service
      namespace: ts
  replace_scope: service
