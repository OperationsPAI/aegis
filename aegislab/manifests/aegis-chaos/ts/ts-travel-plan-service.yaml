apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "ts-travel-plan-service"
  system: "ts"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "ts-travel-plan-service"
        container: "ts-travel-plan-service"
        namespace: "ts"
    - capability: "cpu_stress"
      target:
        app: "ts-travel-plan-service"
        container: "ts-travel-plan-service"
        namespace: "ts"
    - capability: "http_request_abort"
      target:
        app: "ts-travel-plan-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/trainservice/trains/byName/*"
        port: 8080
        server_address: "ts-train-service"
        span_name: "GET"
    - capability: "http_request_abort"
      target:
        app: "ts-travel-plan-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/routeplanservice/routePlan/cheapestRoute"
        port: 8080
        server_address: "ts-route-plan-service"
        span_name: "POST"
    - capability: "http_request_abort"
      target:
        app: "ts-travel-plan-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/routeplanservice/routePlan/minStopStations"
        port: 8080
        server_address: "ts-route-plan-service"
        span_name: "POST"
    - capability: "http_request_abort"
      target:
        app: "ts-travel-plan-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/routeplanservice/routePlan/quickestRoute"
        port: 8080
        server_address: "ts-route-plan-service"
        span_name: "POST"
    - capability: "http_request_abort"
      target:
        app: "ts-travel-plan-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/seatservice/seats/left_tickets"
        port: 8080
        server_address: "ts-seat-service"
        span_name: "POST"
    - capability: "http_request_delay"
      target:
        app: "ts-travel-plan-service"
        method: "GET"
        namespace: "ts"
        path: "/api/v1/trainservice/trains/byName/*"
        port: 8080
        server_address: "ts-train-service"
        span_name: "GET"
    - capability: "http_request_delay"
      target:
        app: "ts-travel-plan-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/routeplanservice/routePlan/cheapestRoute"
        port: 8080
        server_address: "ts-route-plan-service"
        span_name: "POST"
    - capability: "http_request_delay"
      target:
        app: "ts-travel-plan-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/routeplanservice/routePlan/minStopStations"
        port: 8080
        server_address: "ts-route-plan-service"
        span_name: "POST"
    - capability: "http_request_delay"
      target:
        app: "ts-travel-plan-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/routeplanservice/routePlan/quickestRoute"
        port: 8080
        server_address: "ts-route-plan-service"
        span_name: "POST"
    - capability: "http_request_delay"
      target:
        app: "ts-travel-plan-service"
        method: "POST"
        namespace: "ts"
        path: "/api/v1/seatservice/seats/left_tickets"
        port: 8080
        server_address: "ts-seat-service"
        span_name: "POST"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.TravelPlanApplication"
        method: "main"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.controller.TravelPlanController"
        method: "getByCheapest"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.controller.TravelPlanController"
        method: "getByMinStation"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.controller.TravelPlanController"
        method: "getByQuickest"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.controller.TravelPlanController"
        method: "getTransferResult"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.controller.TravelPlanController"
        method: "home"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.entity.TransferTravelInfo"
        method: "TransferTravelInfo"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.entity.TransferTravelInfo"
        method: "getTravelDate"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.entity.TransferTravelResult"
        method: "TransferTravelResult"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.entity.TravelAdvanceResultUnit"
        method: "TravelAdvanceResultUnit"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getCheapest"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getMinStation"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getQuickest"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getRestTicketNumber"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getRoutePlanResultCheapest"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getRoutePlanResultMinStation"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getRoutePlanResultQuickest"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getServiceUrl"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "getTransferSearch"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "queryTrainTypeByName"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "tripsFromHighSpeed"
        namespace: "ts"
    - capability: "jvm_method_latency"
      target:
        app: "ts-travel-plan-service"
        class: "travelplan.service.TravelPlanServiceImpl"
        method: "tripsFromNormal"
        namespace: "ts"
    - capability: "memory_stress"
      target:
        app: "ts-travel-plan-service"
        container: "ts-travel-plan-service"
        namespace: "ts"
    - capability: "pod_failure"
      target:
        app: "ts-travel-plan-service"
        namespace: "ts"
    - capability: "pod_kill"
      target:
        app: "ts-travel-plan-service"
        namespace: "ts"
    - capability: "time_skew"
      target:
        app: "ts-travel-plan-service"
        container: "ts-travel-plan-service"
        namespace: "ts"
