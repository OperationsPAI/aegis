apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: ts-consign-price-service
  system: ts
spec:
  points:
  - capability: network_bandwidth
    target:
      namespace: ts
      source_app: ts-consign-price-service
      target_service: mysql
  - capability: network_corrupt
    target:
      namespace: ts
      source_app: ts-consign-price-service
      target_service: mysql
  - capability: network_delay
    target:
      namespace: ts
      source_app: ts-consign-price-service
      target_service: mysql
  - capability: network_duplicate
    target:
      namespace: ts
      source_app: ts-consign-price-service
      target_service: mysql
  - capability: network_loss
    target:
      namespace: ts
      source_app: ts-consign-price-service
      target_service: mysql
  - capability: network_partition
    target:
      namespace: ts
      source_app: ts-consign-price-service
      target_service: mysql
  replace_scope: service
