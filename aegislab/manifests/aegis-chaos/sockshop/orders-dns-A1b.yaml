apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: orders
  system: sockshop
spec:
  points:
  - capability: dns_error
    target:
      app: orders
      domain_patterns:
      - carts
      namespace: sockshop
  - capability: dns_error
    target:
      app: orders
      domain_patterns:
      - front-end
      namespace: sockshop
  - capability: dns_error
    target:
      app: orders
      domain_patterns:
      - user
      namespace: sockshop
  - capability: dns_random
    target:
      app: orders
      domain_patterns:
      - carts
      namespace: sockshop
  - capability: dns_random
    target:
      app: orders
      domain_patterns:
      - front-end
      namespace: sockshop
  - capability: dns_random
    target:
      app: orders
      domain_patterns:
      - user
      namespace: sockshop
  replace_scope: service
