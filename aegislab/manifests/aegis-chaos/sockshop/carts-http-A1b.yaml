apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "carts"
  system: "sockshop"
spec:
  replace_scope: "service"
  points:
    - capability: "http_request_replace_method"
      target:
        app: "carts"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 8079
        server_address: "front-end"
        span_name: "GET /"
    - capability: "http_request_replace_path"
      target:
        app: "carts"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 8079
        server_address: "front-end"
        span_name: "GET /"
    - capability: "http_response_abort"
      target:
        app: "carts"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 8079
        server_address: "front-end"
        span_name: "GET /"
    - capability: "http_response_delay"
      target:
        app: "carts"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 8079
        server_address: "front-end"
        span_name: "GET /"
    - capability: "http_response_patch_body"
      target:
        app: "carts"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 8079
        server_address: "front-end"
        span_name: "GET /"
    - capability: "http_response_replace_body"
      target:
        app: "carts"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 8079
        server_address: "front-end"
        span_name: "GET /"
    - capability: "http_response_replace_code"
      target:
        app: "carts"
        method: "GET"
        namespace: "sockshop"
        path: "/"
        port: 8079
        server_address: "front-end"
        span_name: "GET /"
