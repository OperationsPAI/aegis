apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: shipping
  system: sockshop
spec:
  points:
  - capability: network_bandwidth
    target:
      namespace: sockshop
      source_app: shipping
      target_service: front-end
  - capability: network_corrupt
    target:
      namespace: sockshop
      source_app: shipping
      target_service: front-end
  - capability: network_delay
    target:
      namespace: sockshop
      source_app: shipping
      target_service: front-end
  - capability: network_duplicate
    target:
      namespace: sockshop
      source_app: shipping
      target_service: front-end
  - capability: network_loss
    target:
      namespace: sockshop
      source_app: shipping
      target_service: front-end
  - capability: network_partition
    target:
      namespace: sockshop
      source_app: shipping
      target_service: front-end
  replace_scope: service
