apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: catalog
  system: sockshop
spec:
  points:
  - capability: dns_error
    target:
      app: catalog
      domain_patterns:
      - front-end
      namespace: sockshop
  - capability: dns_random
    target:
      app: catalog
      domain_patterns:
      - front-end
      namespace: sockshop
  replace_scope: service
