apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "checkout"
  system: "otel-demo"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "checkout"
        container: "checkout"
        namespace: "otel-demo"
    - capability: "cpu_stress"
      target:
        app: "checkout"
        container: "checkout"
        namespace: "otel-demo"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
        server_address: "shipping"
        span_name: "HTTP POST"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/EmptyCart"
        port: 8080
        server_address: "cart"
        span_name: "oteldemo.CartService/EmptyCart"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/GetCart"
        port: 8080
        server_address: "cart"
        span_name: "oteldemo.CartService/GetCart"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CheckoutService/PlaceOrder"
        port: 8080
        server_address: "checkout"
        span_name: "oteldemo.CheckoutService/PlaceOrder"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CurrencyService/Convert"
        port: 8080
        server_address: "currency"
        span_name: "oteldemo.CurrencyService/Convert"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.PaymentService/Charge"
        port: 8080
        server_address: "payment"
        span_name: "oteldemo.PaymentService/Charge"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.ProductCatalogService/GetProduct"
        port: 8080
        server_address: "product-catalog"
        span_name: "oteldemo.ProductCatalogService/GetProduct"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/send_order_confirmation"
        port: 8080
        server_address: "email"
        span_name: "HTTP POST"
    - capability: "http_request_abort"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
        server_address: "shipping"
        span_name: "HTTP POST"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
        server_address: "shipping"
        span_name: "HTTP POST"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/EmptyCart"
        port: 8080
        server_address: "cart"
        span_name: "oteldemo.CartService/EmptyCart"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CartService/GetCart"
        port: 8080
        server_address: "cart"
        span_name: "oteldemo.CartService/GetCart"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CheckoutService/PlaceOrder"
        port: 8080
        server_address: "checkout"
        span_name: "oteldemo.CheckoutService/PlaceOrder"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.CurrencyService/Convert"
        port: 8080
        server_address: "currency"
        span_name: "oteldemo.CurrencyService/Convert"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.PaymentService/Charge"
        port: 8080
        server_address: "payment"
        span_name: "oteldemo.PaymentService/Charge"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/oteldemo.ProductCatalogService/GetProduct"
        port: 8080
        server_address: "product-catalog"
        span_name: "oteldemo.ProductCatalogService/GetProduct"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/send_order_confirmation"
        port: 8080
        server_address: "email"
        span_name: "HTTP POST"
    - capability: "http_request_delay"
      target:
        app: "checkout"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
        server_address: "shipping"
        span_name: "HTTP POST"
    - capability: "memory_stress"
      target:
        app: "checkout"
        container: "checkout"
        namespace: "otel-demo"
    - capability: "pod_failure"
      target:
        app: "checkout"
        namespace: "otel-demo"
    - capability: "pod_kill"
      target:
        app: "checkout"
        namespace: "otel-demo"
    - capability: "time_skew"
      target:
        app: "checkout"
        container: "checkout"
        namespace: "otel-demo"
