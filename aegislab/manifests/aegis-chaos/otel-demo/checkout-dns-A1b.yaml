apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: checkout
  system: otel-demo
spec:
  points:
  - capability: dns_error
    target:
      app: checkout
      domain_patterns:
      - email
      namespace: otel-demo
  - capability: dns_error
    target:
      app: checkout
      domain_patterns:
      - shipping
      namespace: otel-demo
  - capability: dns_random
    target:
      app: checkout
      domain_patterns:
      - email
      namespace: otel-demo
  - capability: dns_random
    target:
      app: checkout
      domain_patterns:
      - shipping
      namespace: otel-demo
  replace_scope: service
