apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: quote
  system: otel-demo
spec:
  points:
  - capability: http_request_replace_method
    target:
      app: quote
      method: POST
      namespace: otel-demo
      path: /getquote
      port: 8080
      server_address: quote
      span_name: POST /getquote
  - capability: http_request_replace_path
    target:
      app: quote
      method: POST
      namespace: otel-demo
      path: /getquote
      port: 8080
      server_address: quote
      span_name: POST /getquote
  - capability: http_response_abort
    target:
      app: quote
      method: POST
      namespace: otel-demo
      path: /getquote
      port: 8080
      server_address: quote
      span_name: POST /getquote
  - capability: http_response_delay
    target:
      app: quote
      method: POST
      namespace: otel-demo
      path: /getquote
      port: 8080
      server_address: quote
      span_name: POST /getquote
  - capability: http_response_patch_body
    target:
      app: quote
      method: POST
      namespace: otel-demo
      path: /getquote
      port: 8080
      server_address: quote
      span_name: POST /getquote
  - capability: http_response_replace_body
    target:
      app: quote
      method: POST
      namespace: otel-demo
      path: /getquote
      port: 8080
      server_address: quote
      span_name: POST /getquote
  - capability: http_response_replace_code
    target:
      app: quote
      method: POST
      namespace: otel-demo
      path: /getquote
      port: 8080
      server_address: quote
      span_name: POST /getquote
  replace_scope: service
