apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "product-catalog"
  system: "otel-demo"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "product-catalog"
        container: "product-catalog"
        namespace: "otel-demo"
    - capability: "cpu_stress"
      target:
        app: "product-catalog"
        container: "product-catalog"
        namespace: "otel-demo"
    - capability: "memory_stress"
      target:
        app: "product-catalog"
        container: "product-catalog"
        namespace: "otel-demo"
    - capability: "pod_failure"
      target:
        app: "product-catalog"
        namespace: "otel-demo"
    - capability: "pod_kill"
      target:
        app: "product-catalog"
        namespace: "otel-demo"
    - capability: "time_skew"
      target:
        app: "product-catalog"
        container: "product-catalog"
        namespace: "otel-demo"
