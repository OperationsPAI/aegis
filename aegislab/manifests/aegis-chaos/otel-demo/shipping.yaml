apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "shipping"
  system: "otel-demo"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "shipping"
        namespace: "otel-demo"
    - capability: "pod_failure"
      target:
        app: "shipping"
        namespace: "otel-demo"
    - capability: "container_kill"
      target:
        app: "shipping"
        container: "shipping"
        namespace: "otel-demo"
    - capability: "cpu_stress"
      target:
        app: "shipping"
        container: "shipping"
        namespace: "otel-demo"
    - capability: "time_skew"
      target:
        app: "shipping"
        container: "shipping"
        namespace: "otel-demo"
    - capability: "http_request_delay"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
        server_address: "shipping"
        span_name: "/get-quote"
    - capability: "http_request_abort"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
        server_address: "shipping"
        span_name: "/get-quote"
    - capability: "http_response_abort"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/get-quote"
        port: 8080
    - capability: "http_request_delay"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
        server_address: "shipping"
        span_name: "/ship-order"
    - capability: "http_request_abort"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
        server_address: "shipping"
        span_name: "/ship-order"
    - capability: "http_response_abort"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
    - capability: "http_response_delay"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
    - capability: "http_response_replace_code"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
    - capability: "http_response_patch_body"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
    - capability: "http_response_replace_body"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
    - capability: "http_request_replace_method"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
    - capability: "http_request_replace_path"
      target:
        app: "shipping"
        method: "POST"
        namespace: "otel-demo"
        path: "/ship-order"
        port: 8080
    - capability: "dns_error"
      target:
        app: "shipping"
        domain_patterns:
          - "quote"
        namespace: "otel-demo"
    - capability: "dns_random"
      target:
        app: "shipping"
        domain_patterns:
          - "quote"
        namespace: "otel-demo"
    - capability: "network_delay"
      target:
        namespace: "otel-demo"
        source_app: "shipping"
        span_names:
          - "POST /getquote"
        target_service: "quote"
    - capability: "network_loss"
      target:
        namespace: "otel-demo"
        source_app: "shipping"
        span_names:
          - "POST /getquote"
        target_service: "quote"
    - capability: "network_duplicate"
      target:
        namespace: "otel-demo"
        source_app: "shipping"
        span_names:
          - "POST /getquote"
        target_service: "quote"
    - capability: "network_corrupt"
      target:
        namespace: "otel-demo"
        source_app: "shipping"
        span_names:
          - "POST /getquote"
        target_service: "quote"
    - capability: "network_bandwidth"
      target:
        namespace: "otel-demo"
        source_app: "shipping"
        span_names:
          - "POST /getquote"
        target_service: "quote"
    - capability: "network_partition"
      target:
        namespace: "otel-demo"
        source_app: "shipping"
        span_names:
          - "POST /getquote"
        target_service: "quote"
