apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: fraud-detection
  system: otel-demo
spec:
  points:
  - capability: http_request_replace_method
    target:
      app: fraud-detection
      method: POST
      namespace: otel-demo
      path: /flagd.evaluation.v1.Service/EventStream
      port: 8013
  - capability: http_request_replace_path
    target:
      app: fraud-detection
      method: POST
      namespace: otel-demo
      path: /flagd.evaluation.v1.Service/EventStream
      port: 8013
  - capability: http_response_abort
    target:
      app: fraud-detection
      method: POST
      namespace: otel-demo
      path: /flagd.evaluation.v1.Service/EventStream
      port: 8013
  - capability: http_response_delay
    target:
      app: fraud-detection
      method: POST
      namespace: otel-demo
      path: /flagd.evaluation.v1.Service/EventStream
      port: 8013
  - capability: http_response_patch_body
    target:
      app: fraud-detection
      method: POST
      namespace: otel-demo
      path: /flagd.evaluation.v1.Service/EventStream
      port: 8013
  - capability: http_response_replace_body
    target:
      app: fraud-detection
      method: POST
      namespace: otel-demo
      path: /flagd.evaluation.v1.Service/EventStream
      port: 8013
  - capability: http_response_replace_code
    target:
      app: fraud-detection
      method: POST
      namespace: otel-demo
      path: /flagd.evaluation.v1.Service/EventStream
      port: 8013
  replace_scope: service
