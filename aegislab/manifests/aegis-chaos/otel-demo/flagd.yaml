apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "flagd"
  system: "otel-demo"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "flagd"
        namespace: "otel-demo"
    - capability: "pod_failure"
      target:
        app: "flagd"
        namespace: "otel-demo"
    - capability: "container_kill"
      target:
        app: "flagd"
        container: "flagd"
        namespace: "otel-demo"
    - capability: "cpu_stress"
      target:
        app: "flagd"
        container: "flagd"
        namespace: "otel-demo"
    - capability: "time_skew"
      target:
        app: "flagd"
        container: "flagd"
        namespace: "otel-demo"
    - capability: "http_request_delay"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
        server_address: "flagd"
        span_name: "flagd.ofrep"
    - capability: "http_request_abort"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
        server_address: "flagd"
        span_name: "flagd.ofrep"
    - capability: "http_response_abort"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
    - capability: "http_response_delay"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
    - capability: "http_response_replace_code"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
    - capability: "http_response_patch_body"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
    - capability: "http_response_replace_body"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
    - capability: "http_request_replace_method"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
    - capability: "http_request_replace_path"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/ofrep/v1/evaluate/flags/loadGeneratorFloodHomepage"
        port: 8016
    - capability: "http_request_delay"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/flagd.evaluation.v1.Service/ResolveBoolean"
        server_address: "flagd"
    - capability: "http_request_abort"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/flagd.evaluation.v1.Service/ResolveBoolean"
        server_address: "flagd"
    - capability: "http_request_delay"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/flagd.evaluation.v1.Service/ResolveInt"
        server_address: "flagd"
    - capability: "http_request_abort"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/flagd.evaluation.v1.Service/ResolveInt"
        server_address: "flagd"
    - capability: "http_request_delay"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/flagd.evaluation.v1.Service/ResolveFloat"
        server_address: "flagd"
    - capability: "http_request_abort"
      target:
        app: "flagd"
        method: "POST"
        namespace: "otel-demo"
        path: "/flagd.evaluation.v1.Service/ResolveFloat"
        server_address: "flagd"
