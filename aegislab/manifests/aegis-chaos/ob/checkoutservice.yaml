apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "checkoutservice"
  system: "ob"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "checkoutservice"
        container: "checkoutservice"
        namespace: "ob"
    - capability: "cpu_stress"
      target:
        app: "checkoutservice"
        container: "checkoutservice"
        namespace: "ob"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CartService/EmptyCart"
        port: 7070
        server_address: "cartservice"
        span_name: "hipstershop.CartService/EmptyCart"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CartService/GetCart"
        port: 7070
        server_address: "cartservice"
        span_name: "hipstershop.CartService/GetCart"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CheckoutService/PlaceOrder"
        port: 5050
        server_address: "checkoutservice"
        span_name: "hipstershop.CheckoutService/PlaceOrder"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CurrencyService/Convert"
        port: 7000
        server_address: "currencyservice"
        span_name: "hipstershop.CurrencyService/Convert"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.EmailService/SendOrderConfirmation"
        port: 5000
        server_address: "emailservice"
        span_name: "hipstershop.EmailService/SendOrderConfirmation"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.PaymentService/Charge"
        port: 50051
        server_address: "paymentservice"
        span_name: "hipstershop.PaymentService/Charge"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ProductCatalogService/GetProduct"
        port: 3550
        server_address: "productcatalogservice"
        span_name: "hipstershop.ProductCatalogService/GetProduct"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ShippingService/GetQuote"
        port: 50051
        server_address: "shippingservice"
        span_name: "hipstershop.ShippingService/GetQuote"
    - capability: "http_request_abort"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ShippingService/ShipOrder"
        port: 50051
        server_address: "shippingservice"
        span_name: "hipstershop.ShippingService/ShipOrder"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CartService/EmptyCart"
        port: 7070
        server_address: "cartservice"
        span_name: "hipstershop.CartService/EmptyCart"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CartService/GetCart"
        port: 7070
        server_address: "cartservice"
        span_name: "hipstershop.CartService/GetCart"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CheckoutService/PlaceOrder"
        port: 5050
        server_address: "checkoutservice"
        span_name: "hipstershop.CheckoutService/PlaceOrder"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CurrencyService/Convert"
        port: 7000
        server_address: "currencyservice"
        span_name: "hipstershop.CurrencyService/Convert"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.EmailService/SendOrderConfirmation"
        port: 5000
        server_address: "emailservice"
        span_name: "hipstershop.EmailService/SendOrderConfirmation"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.PaymentService/Charge"
        port: 50051
        server_address: "paymentservice"
        span_name: "hipstershop.PaymentService/Charge"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ProductCatalogService/GetProduct"
        port: 3550
        server_address: "productcatalogservice"
        span_name: "hipstershop.ProductCatalogService/GetProduct"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ShippingService/GetQuote"
        port: 50051
        server_address: "shippingservice"
        span_name: "hipstershop.ShippingService/GetQuote"
    - capability: "http_request_delay"
      target:
        app: "checkoutservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ShippingService/ShipOrder"
        port: 50051
        server_address: "shippingservice"
        span_name: "hipstershop.ShippingService/ShipOrder"
    - capability: "memory_stress"
      target:
        app: "checkoutservice"
        container: "checkoutservice"
        namespace: "ob"
    - capability: "pod_failure"
      target:
        app: "checkoutservice"
        namespace: "ob"
    - capability: "pod_kill"
      target:
        app: "checkoutservice"
        namespace: "ob"
    - capability: "time_skew"
      target:
        app: "checkoutservice"
        container: "checkoutservice"
        namespace: "ob"
