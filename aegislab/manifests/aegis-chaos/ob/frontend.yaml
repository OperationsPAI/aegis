apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "frontend"
  system: "ob"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "frontend"
        container: "frontend"
        namespace: "ob"
    - capability: "cpu_stress"
      target:
        app: "frontend"
        container: "frontend"
        namespace: "ob"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.AdService/GetAds"
        port: 9555
        server_address: "adservice"
        span_name: "hipstershop.AdService/GetAds"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CartService/AddItem"
        port: 7070
        server_address: "cartservice"
        span_name: "hipstershop.CartService/AddItem"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CartService/GetCart"
        port: 7070
        server_address: "cartservice"
        span_name: "hipstershop.CartService/GetCart"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CheckoutService/PlaceOrder"
        port: 5050
        server_address: "checkoutservice"
        span_name: "hipstershop.CheckoutService/PlaceOrder"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CurrencyService/Convert"
        port: 7000
        server_address: "currencyservice"
        span_name: "hipstershop.CurrencyService/Convert"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CurrencyService/GetSupportedCurrencies"
        port: 7000
        server_address: "currencyservice"
        span_name: "hipstershop.CurrencyService/GetSupportedCurrencies"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ProductCatalogService/GetProduct"
        port: 3550
        server_address: "productcatalogservice"
        span_name: "hipstershop.ProductCatalogService/GetProduct"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ProductCatalogService/ListProducts"
        port: 3550
        server_address: "productcatalogservice"
        span_name: "hipstershop.ProductCatalogService/ListProducts"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.RecommendationService/ListRecommendations"
        port: 8080
        server_address: "recommendationservice"
        span_name: "hipstershop.RecommendationService/ListRecommendations"
    - capability: "http_request_abort"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ShippingService/GetQuote"
        port: 50051
        server_address: "shippingservice"
        span_name: "hipstershop.ShippingService/GetQuote"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.AdService/GetAds"
        port: 9555
        server_address: "adservice"
        span_name: "hipstershop.AdService/GetAds"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CartService/AddItem"
        port: 7070
        server_address: "cartservice"
        span_name: "hipstershop.CartService/AddItem"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CartService/GetCart"
        port: 7070
        server_address: "cartservice"
        span_name: "hipstershop.CartService/GetCart"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CheckoutService/PlaceOrder"
        port: 5050
        server_address: "checkoutservice"
        span_name: "hipstershop.CheckoutService/PlaceOrder"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CurrencyService/Convert"
        port: 7000
        server_address: "currencyservice"
        span_name: "hipstershop.CurrencyService/Convert"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.CurrencyService/GetSupportedCurrencies"
        port: 7000
        server_address: "currencyservice"
        span_name: "hipstershop.CurrencyService/GetSupportedCurrencies"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ProductCatalogService/GetProduct"
        port: 3550
        server_address: "productcatalogservice"
        span_name: "hipstershop.ProductCatalogService/GetProduct"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ProductCatalogService/ListProducts"
        port: 3550
        server_address: "productcatalogservice"
        span_name: "hipstershop.ProductCatalogService/ListProducts"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.RecommendationService/ListRecommendations"
        port: 8080
        server_address: "recommendationservice"
        span_name: "hipstershop.RecommendationService/ListRecommendations"
    - capability: "http_request_delay"
      target:
        app: "frontend"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.ShippingService/GetQuote"
        port: 50051
        server_address: "shippingservice"
        span_name: "hipstershop.ShippingService/GetQuote"
    - capability: "memory_stress"
      target:
        app: "frontend"
        container: "frontend"
        namespace: "ob"
    - capability: "pod_failure"
      target:
        app: "frontend"
        namespace: "ob"
    - capability: "pod_kill"
      target:
        app: "frontend"
        namespace: "ob"
    - capability: "time_skew"
      target:
        app: "frontend"
        container: "frontend"
        namespace: "ob"
