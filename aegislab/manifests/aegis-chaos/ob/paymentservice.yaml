apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "paymentservice"
  system: "ob"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "paymentservice"
        container: "paymentservice"
        namespace: "ob"
    - capability: "cpu_stress"
      target:
        app: "paymentservice"
        container: "paymentservice"
        namespace: "ob"
    - capability: "http_request_abort"
      target:
        app: "paymentservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.PaymentService/Charge"
        port: 50051
        server_address: "paymentservice"
        span_name: "grpc.hipstershop.PaymentService/Charge"
    - capability: "http_request_delay"
      target:
        app: "paymentservice"
        method: "POST"
        namespace: "ob"
        path: "/hipstershop.PaymentService/Charge"
        port: 50051
        server_address: "paymentservice"
        span_name: "grpc.hipstershop.PaymentService/Charge"
    - capability: "memory_stress"
      target:
        app: "paymentservice"
        container: "paymentservice"
        namespace: "ob"
    - capability: "pod_failure"
      target:
        app: "paymentservice"
        namespace: "ob"
    - capability: "pod_kill"
      target:
        app: "paymentservice"
        namespace: "ob"
    - capability: "time_skew"
      target:
        app: "paymentservice"
        container: "paymentservice"
        namespace: "ob"
