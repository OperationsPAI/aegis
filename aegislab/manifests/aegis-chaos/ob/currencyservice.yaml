apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "currencyservice"
  system: "ob"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "currencyservice"
        container: "currencyservice"
        namespace: "ob"
    - capability: "cpu_stress"
      target:
        app: "currencyservice"
        container: "currencyservice"
        namespace: "ob"
    - capability: "memory_stress"
      target:
        app: "currencyservice"
        container: "currencyservice"
        namespace: "ob"
    - capability: "pod_failure"
      target:
        app: "currencyservice"
        namespace: "ob"
    - capability: "pod_kill"
      target:
        app: "currencyservice"
        namespace: "ob"
    - capability: "time_skew"
      target:
        app: "currencyservice"
        container: "currencyservice"
        namespace: "ob"
