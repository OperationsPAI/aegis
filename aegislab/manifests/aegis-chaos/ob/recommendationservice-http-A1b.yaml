apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: seed-genesis
  instance: seed
  service: recommendationservice
  system: ob
spec:
  points:
  - capability: http_request_replace_method
    target:
      app: recommendationservice
      method: POST
      namespace: ob
      path: /hipstershop.ProductCatalogService/ListProducts
      port: 3550
  - capability: http_request_replace_path
    target:
      app: recommendationservice
      method: POST
      namespace: ob
      path: /hipstershop.ProductCatalogService/ListProducts
      port: 3550
  - capability: http_response_abort
    target:
      app: recommendationservice
      method: POST
      namespace: ob
      path: /hipstershop.ProductCatalogService/ListProducts
      port: 3550
  - capability: http_response_delay
    target:
      app: recommendationservice
      method: POST
      namespace: ob
      path: /hipstershop.ProductCatalogService/ListProducts
      port: 3550
  - capability: http_response_patch_body
    target:
      app: recommendationservice
      method: POST
      namespace: ob
      path: /hipstershop.ProductCatalogService/ListProducts
      port: 3550
  - capability: http_response_replace_body
    target:
      app: recommendationservice
      method: POST
      namespace: ob
      path: /hipstershop.ProductCatalogService/ListProducts
      port: 3550
  - capability: http_response_replace_code
    target:
      app: recommendationservice
      method: POST
      namespace: ob
      path: /hipstershop.ProductCatalogService/ListProducts
      port: 3550
  replace_scope: service
