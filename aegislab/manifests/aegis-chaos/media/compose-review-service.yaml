apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "compose-review-service"
  system: "media"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "compose-review-service"
        namespace: "media"
    - capability: "pod_failure"
      target:
        app: "compose-review-service"
        namespace: "media"
    - capability: "container_kill"
      target:
        app: "compose-review-service"
        container: "compose-review-service"
        namespace: "media"
    - capability: "cpu_stress"
      target:
        app: "compose-review-service"
        container: "compose-review-service"
        namespace: "media"
    - capability: "time_skew"
      target:
        app: "compose-review-service"
        container: "compose-review-service"
        namespace: "media"
    - capability: "http_request_delay"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadMovieId"
        server_address: "compose-review-service"
    - capability: "http_request_abort"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadMovieId"
        server_address: "compose-review-service"
    - capability: "http_request_delay"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadRating"
        server_address: "compose-review-service"
    - capability: "http_request_abort"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadRating"
        server_address: "compose-review-service"
    - capability: "http_request_delay"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadText"
        server_address: "compose-review-service"
    - capability: "http_request_abort"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadText"
        server_address: "compose-review-service"
    - capability: "http_request_delay"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadUniqueId"
        server_address: "compose-review-service"
    - capability: "http_request_abort"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadUniqueId"
        server_address: "compose-review-service"
    - capability: "http_request_delay"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadUserId"
        server_address: "compose-review-service"
    - capability: "http_request_abort"
      target:
        app: "compose-review-service"
        method: "POST"
        namespace: "media"
        path: "/ComposeReviewService/UploadUserId"
        server_address: "compose-review-service"
    - capability: "dns_error"
      target:
        app: "compose-review-service"
        domain_patterns:
          - "review-storage-service"
        namespace: "media"
    - capability: "dns_random"
      target:
        app: "compose-review-service"
        domain_patterns:
          - "review-storage-service"
        namespace: "media"
    - capability: "network_delay"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "StoreReview"
        target_service: "review-storage-service"
    - capability: "network_loss"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "StoreReview"
        target_service: "review-storage-service"
    - capability: "network_duplicate"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "StoreReview"
        target_service: "review-storage-service"
    - capability: "network_corrupt"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "StoreReview"
        target_service: "review-storage-service"
    - capability: "network_bandwidth"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "StoreReview"
        target_service: "review-storage-service"
    - capability: "network_partition"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "StoreReview"
        target_service: "review-storage-service"
    - capability: "dns_error"
      target:
        app: "compose-review-service"
        domain_patterns:
          - "movie-review-service"
        namespace: "media"
    - capability: "dns_random"
      target:
        app: "compose-review-service"
        domain_patterns:
          - "movie-review-service"
        namespace: "media"
    - capability: "network_delay"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadMovieReview"
        target_service: "movie-review-service"
    - capability: "network_loss"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadMovieReview"
        target_service: "movie-review-service"
    - capability: "network_duplicate"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadMovieReview"
        target_service: "movie-review-service"
    - capability: "network_corrupt"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadMovieReview"
        target_service: "movie-review-service"
    - capability: "network_bandwidth"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadMovieReview"
        target_service: "movie-review-service"
    - capability: "network_partition"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadMovieReview"
        target_service: "movie-review-service"
    - capability: "dns_error"
      target:
        app: "compose-review-service"
        domain_patterns:
          - "user-review-service"
        namespace: "media"
    - capability: "dns_random"
      target:
        app: "compose-review-service"
        domain_patterns:
          - "user-review-service"
        namespace: "media"
    - capability: "network_delay"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadUserReview"
        target_service: "user-review-service"
    - capability: "network_loss"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadUserReview"
        target_service: "user-review-service"
    - capability: "network_duplicate"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadUserReview"
        target_service: "user-review-service"
    - capability: "network_corrupt"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadUserReview"
        target_service: "user-review-service"
    - capability: "network_bandwidth"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadUserReview"
        target_service: "user-review-service"
    - capability: "network_partition"
      target:
        namespace: "media"
        source_app: "compose-review-service"
        span_names:
          - "UploadUserReview"
        target_service: "user-review-service"
