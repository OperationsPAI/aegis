apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "observed-genesis"
  instance: "observed"
  service: "movie-review-service"
  system: "media"
spec:
  replace_scope: "service"
  points:
    - capability: "pod_kill"
      target:
        app: "movie-review-service"
        namespace: "media"
    - capability: "pod_failure"
      target:
        app: "movie-review-service"
        namespace: "media"
    - capability: "container_kill"
      target:
        app: "movie-review-service"
        container: "movie-review-service"
        namespace: "media"
    - capability: "cpu_stress"
      target:
        app: "movie-review-service"
        container: "movie-review-service"
        namespace: "media"
    - capability: "time_skew"
      target:
        app: "movie-review-service"
        container: "movie-review-service"
        namespace: "media"
    - capability: "dns_error"
      target:
        app: "movie-review-service"
        domain_patterns:
          - "review-storage-service"
        namespace: "media"
    - capability: "dns_random"
      target:
        app: "movie-review-service"
        domain_patterns:
          - "review-storage-service"
        namespace: "media"
    - capability: "network_delay"
      target:
        namespace: "media"
        source_app: "movie-review-service"
        span_names:
          - "ReadReviews"
        target_service: "review-storage-service"
    - capability: "network_loss"
      target:
        namespace: "media"
        source_app: "movie-review-service"
        span_names:
          - "ReadReviews"
        target_service: "review-storage-service"
    - capability: "network_duplicate"
      target:
        namespace: "media"
        source_app: "movie-review-service"
        span_names:
          - "ReadReviews"
        target_service: "review-storage-service"
    - capability: "network_corrupt"
      target:
        namespace: "media"
        source_app: "movie-review-service"
        span_names:
          - "ReadReviews"
        target_service: "review-storage-service"
    - capability: "network_bandwidth"
      target:
        namespace: "media"
        source_app: "movie-review-service"
        span_names:
          - "ReadReviews"
        target_service: "review-storage-service"
    - capability: "network_partition"
      target:
        namespace: "media"
        source_app: "movie-review-service"
        span_names:
          - "ReadReviews"
        target_service: "review-storage-service"
