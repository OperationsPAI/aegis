apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "unique-id-service"
  system: "media"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "unique-id-service"
        container: "unique-id-service"
        namespace: "media"
    - capability: "cpu_stress"
      target:
        app: "unique-id-service"
        container: "unique-id-service"
        namespace: "media"
    - capability: "http_request_abort"
      target:
        app: "unique-id-service"
        method: "POST"
        namespace: "media"
        path: "/UniqueIdService/UploadUniqueId"
        port: 9090
        server_address: "unique-id-service"
        span_name: "UploadUniqueId"
    - capability: "http_request_delay"
      target:
        app: "unique-id-service"
        method: "POST"
        namespace: "media"
        path: "/UniqueIdService/UploadUniqueId"
        port: 9090
        server_address: "unique-id-service"
        span_name: "UploadUniqueId"
    - capability: "memory_stress"
      target:
        app: "unique-id-service"
        container: "unique-id-service"
        namespace: "media"
    - capability: "pod_failure"
      target:
        app: "unique-id-service"
        namespace: "media"
    - capability: "pod_kill"
      target:
        app: "unique-id-service"
        namespace: "media"
    - capability: "time_skew"
      target:
        app: "unique-id-service"
        container: "unique-id-service"
        namespace: "media"
