apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "post-storage-service"
  system: "sn"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "post-storage-service"
        container: "post-storage-service"
        namespace: "sn"
    - capability: "cpu_stress"
      target:
        app: "post-storage-service"
        container: "post-storage-service"
        namespace: "sn"
    - capability: "http_request_abort"
      target:
        app: "post-storage-service"
        method: "POST"
        namespace: "sn"
        path: "/PostStorageService/ReadPosts"
        port: 9090
        server_address: "post-storage-service"
        span_name: "post_storage_read_posts_server"
    - capability: "http_request_delay"
      target:
        app: "post-storage-service"
        method: "POST"
        namespace: "sn"
        path: "/PostStorageService/ReadPosts"
        port: 9090
        server_address: "post-storage-service"
        span_name: "post_storage_read_posts_server"
    - capability: "memory_stress"
      target:
        app: "post-storage-service"
        container: "post-storage-service"
        namespace: "sn"
    - capability: "pod_failure"
      target:
        app: "post-storage-service"
        namespace: "sn"
    - capability: "pod_kill"
      target:
        app: "post-storage-service"
        namespace: "sn"
    - capability: "time_skew"
      target:
        app: "post-storage-service"
        container: "post-storage-service"
        namespace: "sn"
