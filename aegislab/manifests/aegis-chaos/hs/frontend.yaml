      target:
        app: "frontend"
        namespace: "hs"
    - capability: "pod_failure"
      target:
        app: "frontend"
        namespace: "hs"
    - capability: "container_kill"
      target:
        app: "frontend"
        container: "frontend"
        namespace: "hs"
