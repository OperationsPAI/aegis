        app: "frontend"
        container: "frontend"
        namespace: "hs"
    - capability: "time_skew"
      target:
        app: "frontend"
        container: "frontend"
        namespace: "hs"
    - capability: "dns_error"
      target:
        app: "frontend"
        domain_patterns:
          - "profile"
        namespace: "hs"
    - capability: "dns_random"
      target:
        app: "frontend"
        domain_patterns:
          - "profile"
        namespace: "hs"
    - capability: "network_delay"
      target:
        namespace: "hs"
        source_app: "frontend"
        span_names:
          - "profile.Profile/GetProfiles"
        target_service: "profile"
    - capability: "network_loss"
      target:
        namespace: "hs"
        source_app: "frontend"
        span_names:
          - "profile.Profile/GetProfiles"
