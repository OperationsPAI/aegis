apiVersion: aegis-chaos/v1beta
kind: PointManifest
metadata:
  chart_version: "seed-genesis"
  instance: "seed"
  service: "search"
  system: "hs"
spec:
  replace_scope: "service"
  points:
    - capability: "container_kill"
      target:
        app: "search"
        container: "search"
        namespace: "hs"
    - capability: "cpu_stress"
      target:
        app: "search"
        container: "search"
        namespace: "hs"
    - capability: "http_request_abort"
      target:
        app: "search"
        method: "POST"
        namespace: "hs"
        path: "/geo.Geo/Nearby"
        port: 8083
        server_address: "geo"
        span_name: "geo.Geo/Nearby"
    - capability: "http_request_abort"
      target:
        app: "search"
        method: "POST"
        namespace: "hs"
        path: "/rate.Rate/GetRates"
        port: 8084
        server_address: "rate"
        span_name: "rate.Rate/GetRates"
    - capability: "http_request_abort"
      target:
        app: "search"
        method: "POST"
        namespace: "hs"
        path: "/search.Search/Nearby"
        port: 8082
        server_address: "search"
        span_name: "search.Search/Nearby"
    - capability: "http_request_delay"
      target:
        app: "search"
        method: "POST"
        namespace: "hs"
        path: "/geo.Geo/Nearby"
        port: 8083
        server_address: "geo"
        span_name: "geo.Geo/Nearby"
    - capability: "http_request_delay"
      target:
        app: "search"
        method: "POST"
        namespace: "hs"
        path: "/rate.Rate/GetRates"
        port: 8084
        server_address: "rate"
        span_name: "rate.Rate/GetRates"
    - capability: "http_request_delay"
      target:
        app: "search"
        method: "POST"
        namespace: "hs"
        path: "/search.Search/Nearby"
        port: 8082
        server_address: "search"
        span_name: "search.Search/Nearby"
    - capability: "memory_stress"
      target:
        app: "search"
        container: "search"
        namespace: "hs"
    - capability: "pod_failure"
      target:
        app: "search"
        namespace: "hs"
    - capability: "pod_kill"
      target:
        app: "search"
        namespace: "hs"
    - capability: "time_skew"
      target:
        app: "search"
        container: "search"
        namespace: "hs"
