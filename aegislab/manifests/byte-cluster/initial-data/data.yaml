  - type: 2
    name: teastore
    is_public: true
    status: 1
    versions:
      # Bumped 0.1.5 → 0.1.6 to retarget OTel exporter and Instrumentation
      # CR at the per-system teastore collector (#303 step 2b). Reseed honors
      # the immutability contract on already-seeded versions.
      - name: 0.1.6
        github_link: LGU-SE-Internal/TeaStore
        status: 1
        helm_config:
          version: 0.1.4
          chart_name: teastore
          repo_name: lgu-tea
          repo_url: https://lgu-se-internal.github.io/TeaStore
          values:
            - key: global.image.registry
              type: 0
              category: 1
              value_type: 0
              default_value: pair-cn-shanghai.cr.volces.com/opspai
              overridable: true
            - key: global.image.tag
              type: 0
              category: 1
              value_type: 0
              default_value: 20260423-2b3fd43
              overridable: true
            - key: opentelemetry.otlpEndpoint
              type: 0
              category: 1
              value_type: 0
              default_value: http://opentelemetry-kube-stack-deployment-teastore-collector.monitoring.svc.cluster.local:4317
              overridable: true
            # 0.1.1 parameterizes the inject-<language> annotation from these
            # two values (previously hardcoded to "monitoring/opentelemetry-kube-stack").
            # Point at the Byte cluster's monitoring-stack naming.
            - key: opentelemetry.monitoringNamespace
              type: 0
              category: 1
              value_type: 0
              default_value: monitoring
              overridable: true
            - key: opentelemetry.instrumentationName
              type: 0
              category: 1
              value_type: 0
              default_value: otel-instr-teastore
              overridable: true
            # 0.1.2 makes the busybox image used by jmeter's wait-for-registry
            # init container configurable (LGU-SE-Internal/TeaStore#8). The Byte
            # cluster cannot reach docker.io, so default to the volces mirror.
            - key: jmeter.waitForRegistryImage.registry
              type: 0
              category: 1
              value_type: 0
              default_value: pair-cn-shanghai.cr.volces.com/opspai
              overridable: true
            - key: jmeter.waitForRegistryImage.repository
              type: 0
              category: 1
              value_type: 0
              default_value: busybox
              overridable: true
            - key: jmeter.waitForRegistryImage.tag
              type: 0
              category: 1
              value_type: 0
              default_value: "1.36"
              overridable: true
            - key: jmeter.waitForRegistryImage.pullPolicy
              type: 0
              category: 1
              value_type: 0
              default_value: IfNotPresent
              overridable: true
          status: 1
