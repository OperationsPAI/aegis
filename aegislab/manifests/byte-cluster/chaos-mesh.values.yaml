images:
  # Use the OperationsPAI fork of chaos-mesh, mirrored from docker.io/opspai/* via
  # the Volces Shanghai pair registry. The fork carries patches we need
  # (notably RuntimeMutatorChaos / mutator-agent JVM injection) that upstream
  # v2.8.0 does not have.
  registry: pair-cn-shanghai.cr.volces.com/opspai
  tag: 20260425-517f3df

# The chart's default per-image `repository` values are `chaos-mesh/<name>`,
# which would resolve to `pair-cn-shanghai.cr.volces.com/opspai/chaos-mesh/<name>`
# under the registry above. Override each component's repository to drop the
# `chaos-mesh/` prefix so images resolve to opspai/<name>.
controllerManager:
  image:
    repository: chaos-mesh
    # mysql-fix spans BOTH the controller (JVMChaos mysql CR rendering) and the
    # chaos-daemon (target-JVM javaagent SQL parse/throw), so the controller
    # carries 20260612-mysql-fix-v2 too — overriding the global tag below.
    # Dashboard has no relevant change → stays on the global tag.
    tag: 20260612-mysql-fix-v2
  podChaos:
    podFailure:
      pauseImage: pair-diag-cn-guangzhou.cr.volces.com/pair/google-containers/pause:latest

chaosDaemon:
  hostNetwork: true
  runtime: containerd
  socketPath: /run/containerd/containerd.sock
  # byte-cluster CNI = Cello + Cilium IPVLAN datapath. tproxy's default bridge
  # mode dies trying to enslave pod eth0 (IPVLAN child) to a bridge, so all
  # HTTPChaos campaigns fail at startup. The bridgeless image switches tproxy
  # to install TPROXY rules directly in the pod netns. Inbound only —
  # `direction: from` is unworkable on this CNI (BPF tc-egress bypasses
  # iptables). See OperationsPAI/chaos-tproxy docs/bridgeless-mode.md.
  tproxyBridgeless: true
  image:
    repository: chaos-daemon
    # Carries: (a) bridgeless tproxy (OperationsPAI/chaos-tproxy@8ec81d9 +
    # OperationsPAI/chaos-mesh@52026165), (b) distroless-target fix from
    # 20260515-nsexec-fix-v2 lineage, (c) jvm_mysql fix — v1 (mysql-fix) stopped
    # the JVMChaos mysql-action parseSQL null-SQL NPE, but the fault still was
    # NOT thrown on matching queries (verified 2026-06-12 on ts route/food:
    # AllInjected=True, 0 `aegis-injected MySQL fault` even on hot tables);
    # v2 (mysql-fix-v2) follows up on the fault-throwing path itself.
    # dashboard has no relevant code change so it stays on the global tag above;
    # controller-manager carries the same mysql-fix-v2 (set in its own image block).
    tag: 20260612-mysql-fix-v2

dashboard:
  image:
    repository: chaos-dashboard

# chaos-coredns is upstream (only DNSChaos needs it; no fork patches).
# Pin it to the existing pair/ mirror of upstream chaos-mesh/chaos-coredns
# so we don't have to re-mirror it under opspai.
dnsServer:
  image:
    registry: pair-diag-cn-guangzhou.cr.volces.com/pair
    repository: chaos-mesh/chaos-coredns
    tag: v0.2.6
