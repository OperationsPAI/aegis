name: hotelreservation-guided
description: Canonical hotelreservation smoke case (DeathStarBench Go microservices) for local/e2e validation.
project_name: pair_diagnosis
submit:
  pedestal:
    name: hs
    version: "0.1.6"
  benchmark:
    name: clickhouse
    version: "1.0.0"
  interval: 3
  pre_duration: 1
  algorithms:
    - name: random
      version: "1.0.0"
  labels:
    - key: env
      value: local
    - key: batch
      value: smoke
    - key: run
      value: sum-optional-20260421
  specs:
    - - system: hs
        system_type: hs
        namespace: hs0
        app: profile
        chaos_type: PodFailure
validation:
  timeout_seconds: 3000
  min_events: 6
  # HS ships dsb-wrk2 as the bundled loadgen, so PodFailure on `profile`
  # lands inside live traffic and the detector finds real anomaly signal
  # (verified 2026-05-22: anomaly_count=2 on the smoke run). The chain
  # therefore terminates at `algorithm.result.collection`, not the
  # quieter-pedestal shortcut `datapack.no_anomaly`.
  expected_final_event: algorithm.result.collection
  required_events:
    - restart.pedestal.started
    - fault.injection.started
    - datapack.build.started
    - algorithm.run.started
    - algorithm.result.collection
  required_task_chain:
    - RestartPedestal
    - FaultInjection
    - BuildDatapack
    - RunAlgorithm
    - CollectResult
