name: hotelreservation-guided
description: Canonical hotelreservation smoke case (DeathStarBench Go microservices) for local/e2e validation.
project_name: pair_diagnosis
submit:
  pedestal:
    name: hs
    version: "0.1.1"
  benchmark:
    name: clickhouse
    version: "1.0.0"
  interval: 3
  pre_duration: 1
  algorithms:
    - name: random
      version: "1.0.0"
  labels:
    - key: env
      value: local
    - key: batch
      value: smoke
    - key: run
      value: sum-optional-20260421
  specs:
    - - system: hs
        system_type: hs
        namespace: hs0
        app: user
        chaos_type: PodKill
        duration: 5
validation:
  timeout_seconds: 3000
  min_events: 6
  expected_final_event: datapack.no_anomaly
  required_events:
    - restart.pedestal.started
    - fault.injection.started
    - datapack.build.started
    - algorithm.run.started
    - datapack.no_anomaly
  required_task_chain:
    - RestartPedestal
    - FaultInjection
    - BuildDatapack
    - RunAlgorithm
    - CollectResult
