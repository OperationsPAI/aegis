name: ob-guided
description: Canonical onlineboutique smoke case used by local/e2e validation.
project_name: pair_diagnosis
submit:
  pedestal:
    name: ob
    version: "1.0.0"
  benchmark:
    name: clickhouse
    version: "1.0.0"
  interval: 2
  pre_duration: 1
  algorithms:
    - name: random
      version: "1.0.0"
  labels:
    - key: env
      value: local
    - key: batch
      value: smoke
  specs:
    - - system: ob
        system_type: ob
        namespace: ob0
        app: checkoutservice
        chaos_type: PodKill
        duration: 1
validation:
  timeout_seconds: 3000
  min_events: 6
  expected_final_event: datapack.no_anomaly
  required_events:
    - restart.pedestal.started
    - fault.injection.started
    - datapack.build.started
    - algorithm.run.started
    - datapack.no_anomaly
  required_task_chain:
    - RestartPedestal
    - FaultInjection
    - BuildDatapack
    - RunAlgorithm
    - CollectResult
