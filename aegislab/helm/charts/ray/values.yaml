enabled: false

image:
  name: docker.io/opspai/ray-aegis
  tag: 2.56.0-py313
  pullPolicy: IfNotPresent

head:
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi

worker:
  replicas: 2
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi

s3:
  bucket: "aegis-datapack"
  credentialsSecret: "rustfs-admin"
  accessKeyField: "BLOB_S3_DATAPACK_ACCESS_KEY"
  secretKeyField: "BLOB_S3_DATAPACK_SECRET_KEY"

service:
  type: ClusterIP
  dashboardPort: 8265
  clientPort: 10001
