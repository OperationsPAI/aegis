{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chaos.fullname" . }}
spec:
  # Pinned: the reconciler is single-goroutine + 5s poll with no
  # inter-replica coordination; ≥2 replicas race the stickiness gate and
  # double-fire webhooks. Lift only after a leader-elect / distributed
  # lock lands.
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "chaos.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "chaos.fullname" . }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-sa" .Release.Name) }}
      containers:
        - name: chaos
          image: {{ include "chaos.image" . }}
          imagePullPolicy: "{{ include "chaos.imagePullPolicy" . }}"
          args:
            - {{ .Values.binaryName | default "aegis-chaos" }}
            - serve
            - --conf
            - {{ dig "configmap" "configDir" "/etc/aegis" (.Values.global | default dict) }}
            - --port
            - {{ .Values.httpPort | quote }}
          ports:
            - containerPort: {{ .Values.httpPort }}
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          env:
            - name: GOPRIVATE
              value: {{ .Values.env.GOPRIVATE | quote }}
            - name: ENV
              value: {{ .Values.env.ENV | quote }}
            - name: CHAOS_BACKEND_URL
              value: {{ .Values.backendURL | quote }}
            {{- if .Values.serviceAccount.secretName }}
            - name: CHAOS_SA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.serviceAccount.secretName }}
                  key: {{ .Values.serviceAccount.secretKey | default "token" }}
            {{- end }}
            {{- if .Values.webhookBearerSecretRef.name }}
            - name: CHAOS_WEBHOOK_BEARER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.webhookBearerSecretRef.name }}
                  key: {{ .Values.webhookBearerSecretRef.key | default "token" }}
            {{- else if .Values.webhookBearer }}
            - name: CHAOS_WEBHOOK_BEARER
              value: {{ .Values.webhookBearer | quote }}
            {{- end }}
            {{- /*
              §11 step-5b R1 inbound auth: backend → chaos service.
              Reads the SAME shared secret aegis-api stamps as
              CHAOS_OUTBOUND_BEARER so one rotation updates both sides.
              Unset → /v1beta runs open (TrustedHeaderAuth only, kind dev).
            */ -}}
            {{- if .Values.chaosAuth.secretName }}
            - name: CHAOS_INBOUND_BEARER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chaosAuth.secretName }}
                  key: {{ .Values.chaosAuth.secretKey | default "token" }}
            {{- else if .Values.chaosAuth.literal }}
            - name: CHAOS_INBOUND_BEARER
              value: {{ .Values.chaosAuth.literal | quote }}
            {{- end }}
            - name: CHAOS_REQUIRE_BEARER
              value: {{ .Values.chaosAuth.requireBearer | default true | quote }}
            - name: AEGIS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.jwtSecretRef.name | default (printf "%s-auth" .Release.Name) }}
                  key: {{ .Values.auth.jwtSecretRef.key | default "jwt_secret" }}
            {{- with dig "ssoclient" dict (.Values.global | default dict) }}
            - name: SSO_BASE_URL
              value: {{ .baseURL | quote }}
            - name: SSO_JWKS_URL
              value: {{ .jwksURL | quote }}
            - name: SSO_CLIENT_ID
              value: {{ .clientID | quote }}
            {{- if .clientSecretRef.name }}
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .clientSecretRef.name }}
                  key: {{ .clientSecretRef.key }}
                  optional: true
            - name: SSO_CLIENT_SECRET_FILE
              value: {{ $.Values.ssoClient.secretFilePath | quote }}
            {{- end }}
            {{- end }}
            {{- range .Values.extraEnv }}
            - {{ toYaml . | nindent 14 | trim }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: {{ dig "configmap" "configFile" "/etc/aegis/config.prod.toml" (.Values.global | default dict) }}
              subPath: config.prod.toml
      volumes:
        - name: config
          configMap:
            name: {{ .Values.configMap.name | default (printf "%s-rcabench-config" .Release.Name) }}
{{- end }}
