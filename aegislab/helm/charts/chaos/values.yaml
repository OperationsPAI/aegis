# chaos subchart defaults — aegis-chaos microservice.
# Rendering is gated by umbrella `chaos.enabled` (see helm/Chart.yaml).

replicaCount: 1
httpPort: 8086
binaryName: "aegis-chaos"

service:
  type: ClusterIP

serviceAccount:
  name: ""

# Step-1 RBAC: aegis-chaos owns the chaos-mesh.org CRD verbs. §11 step 5c
# removes the same verbs from aegis-backend; until then the two roles
# coexist (each scoped to its own SA).
rbac:
  create: true

auth:
  jwtSecretRef:
    name: ""
    key: "jwt_secret"

configMap:
  name: ""

env:
  ENV: "prod"
  GOPRIVATE: ""

ssoClient:
  secretFilePath: "/etc/aegis/sso/client-secret"

extraEnv: []
extraEnvFrom: []
resources: {}

# Backend hook receiver URL. Empty disables webhook delivery; the
# reconciler still updates row status but skips POST /api/v1/hooks/chaos.
# Umbrella values.yaml fills this in by default (release-aegis-api).
backendURL: ""
