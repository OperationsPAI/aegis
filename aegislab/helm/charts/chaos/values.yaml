# chaos subchart defaults — aegis-chaos microservice.
#
# Default OFF: the §11 migration cut-over to chaos-service runs in
# stages and the umbrella must keep the system behaving exactly as it
# does today (legacy CRD watcher in aegis-backend still owns inject).
# Flip via umbrella `chaos.enabled=true` once chaos-service is deployed
# on the target cluster.

enabled: false
replicaCount: 1
httpPort: 8086
binaryName: "aegis-chaos"

service:
  type: ClusterIP

serviceAccount:
  name: ""

# Step-1 RBAC: aegis-chaos owns the chaos-mesh.org CRD verbs. §11 step 5c
# removes the same verbs from aegis-backend; until then the two roles
# coexist (each scoped to its own SA).
rbac:
  create: true

auth:
  jwtSecretRef:
    name: ""
    key: "jwt_secret"

configMap:
  name: ""

env:
  ENV: "prod"
  GOPRIVATE: ""

ssoClient:
  secretFilePath: "/etc/aegis/sso/client-secret"

extraEnv: []
extraEnvFrom: []
resources: {}
