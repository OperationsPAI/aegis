{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-proxy.fullname" . }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ include "edge-proxy.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.backends.aegisApi.httpPort }}
      targetPort: http
    - name: intake-grpc
      port: {{ .Values.backends.aegisApi.intakeGrpcPort | default 9096 }}
      targetPort: intake-grpc
    {{- if .Values.arl.enabled }}
    - name: arl-http
      port: {{ .Values.arl.port | default 80 }}
      targetPort: arl-http
    {{- end }}
{{- end }}
