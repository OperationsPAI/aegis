{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edge-proxy.fullname" . }}-config
data:
  Caddyfile: |
    {
        admin off
        order aegis_auth before reverse_proxy
        log {
            output stdout
            format json
            level INFO
        }
        {{- if not .Values.tls.enabled }}
        auto_https off
        {{- else }}
        auto_https disable_redirects
        {{- $pub := .Values.global.publicBaseURL | default "" -}}
        {{- $host := regexReplaceAll "^https?://([^/:]+).*$" $pub "${1}" -}}
        {{- if $host }}
        default_sni {{ $host }}
        {{- end }}
        {{- end }}
    }

    {{- $port := int .Values.backends.aegisApi.httpPort -}}
    {{- $siteAddr := printf ":%d" $port -}}
    {{- if .Values.tls.enabled -}}
      {{- $pub := .Values.global.publicBaseURL | default "" -}}
      {{- $host := regexReplaceAll "^https?://([^/:]+).*$" $pub "${1}" -}}
      {{- if $host -}}
        {{- $siteAddr = printf "%s:%d" $host $port -}}
      {{- end -}}
    {{- end -}}
    {{- $addrs := list $siteAddr -}}
    {{- range .Values.global.additionalSiteAddresses | default list -}}
      {{- $addrs = append $addrs . -}}
    {{- end }}

    {{- /* Upstream shortcuts */}}
    {{- $api     := printf "%s-aegis-api:%d" .Release.Name (int .Values.backends.aegisApi.httpPort) }}
    {{- $blob    := printf "%s-blob:%s"      .Release.Name (.Values.backends.blob.port     | default "8085" | toString) }}
    {{- $notify  := printf "%s-notify:%s"    .Release.Name (.Values.backends.notify.port   | default "8084" | toString) }}
    {{- $chaos   := printf "%s-chaos:%s"     .Release.Name (.Values.backends.chaos.port    | default "8086" | toString) }}
    {{- $ch      := .Values.backends.clickhouse.upstream | default "clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local:8123" }}

    {{ join ", " $addrs }} {
        tracing {
            span aegis-edge-proxy
        }
        {{- if .Values.tls.enabled }}
        {{- if .Values.tls.secretName }}
        tls /etc/caddy/tls/tls.crt /etc/caddy/tls/tls.key
        {{- else }}
        tls internal
        {{- end }}
        {{- end }}

        log {
            output stdout
            format json
        }

        aegis_auth {
            jwks_url http://{{ .Release.Name }}-aegis-api:{{ int .Values.backends.aegisApi.httpPort }}/.well-known/jwks.json
            {{- if .Values.global.casdoor.enabled }}
            jwks_url http://{{ .Release.Name }}-casdoor:8000/.well-known/jwks
            {{- end }}
            hmac_key {env.GATEWAY_HMAC_KEY}
            {{- if .Values.aegisAuth.jwksRefreshInterval }}
            jwks_refresh_interval {{ .Values.aegisAuth.jwksRefreshInterval }}
            {{- end }}
        }

        # ─── JWKS (no auth) ───
        handle /.well-known/jwks.json {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ $api }}
        }

        handle_path /v1/* {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ $api }}
        }

        # ─── Auth API ───
        handle /api/v2/auth/* {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ $api }}
        }

        # ─── User/key/role management (jwt) ───
        @iam_jwt {
            path /api/v2/users* /api/v2/api-keys* /api/v2/roles* /api/v2/permissions* /api/v2/resources* /api/v2/github/*
        }
        handle @iam_jwt {
            request_header X-Aegis-Auth-Mode "jwt"
            reverse_proxy {{ $api }}
        }

        # ─── Notify (jwt, portal audience) ───
        handle /api/v2/inbox/* {
            request_header X-Aegis-Auth-Mode "jwt"
            request_header X-Aegis-Required-Audiences "portal"
            reverse_proxy {{ $notify }}
        }

        handle /api/v2/notifications/* {
            request_header X-Aegis-Auth-Mode "jwt"
            reverse_proxy {{ $notify }}
        }

        # ─── Blob ───
        handle /api/v2/blob/raw/* {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ $blob }}
        }

        handle /api/v2/blob/buckets/* {
            request_header X-Aegis-Auth-Mode "jwt_or_service"
            reverse_proxy {{ $blob }} {
                transport http {
                    response_header_timeout 180s
                }
            }
        }

        handle /api/v2/blob/* {
            request_header X-Aegis-Auth-Mode "jwt"
            reverse_proxy {{ $blob }}
        }

        @share {
            path /api/v2/share /api/v2/share/*
        }
        handle @share {
            request_header X-Aegis-Auth-Mode "jwt"
            request_header X-Aegis-Required-Audiences "portal"
            reverse_proxy {{ $blob }}
        }

        handle /s/* {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ $blob }}
        }

        # ─── Pages (no auth — module does its own) ───
        handle /p/* {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ $api }}
        }

        handle /static/pages/* {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ $api }}
        }

        @pages_api {
            path /api/v2/pages /api/v2/pages/*
        }
        handle @pages_api {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ $api }}
        }

        # ─── ClickHouse proxy (jwt, strip prefix) ───
        handle_path /api/v2/clickhouse/* {
            request_header X-Aegis-Auth-Mode "jwt"
            reverse_proxy {{ $ch }}
        }

        # ─── Chaos (jwt, strip prefix) ───
        handle_path /v1beta/chaos/* {
            request_header X-Aegis-Auth-Mode "jwt"
            reverse_proxy {{ $chaos }}
        }

        {{- if .Values.backends.ray.enabled }}
        # ─── Ray Job API (jwt, strip prefix) ───
        handle_path /api/v2/ray/* {
            request_header X-Aegis-Auth-Mode "jwt"
            reverse_proxy {{ .Release.Name }}-ray-head:{{ .Values.backends.ray.dashboardPort | default 8265 }} {
                transport http {
                    response_header_timeout 600s
                }
            }
        }
        {{- end }}

        # ─── Rustfs presigned-URL passthrough (no auth) ───
        @rustfs {
            path /aegis-*
        }
        handle @rustfs {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ .Release.Name }}-rustfs:9000 {
                header_up Host {http.request.hostport}
            }
        }

        {{- if .Values.backends.devAnchors.enabled }}
        # ─── Dev intercept ───
        handle /dev/api/* {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ .Release.Name }}-dev-api:80
        }
        @dev {
            path /dev /dev/*
        }
        handle @dev {
            request_header X-Aegis-Auth-Mode "none"
            reverse_proxy {{ .Release.Name }}-dev-frontend:80
        }
        {{- end }}

        # ─── Health checks (no auth) ───
        handle /healthz {
            request_header X-Aegis-Auth-Mode "none"
            respond `{"status":"ok"}` 200
        }

        handle /readyz {
            request_header X-Aegis-Auth-Mode "none"
            respond `{"status":"ready"}` 200
        }

        {{- if .Values.backends.frontend.enabled }}
        # ─── API catch-all (jwt) → aegis-api ───
        @api {
            path /api/* /metrics /livez
        }
        handle @api {
            request_header X-Aegis-Auth-Mode "jwt"
            reverse_proxy {{ $api }}
        }

        # ─── Frontend catch-all ───
        handle {
            reverse_proxy {{ .Release.Name }}-frontend:{{ .Values.backends.frontend.port | default 80 }}
        }
        {{- else }}
        # No frontend — everything goes to aegis-api
        handle {
            request_header X-Aegis-Auth-Mode "jwt"
            reverse_proxy {{ $api }}
        }
        {{- end }}
    }

    # gRPC intake (direct, no auth)
    :{{ .Values.backends.aegisApi.intakeGrpcPort | default 9096 }} {
        tracing {
            span aegis-edge-proxy-grpc
        }
        reverse_proxy h2c://{{ .Release.Name }}-aegis-api:{{ .Values.backends.aegisApi.intakeGrpcPort | default 9096 }}
    }

    {{- if .Values.arl.enabled }}
    :{{ .Values.arl.port | default 80 }} {
        tracing {
            span aegis-edge-proxy-arl
        }
        reverse_proxy {{ required "arl.upstream is required when arl.enabled" .Values.arl.upstream }}
    }
    {{- end }}
{{- end }}
