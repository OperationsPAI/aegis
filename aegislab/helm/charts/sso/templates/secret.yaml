{{- if and .Values.enabled (not .Values.privateKey.existingSecret) }}
# Aegis SSO private key Secret.
# `helm upgrade` preserves the existing Secret if present; otherwise the
# chart auto-generates a 2048-bit RSA key on first install (same lookup +
# fallback pattern as the parent chart's jwt_secret).
{{- $ssoSecretName := include "sso.secretName" . }}
{{- $existingSso := lookup "v1" "Secret" .Release.Namespace $ssoSecretName }}
{{- $ssoPem := "" }}
{{- if and $existingSso $existingSso.data (index $existingSso.data "sso-private.pem") }}
{{- $ssoPem = index $existingSso.data "sso-private.pem" | b64dec }}
{{- else if .Values.privateKey.pem }}
{{- $ssoPem = .Values.privateKey.pem }}
{{- else }}
{{- $ssoPem = genPrivateKey "rsa" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $ssoSecretName }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{- include "sso.labels" . | nindent 4 }}
type: Opaque
stringData:
  sso-private.pem: |
{{ $ssoPem | indent 4 }}
{{- end }}
