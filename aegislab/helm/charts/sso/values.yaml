# sso subchart defaults.
#
# Self-contained values for the aegis-sso microservice. The parent
# rcabench chart can drive this subchart by setting top-level `sso:`
# overrides (Helm maps top-level keys matching a subchart name into that
# subchart's scope).
#
# Shared cross-chart settings — container image registry, SSO client
# config, config mount paths — are read from `.Values.global.*` so the
# parent chart can publish them in one place without duplicating
# per-microservice.
#
# NOTE: defaults below reference shared in-cluster services by the
# parent release name (`rcabench-mysql`, `rcabench-redis`,
# `rcabench-otel-collector`). When deployed under a different release
# name, override via parent `sso.config.database.mysql.host` etc.

enabled: true
replicaCount: 1

image:
  repository: opspai/rcabench
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 8083
  nodePort: 30083

config:
  name: "sso"
  version: "1.0.0"
  port: 8083
  workspace: "/app"
  binaryName: "sso"
  # cmdutil.RunServe (extracted in commit 215ecee) exposes the SSO
  # entrypoint as `serve`, matching the other extracted microservices.
  # Override to `sso` only if running an older binary.
  subcommand: "serve"
  database:
    mysql:
      host: "rcabench-mysql"
      port: "3306"
      user: "root"
      password: "yourpassword"
      db: "rcabench"
  redis:
    host: "rcabench-redis:6379"
  tracing:
    # OTLP HTTP receiver (host:port — `otlptracehttp.WithEndpoint` expects
    # no scheme). Points at the chart-rendered in-namespace otel-collector
    # which exports to the shared ClickStack ClickHouse.
    endpoint: "rcabench-otel-collector:4318"
  k8s:
    namespace: ""
    serviceAccount:
      name: ""
  sso:
    issuer: "http://rcabench-sso:8083"
    baseURL: "http://rcabench-sso:8083"
    jwksURL: "http://rcabench-sso:8083/.well-known/jwks.json"
    kid: "sso-v1"
    clientID: "aegis-backend"
    backendRedirectURI: ""
    privateKeyPath: "/etc/aegis/sso-private.pem"
    seedSecretDumpPath: "/var/lib/sso/.first-boot-secret"
    # Leave blank to derive from `global.publicBaseURL` (consumed via Helm
    # subchart propagation). When both are empty the seed falls back to
    # localhost so dev clients (`make local-debug`, kind kubeconfig) still
    # work; override explicitly for multi-origin whitelists.
    consoleRedirectURIs: ""
    loginRedirect: ""

privateKey:
  pem: ""
  existingSecret: ""

# First-boot admin password seeded by `seedAdminUser` in
# `aegislab/src/boot/sso/initialization.go`. The seed is idempotent — once
# the admin row exists this value is ignored, so rotation means deleting
# the user (or chunk-resetting the DB) and restarting the pod.
#
# Modes (mutually exclusive, in priority order):
#   - existingSecret: name of a pre-created Secret with `existingSecretKey`
#     (default `admin_password`). Use for sops / sealed-secrets pipelines.
#   - adminPassword: inline value. The chart writes
#     `<release>-sso-bootstrap` automatically with
#     `helm.sh/resource-policy: keep` so re-installs don't churn it.
# Leave both empty to let the SSO pod generate a random hex32 and dump it
# to `/var/lib/sso/.first-boot-secret.admin` (dev / kind default).
bootstrap:
  adminPassword: ""
  existingSecret: ""
  existingSecretKey: "admin_password"

persistence:
  enabled: true
  storageClass: ""
  size: 256Mi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/sso

auth:
  jwtSecret: ""
  secretName: ""

# ServiceAccount binding. Empty `name` falls back to `{{ .Release.Name }}-sa`
# (preserves legacy rcabench parent behavior).
serviceAccount:
  name: ""

# Literal env-var values injected into the container.
env:
  ENV: "prod"

# Arbitrary additional env vars appended as-is (list of `{name,value}` /
# `{name,valueFrom}` maps).
extraEnv: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
