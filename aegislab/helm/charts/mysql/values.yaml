# mysql subchart defaults.
#
# Single-replica MySQL StatefulSet plus its Service. The Service name
# `<release>-mysql` is load-bearing — SSO config, the parent aegis-api
# `[database.mysql]` ConfigMap section, and the `staging` overlay's
# NodePort all reference it by DNS.

enabled: true
replicaCount: 1

image:
  name: mysql
  tag: "8.0.43"
  pullPolicy: IfNotPresent

# Authentication / database. Parent chart mirrors
# `configmap.database.mysql.{db,password}` here so consumers of the
# parent's `[database.mysql]` ConfigMap section stay in sync.
auth:
  db: "rcabench"
  rootPassword: "yourpassword"

service:
  # `staging` env_mode is treated specially below so the existing
  # NodePort override survives extraction; for every other env_mode the
  # subchart renders a ClusterIP.
  type: ClusterIP
  port: 3306
  nodePort: 32206

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClass: "openebs-hostpath"

# `staging` env_mode triggers the NodePort variant of the Service (see
# templates/service.yaml). Driven from the parent so a single value
# governs every release.
envMode: ""

# ServiceAccount binding. Empty `name` falls back to `{{ .Release.Name }}-sa`.
serviceAccount:
  name: ""

# Arbitrary additional env vars appended as-is.
extraEnv: []
