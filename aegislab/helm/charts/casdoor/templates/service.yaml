{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-casdoor
  labels:
    app.kubernetes.io/name: casdoor
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: casdoor
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
