# etcd subchart defaults.
#
# Single-replica etcd StatefulSet plus its headless + external Services.
# Service names `<release>-etcd-headless` and `<release>-etcd-external`
# are load-bearing — the parent aegis-api `[etcd]` ConfigMap section,
# the init-job, several Deployment env vars, and JuiceFS metaurl in some
# overlays all reference them by DNS.

enabled: true
replicaCount: 1

image:
  name: quay.io/coreos/etcd
  tag: "v3.6.7"
  pullPolicy: IfNotPresent

cluster:
  name: "etcd0"
  token: "rcabench-etcd-cluster"

service:
  clientPort: 2379
  peerPort: 2380
  # `staging` env_mode (via global.envMode) turns the external Service
  # into a NodePort exposing `nodePort` for the client port.
  externalType: ClusterIP
  nodePort: 31379

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClass: "openebs-hostpath"

envMode: ""

serviceAccount:
  name: ""

extraEnv: []
