{{- if .Values.enabled }}
# redis
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "redis.fullname" . }}
spec:
  serviceName: {{ include "redis.fullname" . }}
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "redis.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "redis.fullname" . }}
    spec:
      {{- with .Values.serviceAccount.name }}
      serviceAccountName: {{ . }}
      {{- end }}
      containers:
        - name: redis
          image: {{ include "redis.image" . }}
          imagePullPolicy: "{{ include "redis.imagePullPolicy" . }}"
          {{- if .Values.auth.enabled }}
          # `$(REDIS_PASSWORD)` is expanded by the kubelet from the env var
          # below. Without auth Redis is reachable unauthenticated by anything
          # in the namespace; enable + wire the parent `[redis]` password to
          # close that. Off by default to preserve existing installs.
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          {{- end }}
          ports:
            - containerPort: {{ .Values.service.port | default 6379 }}
          {{- if or .Values.auth.enabled .Values.extraEnv }}
          env:
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              {{- if .Values.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.existingSecretPasswordKey | default "redis-password" }}
              {{- else }}
              value: {{ required "redis.auth.password or redis.auth.existingSecret is required when redis.auth.enabled" .Values.auth.password | quote }}
              {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if not .Values.persistence.enabled }}
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          {{- end }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
      {{- if not .Values.persistence.enabled }}
      volumes:
        - name: redis-data
          emptyDir:
            medium: "Memory"
            sizeLimit: "512Mi"
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
{{- end }}
