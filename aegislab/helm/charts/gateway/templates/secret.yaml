{{- if .Values.enabled }}
{{- /*
  Optional chart-managed upstream-credential Secrets. An upstreamSecrets
  entry with an inline `value` is rendered here; entries without `value`
  are assumed to reference a pre-existing Secret (e.g. one created by the
  upstream's own release). Keep the value out of committed values files —
  set it via --set-string or a sealed/external secret.
*/}}
{{- range .Values.upstreamSecrets }}
{{- if .value }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .secretName }}
type: Opaque
stringData:
  {{ .secretKey }}: {{ .value | quote }}
{{- end }}
{{- end }}
{{- end }}
