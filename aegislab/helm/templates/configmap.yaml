apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-rcabench-config
data:
  config.prod.toml: |
    name = "{{ .Values.configmap.name }}"
    version = "{{ .Values.configmap.version }}"
    port = {{ .Values.microservices.aegisApi.httpPort }}
    workspace = "{{ .Values.configmap.workspace }}"

    [system]
    timezone = "{{ .Values.configmap.system.timezone }}"

    [initialization]
    data_path = "{{ .Values.configmap.initialization.data_path }}"

    [database.mysql]
    host = "{{ .Values.configmap.database.mysql.host | default (printf "%s-mysql" .Release.Name) }}"
    port = "{{ .Values.configmap.database.mysql.port }}"
    user = "{{ .Values.configmap.database.mysql.user }}"
    password = "{{ .Values.configmap.database.mysql.password }}"
    db = "{{ .Values.configmap.database.mysql.db }}"

    {{- if .Values.configmap.database.clickhouse.host }}
    [database.clickhouse]
    host = "{{ .Values.configmap.database.clickhouse.host }}"
    port = "{{ .Values.configmap.database.clickhouse.port }}"
    user = "{{ .Values.configmap.database.clickhouse.user }}"
    password = "{{ .Values.configmap.database.clickhouse.password }}"
    db = "{{ .Values.configmap.database.clickhouse.db }}"
    timezone = "{{ .Values.configmap.database.clickhouse.timezone }}"
    {{- end }}

    [tracing]
    endpoint = "{{ .Values.configmap.tracing.endpoint }}"

    [redis]
    host = "{{ .Values.configmap.redis.host | default (printf "%s-redis:6379" .Release.Name) }}"

    [etcd]
    endpoints = {{ .Values.configmap.etcd.endpoints | default (list (printf "http://%s-etcd-headless:2379" .Release.Name)) | toJson }}
    username = "{{ .Values.configmap.etcd.username }}"
    password = "{{ .Values.configmap.etcd.password }}"

    [k8s]
    namespace = "{{ .Values.configmap.k8s.namespace }}"
    [k8s.service]
    internal_url = "{{ .Values.configmap.k8s.service.internalURL | default (printf "http://%s-aegis-api:%v" .Release.Name .Values.microservices.aegisApi.httpPort) }}"
    [k8s.init_container]
    {{- range $key, $value := .Values.configmap.k8s.init_container }}
    {{ $key }} = {{ $value | quote }}
    {{- end }}
    [k8s.job.service_account]
    name = "{{ .Values.configmap.k8s.job.serviceAccount.name | default (printf "%s-sa" .Release.Name) }}"
    {{- range $key, $value := .Values.configmap.k8s.job.volume_mount }}
    [k8s.job.volume_mount.{{ $key }}]
    name = {{ $value.name | quote }}
    {{- if $value.mount_path }}
    mount_path = {{ $value.mount_path | quote }}
    {{- end }}
    {{- if $value.host_path }}
    host_path = {{ $value.host_path | quote }}
    type = {{ $value.type | quote }}
    {{- end }}
    {{- if $value.source_type }}
    source_type = {{ $value.source_type | quote }}
    {{- end }}
    {{- if $value.sub_path }}
    sub_path = {{ $value.sub_path | quote }}
    {{- end }}
    {{- if $value.secret_name }}
    secret_name = {{ $value.secret_name | quote }}
    {{- end }}
    {{- if $value.claim_name }}
    claim_name = {{ $value.claim_name | quote }}
    {{- end }}
    {{- end }}

    [sso]
    private_key_path = "{{ .Values.configmap.sso.privateKeyPath }}"
    kid = "{{ .Values.configmap.sso.kid }}"
    issuer = "{{ .Values.configmap.sso.issuer }}"
    base_url = "{{ .Values.configmap.sso.baseURL }}"
    jwks_url = "{{ .Values.configmap.sso.jwksURL }}"
    client_id = "{{ .Values.configmap.sso.clientID }}"
    client_secret = "{{ .Values.configmap.sso.clientSecret }}"
    backend_redirect_uri = "{{ .Values.configmap.sso.backendRedirectURI | default (printf "http://%s-aegis-api:%v/auth/oidc/callback" .Release.Name .Values.microservices.aegisApi.httpPort) }}"
    seed_secret_dump_path = "{{ .Values.configmap.sso.seedSecretDumpPath }}"
    {{- /*
      consoleRedirectURIs / loginRedirect derive from `publicBaseURL` when set
      (single source of truth for "where the browser reaches this install").
      Explicit configmap.sso.* values still win for callers that need to point
      at multiple origins.
    */}}
    {{- $pub := .Values.global.publicBaseURL | default "" -}}
    {{- $consoleURIs := .Values.configmap.sso.consoleRedirectURIs -}}
    {{- if and (not $consoleURIs) $pub }}
      {{- $consoleURIs = printf "%s/auth/callback" $pub -}}
    {{- end }}
    {{- $loginRedir := .Values.configmap.sso.loginRedirect -}}
    {{- if and (not $loginRedir) $pub }}
      {{- $loginRedir = printf "%s/auth/login" $pub -}}
    {{- end }}
    console_redirect_uris = "{{ $consoleURIs }}"
    login_redirect = "{{ $loginRedir }}"

    [jfs]
    backend = "{{ .Values.configmap.jfs.backend | default "filesystem" }}"
    container_path = "{{ .Values.configmap.jfs.container_path }}"
    dataset_path = "{{ .Values.configmap.jfs.dataset_path }}"
    experiment_storage_path = "{{ .Values.configmap.jfs.experiment_storage_path }}"

    [jfs.s3]
    datapack_bucket = "{{ .Values.configmap.jfs.s3.datapack_bucket | default "aegis-datapack" }}"
    helm_chart_bucket = "{{ .Values.configmap.jfs.s3.helm_chart_bucket | default "aegis-helm-chart" }}"
    dataset_bucket = "{{ .Values.configmap.jfs.s3.dataset_bucket | default "aegis-dataset" }}"

    {{- if .Values.buildkit.enabled }}
    [buildkit]
    address = "{{ .Values.configmap.buildkit.address | default (printf "%s-buildkit:1234" .Release.Name) }}"
    {{- end }}

    [clients.runtime]
    # aegis-api -> runtime-worker, query-only (queue/lock status).
    target = "{{ .Values.configmap.clients.runtime.target | default (printf "%s-runtime-worker-service:%v" .Release.Name .Values.microservices.runtimeWorkerService.grpcPort) }}"

    [clients.runtime_intake]
    # runtime-worker -> aegis-api, execution/injection state writes.
    target = "{{ .Values.configmap.clients.runtimeIntake.target | default (printf "%s-aegis-api:%v" .Release.Name (.Values.microservices.aegisApi.intakeGrpcPort | default 9096)) }}"

    [runtime_worker.grpc]
    addr = ":{{ .Values.microservices.runtimeWorkerService.grpcPort }}"

    [api_gateway.intake.grpc]
    addr = ":{{ .Values.microservices.aegisApi.intakeGrpcPort | default 9096 }}"

    {{- if .Values.gateway.enabled }}
    [gateway]
    trusted_header_key = "{{ .Values.gateway.trustedHeaderKey }}"

    [gateway.rate_limit]
    rps   = {{ .Values.gateway.rateLimit.rps | default 200 }}
    burst = {{ .Values.gateway.rateLimit.burst | default 400 }}

    [gateway.cors]
    allowed_origins   = {{ .Values.gateway.cors.allowedOrigins | toJson }}
    allowed_methods   = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    allowed_headers   = ["Authorization", "Content-Type", "X-Aegis-Request-Id"]
    allow_credentials = true
    max_age_seconds   = 86400

    [[gateway.routes]]
    prefix   = "/v1/"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "none"

    [[gateway.routes]]
    prefix   = "/.well-known/"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "none"

    [[gateway.routes]]
    prefix   = "/authorize"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "none"

    [[gateway.routes]]
    prefix   = "/login"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "none"

    [[gateway.routes]]
    prefix   = "/token"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "none"

    [[gateway.routes]]
    prefix   = "/userinfo"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "jwt"

    [[gateway.routes]]
    prefix    = "/api/v2/inbox/"
    upstream  = "{{ .Release.Name }}-notify:{{ .Values.notify.httpPort }}"
    auth      = "jwt"
    audiences = ["portal"]

    [[gateway.routes]]
    prefix   = "/api/v2/notifications/"
    upstream = "{{ .Release.Name }}-notify:{{ .Values.notify.httpPort }}"
    auth     = "jwt"

    [[gateway.routes]]
    prefix   = "/api/v2/blob/"
    upstream = "{{ .Release.Name }}-blob:{{ .Values.blob.httpPort }}"
    auth     = "jwt"

    [[gateway.routes]]
    # Drop trailing slash so the bare list endpoint (`GET /api/v2/share`) also
    # routes here — `strings.HasPrefix` still matches `/api/v2/share/upload`,
    # `/api/v2/share/{code}` via the same prefix.
    prefix    = "/api/v2/share"
    upstream  = "{{ .Release.Name }}-blob:{{ .Values.blob.httpPort }}"
    auth      = "jwt"
    audiences = ["portal"]

    [[gateway.routes]]
    prefix   = "/s/"
    upstream = "{{ .Release.Name }}-blob:{{ .Values.blob.httpPort }}"
    auth     = "none"

    [[gateway.routes]]
    prefix   = "/api/v2/auth/"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "none"

    [[gateway.routes]]
    prefix   = "/api/v2/users"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "jwt"

    [[gateway.routes]]
    prefix   = "/api/v2/api-keys"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "jwt"

    [[gateway.routes]]
    prefix   = "/api/v2/roles"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "jwt"

    [[gateway.routes]]
    prefix   = "/api/v2/permissions"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "jwt"

    [[gateway.routes]]
    prefix   = "/api/v2/resources"
    upstream = "{{ .Release.Name }}-sso:{{ .Values.sso.service.port }}"
    auth     = "jwt"

    [[gateway.routes]]
    prefix   = "/"
    upstream = "{{ .Release.Name }}-aegis-api:{{ .Values.microservices.aegisApi.httpPort }}"
    auth     = "jwt"
    {{- end }}

    [otlp_receiver]
    port = {{ .Values.configmap.otlp.port }}
    max_request_size = {{ .Values.configmap.otlp.max_request_size }}

    {{- /*
      Blob client / buckets / share — schema and rendering live in the
      `blob` subchart (helm/charts/blob/). Embedding it here keeps the
      shared config.prod.toml the single artifact every component
      mounts (aegis-api, runtime-worker, sso, blob itself).
    */ -}}
    {{- include "blob.tomlSection" (dict "ctx" . "indent" 4) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-etcd-producer-config
data:
  etcd.yaml: |
{{ include "helm.etcd.mergedConfig" (dict "root" . "configType" "producer") | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-etcd-consumer-config
data:
  etcd.yaml: |
{{ include "helm.etcd.mergedConfig" (dict "root" . "configType" "consumer") | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-initial-data
data:
  data.yaml: |
{{- if .Values.initialDataFiles.data_yaml }}
{{ .Values.initialDataFiles.data_yaml | indent 4 }}
{{- else }}
{{ .Files.Get "files/initial_data/data.yaml" | indent 4 }}
{{- end }}
  otel-demo.yaml: |
{{- if .Values.initialDataFiles.otel_demo_yaml }}
{{ .Values.initialDataFiles.otel_demo_yaml | indent 4 }}
{{- else }}
{{ .Files.Get "files/initial_data/otel-demo.yaml" | indent 4 }}
{{- end }}
  ts.yaml: |
{{- if .Values.initialDataFiles.ts_yaml }}
{{ .Values.initialDataFiles.ts_yaml | indent 4 }}
{{- else }}
{{ .Files.Get "files/initial_data/ts.yaml" | indent 4 }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-system-helm-configs
data:
  system_helm_configs.json: |
{{ include "helm.systemHelmConfigs" . | indent 4 }}
{{/* Aegis SSO ConfigMap now rendered by the sso subchart. */}}
