{{- if .Values.edgeProxy.enabled }}
# Edge proxy: stable Service to anchor the external LoadBalancer EIP.
# The LB controller annotations live here (not on the aegis-api Service)
# so routine aegis-api upgrades don't churn the EIP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-edge-proxy
spec:
  replicas: {{ .Values.edgeProxy.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-edge-proxy
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-edge-proxy
      annotations:
        # Re-render this template's hash so a Caddyfile change in the
        # ConfigMap above triggers a pod rollout — Caddy has no SIGHUP
        # config-watcher in this image.
        checksum/config: {{ include (print $.Template.BasePath "/edge-proxy-config.yaml") . | sha256sum }}
    spec:
      containers:
        - name: caddy
          image: {{ include "helm.image" (dict "imageConfig" .Values.images.caddy "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.images.caddy.pullPolicy }}"
          args: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-otel-collector:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_SERVICE_NAME
              value: "aegis-edge-proxy"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.scope=aegis"
          ports:
            - name: http
              containerPort: {{ .Values.microservices.aegisApi.httpPort }}
            - name: intake-grpc
              containerPort: {{ .Values.microservices.aegisApi.intakeGrpcPort | default 9096 }}
          volumeMounts:
            - name: config
              mountPath: /etc/caddy
          {{- with .Values.edgeProxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-edge-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-edge-proxy
  {{- with .Values.edgeProxy.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.edgeProxy.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Release.Name }}-edge-proxy
  ports:
    - name: http
      port: {{ .Values.microservices.aegisApi.httpPort }}
      targetPort: http
    - name: intake-grpc
      port: {{ .Values.microservices.aegisApi.intakeGrpcPort | default 9096 }}
      targetPort: intake-grpc
{{- end }}
