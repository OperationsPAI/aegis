{{- if .Values.edgeProxy.enabled }}
# Caddyfile ConfigMap for the edge-proxy Deployment. Lives in its own
# template file so the Deployment can `include` this path to compute a
# checksum/config annotation without recursing on itself.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-edge-proxy-config
data:
  Caddyfile: |
    {
        admin off
        {{- if not .Values.edgeProxy.tls.enabled }}
        auto_https off
        {{- else }}
        # auto_https stays on so `tls internal` actually binds TLS to the
        # listener; disable only the HTTP→HTTPS redirect so the gRPC port
        # below keeps speaking plain h2c.
        auto_https disable_redirects
        {{- /*
          Browsers connecting to an IP literal (no DNS name) skip SNI per
          RFC 6066. Without `default_sni` Caddy aborts SNI-less handshakes
          with a generic "internal error" alert. Pin the public host as
          the fallback so the IP-SAN cert is served unconditionally.
        */}}
        {{- $pub := .Values.global.publicBaseURL | default "" -}}
        {{- $host := regexReplaceAll "^https?://([^/:]+).*$" $pub "${1}" -}}
        {{- if $host }}
        default_sni {{ $host }}
        {{- end }}
        {{- end }}
    }
    # HTTP: front aegis-gateway (the L7 router that federates sso / notify /
    # blob / aegis-api). One port, every microservice reachable through it.
    # When `microservices.gateway.enabled=false`, fall back to aegis-api so
    # this proxy still works on minimal installs.
    {{- /*
      Derive the listener site-address. Without a hostname, `tls internal`
      issues a cert for "localhost" and any client connecting via IP fails
      the handshake with "internal error". Pull the host from
      `global.publicBaseURL` when TLS is on so the SAN matches the LB EIP
      / DNS name the browser uses. Falls back to bare `:port` for plain
      HTTP installs (kind / in-cluster only).
    */}}
    {{- $port := int .Values.microservices.aegisApi.httpPort -}}
    {{- $siteAddr := printf ":%d" $port -}}
    {{- if .Values.edgeProxy.tls.enabled -}}
      {{- $pub := .Values.global.publicBaseURL | default "" -}}
      {{- $host := regexReplaceAll "^https?://([^/:]+).*$" $pub "${1}" -}}
      {{- if $host -}}
        {{- $siteAddr = printf "%s:%d" $host $port -}}
      {{- end -}}
    {{- end -}}
    {{- $addrs := list $siteAddr -}}
    {{- range .Values.global.additionalSiteAddresses | default list -}}
      {{- $addrs = append $addrs . -}}
    {{- end }}
    {{ join ", " $addrs }} {
        tracing {
            span aegis-edge-proxy
        }
        {{- if .Values.edgeProxy.tls.enabled }}
        # Self-signed internal CA cert + key generated by Caddy at boot.
        # SAN comes from the site-address (derived from publicBaseURL).
        # Browser warns the first time; users accept once. Required so the
        # SPA gets a Secure Context for `crypto.subtle.digest` (PKCE).
        tls internal
        {{- end }}
        {{- $apiBackend := printf "%s-aegis-api:%d" .Release.Name (int .Values.microservices.aegisApi.httpPort) }}
        {{- if .Values.gateway.enabled }}
        {{- $apiBackend = printf "%s-gateway:%d" .Release.Name (int (.Values.gateway.httpPort | default 8086)) }}
        {{- end }}
        {{- if .Values.frontend.enabled }}
        # SSO public OIDC endpoints live at the SSO service root (not under
        # /api/v2). Route them directly so the browser's OAuth2 code-flow
        # redirect lands on the real handler instead of the SPA shell.
        @sso {
            path /authorize /token /userinfo /login /v1/logout /.well-known/openid-configuration /.well-known/jwks.json
        }
        handle @sso {
            reverse_proxy {{ .Release.Name }}-sso:{{ .Values.sso.service.port | default 8083 }}
        }
        # Presigned-URL passthrough for rustfs (in-cluster S3 backend).
        # aegis-blob signs URLs against this edge host (see each
        # `blob.buckets.*.public_endpoint`), so the browser PUTs/GETs
        # land here. Preserve the original Host header — SigV4 includes
        # it in the signature, and the upstream rustfs validates it.
        @rustfs {
            path /aegis-*
        }
        handle @rustfs {
            reverse_proxy {{ .Release.Name }}-rustfs:9000 {
                header_up Host {host}
            }
        }
        {{- if .Values.devAnchors.enabled }}
        # Dev intercept passthrough. `/dev/api/*` routes to the dev-api
        # anchor Service, `/dev/*` to the dev-frontend anchor. With no
        # active `telepresence intercept` these anchors serve a 503
        # placeholder; once a developer runs `telepresence intercept
        # <release>-dev-{frontend,api} --port LOCAL:80`, traffic flows
        # to their laptop. Path is NOT rewritten — the local server
        # sees the full `/dev/...` URL and decides what to do with it
        # (vite: set `base: '/dev/'`; python serve: serves as-is).
        @devApi {
            path /dev/api/*
        }
        handle @devApi {
            reverse_proxy {{ .Release.Name }}-dev-api:80
        }
        @dev {
            path /dev /dev/*
        }
        handle @dev {
            reverse_proxy {{ .Release.Name }}-dev-frontend:80
        }
        {{- end }}
        # /auth/* is a SPA route family (login / register / callback /
        # forgot-password). The real auth API lives under /api/v2/auth/*
        # and is covered by the /api/* matcher below.
        @api {
            path /api/* /s/* /p/* /static/pages/* /healthz /metrics /readyz /livez
        }
        handle @api {
            reverse_proxy {{ $apiBackend }}
        }
        handle {
            reverse_proxy {{ .Release.Name }}-frontend:{{ .Values.frontend.service.port | default 80 }}
        }
        {{- else }}
        reverse_proxy {{ $apiBackend }}
        {{- end }}
    }
    # gRPC intake stays direct: gateway is HTTP-only, intake speaks raw gRPC
    # to aegis-api on a dedicated port.
    :{{ .Values.microservices.aegisApi.intakeGrpcPort | default 9096 }} {
        tracing {
            span aegis-edge-proxy-grpc
        }
        reverse_proxy h2c://{{ .Release.Name }}-aegis-api:{{ .Values.microservices.aegisApi.intakeGrpcPort | default 9096 }}
    }
{{- end }}
