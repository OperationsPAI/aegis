apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: rcabench
profiles:
  - name: local
    build:
      artifacts:
        - image: opspai/rcabench
          context: ..
          docker:
            dockerfile: AegisLab/src/Dockerfile
            buildArgs:
              GO_BUILD_TAGS: duckdb_arrow
            network: host
      local:
        push: false
      tagPolicy:
        sha256: {}
    deploy:
      helm:
        flags:
          install: ["--timeout=15m"]
          upgrade: ["--timeout=15m"]
        releases:
          - name: rcabench
            chartPath: helm
            namespace: exp
            createNamespace: true
            valuesFiles:
              - manifests/local/rcabench.yaml
            setValueTemplates:
              images.rcabench.tag: "{{.IMAGE_TAG}}"
              sso.image.tag: "{{.IMAGE_TAG}}"
            setValues:
              sso.fullnameOverride: rcabench-sso
              sso.image.pullPolicy: IfNotPresent
              # SSO URL overrides (issuer/baseURL/jwksURL, etc.) live in
              # manifests/local/rcabench.yaml so they can reference the
              # kind node's NodePort (172.21.0.2:30083) — the host-side
              # Vite dev server needs that to complete the OIDC flow.
              sso.auth.secretName: "rcabench-auth"
              sso.config.database.mysql.host: "rcabench-mysql"
              sso.config.redis.host: "rcabench-redis:6379"
              sso.config.jaeger.endpoint: "http://rcabench-jaeger:4318"
              sso.config.k8s.namespace: "exp"
              sso.config.k8s.serviceAccount.name: "rcabench-sa"
              sso.config.sso.backendRedirectURI: "http://rcabench-api-gateway:8082/auth/oidc/callback"
            setFiles:
              initialDataFiles.data_yaml: data/initial_data/prod/data.yaml
              initialDataFiles.otel_demo_yaml: data/initial_data/prod/otel-demo.yaml
              initialDataFiles.ts_yaml: data/initial_data/prod/ts.yaml
              sso.privateKey.pem: /tmp/sso-keys/sso-private.pem

  - name: staging
    activation:
      - env: ENV_MODE=staging
    build:
      artifacts:
        - image: 10.10.10.240/library/rcabench
          context: .
          docker:
            dockerfile: src/Dockerfile
            buildArgs:
              GO_BUILD_TAGS: duckdb_arrow
              GOPROXY: https://goproxy.cn,direct
              INSTALL_CERTS: "true"
            network: host
      tagPolicy:
        gitCommit:
          variant: AbbrevCommitSha
    deploy:
      helm:
        flags:
          install: ["--atomic", "--timeout=10m"]
          upgrade: ["--atomic", "--timeout=10m"]
        releases:
          - name: rcabench
            chartPath: helm
            namespace: exp
            createNamespace: true
            valuesFiles:
              - manifests/staging/rcabench.yaml
            setValueTemplates:
              images.rcabench.tag: "{{.IMAGE_TAG}}"
            setFiles:
              initialDataFiles.data_yaml: data/initial_data/staging/data.yaml
              initialDataFiles.otel_demo_yaml: data/initial_data/staging/otel-demo.yaml
              initialDataFiles.ts_yaml: data/initial_data/staging/ts.yaml

  - name: test
    activation:
      - env: ENV_MODE=test
    build:
      artifacts:
        - image: pair-diag-cn-guangzhou.cr.volces.com/pair/rcabench
          context: .
          docker:
            dockerfile: src/Dockerfile
            buildArgs:
              GO_BUILD_TAGS: duckdb_arrow
              INSTALL_CERTS: "true"
            network: host
      local:
        push: false
      tagPolicy:
        gitCommit:
          variant: AbbrevCommitSha
    deploy:
      helm:
        flags:
          install: ["--atomic", "--timeout=10m"]
          upgrade: ["--atomic", "--timeout=10m"]
        releases:
          - name: rcabench
            chartPath: helm
            namespace: exp
            createNamespace: true
            valuesFiles:
              - manifests/test/rcabench.yaml
            setValueTemplates:
              images.rcabench.tag: "{{.IMAGE_DIGEST}}"
            setFiles:
              initialDataFiles.data_yaml: data/initial_data/prod/data.yaml
              initialDataFiles.otel_demo_yaml: data/initial_data/prod/otel-demo.yaml
              initialDataFiles.ts_yaml: data/initial_data/prod/ts.yaml
        hooks:
          after:
            - host:
                command: ["just", "test-regression"]
                os: [darwin, linux]
