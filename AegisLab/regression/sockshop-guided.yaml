name: sockshop-guided
description: Canonical sockshop smoke case (Coherence/Helidon fork) used by local/e2e validation.
project_name: pair_diagnosis
submit:
  pedestal:
    name: sockshop
    version: "1.1.1"
  benchmark:
    name: clickhouse
    version: "1.0.0"
  interval: 2
  pre_duration: 1
  algorithms:
    - name: random
      version: "1.0.0"
  labels:
    - key: env
      value: local
    - key: batch
      value: smoke
  specs:
    - - system: sockshop
        system_type: sockshop
        namespace: sockshop0
        app: carts
        chaos_type: PodKill
        duration: 5
validation:
  timeout_seconds: 3000
  min_events: 6
  # The sockshop chart enables loadgen by default, so there is always
  # live traffic against `carts` during the PodKill window. The algo
  # therefore finds real anomaly signal and the chain terminates at
  # `algorithm.result.collection` rather than the shortcut
  # `datapack.no_anomaly` used by the quieter pedestals.
  expected_final_event: algorithm.result.collection
  required_events:
    - restart.pedestal.started
    - fault.injection.started
    - datapack.build.started
    - algorithm.run.started
    - algorithm.result.collection
  required_task_chain:
    - RestartPedestal
    - FaultInjection
    - BuildDatapack
    - RunAlgorithm
    - CollectResult
