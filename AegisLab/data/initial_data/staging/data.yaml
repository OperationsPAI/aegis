containers:
  - type: 0
    name: detector
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: 10.10.10.240/library/detector:latest
        command: bash /entrypoint.sh
  - type: 0
    name: random
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: 10.10.10.240/library/rca-algo-random:latest
        command: bash /entrypoint.sh
  - type: 0
    name: traceback
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: 10.10.10.240/library/rca-algo-traceback:latest
        command: bash /entrypoint.sh
  - type: 1
    name: clickhouse
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: docker.io/opspai/clickhouse_dataset:sum-optional-20260421
        command: bash /entrypoint.sh
        env_vars:
          - key: NAMESPACE
            type: 0
            category: 0
            value_type: 0
            default_value: ts0
            required: true
            overridable: true
  - type: 2
    name: ts
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        github_link: OperationsPAI/train-ticket
        status: 1
        helm_config:
          version: 0.1.0
          chart_name: trainticket
          repo_name: train-ticket
          repo_url: https://operationspai.github.io/train-ticket
          values:
            - key: services.tsUiDashboard.nodePort
              type: 1
              category: 1
              value_type: 1
              template_string: 31%03d
              overridable: false
          status: 1
  - type: 2
    name: otel-demo
    is_public: true
    status: 1
    versions:
      - name: 0.1.1
        github_link: open-telemetry/opentelemetry-demo
        status: 1
        helm_config:
          version: 0.1.1
          chart_name: otel-demo-aegis
          repo_name: opspai
          repo_url: oci://registry-1.docker.io/opspai
          status: 1
  - type: 2
    name: ob
    is_public: true
    status: 1
    versions:
      - name: 0.1.1
        github_link: GoogleCloudPlatform/microservices-demo
        status: 1
        helm_config:
          version: 0.1.1
          chart_name: onlineboutique-aegis
          repo_name: opspai
          repo_url: oci://registry-1.docker.io/opspai
          status: 1
  - type: 1
    name: ob-bench
    is_public: true
    status: 1
    versions:
      - name: e2e-kind-20260421
        image_ref: docker.io/opspai/clickhouse_dataset:e2e-kind-20260421
        command: bash /entrypoint.sh
        env_vars:
          - key: NAMESPACE
            type: 0
            category: 0
            value_type: 0
            default_value: ob0
            required: true
            overridable: true
  - type: 2
    name: sockshop
    is_public: true
    status: 1
    versions:
      - name: 0.1.1
        github_link: LGU-SE-Internal/coherence-helidon-sockshop-sample
        status: 1
        helm_config:
          version: 0.1.1
          chart_name: sockshop-aegis
          repo_name: opspai
          repo_url: oci://registry-1.docker.io/opspai
          status: 1
    # issue #115: sockshop's coherence-helidon variant requires the
    # Coherence operator installed cluster-wide before the chart can be
    # rendered. `aegisctl system reconcile-prereqs --name sockshop` installs
    # it; `aegisctl system enable sockshop` refuses until it's reconciled.
    prerequisites:
      - name: coherence-operator
        kind: helm
        chart: coherence/coherence-operator
        namespace: coherence-test
        version: '>=3.4'
  - type: 2
    name: hotelreservation
    is_public: true
    status: 1
    versions:
      - name: 0.1.0
        github_link: LGU-SE-Internal/DeathStarBench
        status: 1
        helm_config:
          version: 0.1.0
          chart_name: hotel-reservation
          repo_name: lgu-dsb
          repo_url: https://lgu-se-internal.github.io/DeathStarBench
          values:
            - key: global.dockerRegistry
              type: 0
              category: 1
              value_type: 0
              default_value: docker.io/opspai
              overridable: true
            - key: global.defaultImageVersion
              type: 0
              category: 1
              value_type: 0
              default_value: 20260423-61074ea
              overridable: true
            - key: global.services.environments.OTEL_EXPORTER_OTLP_ENDPOINT
              type: 0
              category: 1
              value_type: 0
              default_value: http://otel-collector.otel.svc.cluster.local:4318
              overridable: true
          status: 1
  - type: 2
    name: sn
    is_public: true
    status: 1
    versions:
      - name: 0.1.0
        github_link: LGU-SE-Internal/DeathStarBench
        status: 1
        helm_config:
          version: 0.1.0
          chart_name: social-network
          repo_name: lgu-dsb
