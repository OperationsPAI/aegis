containers:
  - type: 0
    name: detector
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: 10.10.10.240/library/detector:latest
        command: bash /entrypoint.sh
  - type: 0
    name: random
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: 10.10.10.240/library/rca-algo-random:latest
        command: bash /entrypoint.sh
  - type: 0
    name: traceback
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: 10.10.10.240/library/rca-algo-traceback:latest
        command: bash /entrypoint.sh
  - type: 1
    name: clickhouse
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: 10.10.10.240/library/clickhouse_dataset:latest
        command: bash /entrypoint.sh
        env_vars:
          - key: NAMESPACE
            type: 0
            category: 0
            value_type: 0
            default_value: ts0
            required: true
            overridable: true
  - type: 2
    name: ts
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        github_link: OperationsPAI/train-ticket
        status: 1
        helm_config:
          version: 0.1.0
          chart_name: trainticket
          repo_name: train-ticket
          repo_url: https://operationspai.github.io/train-ticket
          values:
            - key: services.tsUiDashboard.nodePort
              type: 1
              category: 1
              value_type: 1
              template_string: 31%03d
              overridable: false
          status: 1
  - type: 2
    name: otel-demo
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        github_link: OperationsPAI/opentelemetry-demo
        status: 1
        helm_config:
          version: 0.38.1
          chart_name: opentelemetry-demo
          repo_name: open-telemetry
          repo_url: https://operationspai.github.io/opentelemetry-demo
          status: 1
