dynamic_configs:
  - key: debugging.enabled
    default_value: 'true'
    value_type: 1
    scope: 1
    category: debugging
    description: Enable or disable debugging features
    is_secret: false
  - key: database.clickhouse.host
    default_value: 10.10.10.58
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database host
    is_secret: false
  - key: database.clickhouse.port
    default_value: '8123'
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database port
    is_secret: false
  - key: database.clickhouse.user
    default_value: default
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database user
    is_secret: false
  - key: database.clickhouse.password
    default_value: password
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database password
    is_secret: true
  - key: database.clickhouse.db
    default_value: default
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database name
    is_secret: false
  - key: database.clickhouse.timezone
    default_value: Asia/Shanghai
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse timezone
    is_secret: false
  - key: harbor.registry
    default_value: 10.10.10.240
    value_type: 0
    scope: 1
    category: harbor
    description: Harbor registry address
    is_secret: false
  - key: harbor.namespace
    default_value: library
    value_type: 0
    scope: 1
    category: harbor
    description: Harbor namespace
    is_secret: false
  - key: harbor.username
    default_value: admin
    value_type: 0
    scope: 1
    category: harbor
    description: Harbor username
    is_secret: false
  - key: harbor.password
    default_value: Harbor12345
    value_type: 0
    scope: 1
    category: harbor
    description: Harbor password
    is_secret: true
  - key: injection.system.ts.count
    default_value: '1'
    value_type: 2
    scope: 1
    category: injection.system.count
    description: Number of system Train Ticket to create
    is_secret: false
    min_value: 1
    max_value: 20
  - key: injection.system.ts.ns_pattern
    default_value: ^ts\d+$
    value_type: 0
    scope: 1
    category: injection.system.ns_pattern
    description: Namespace pattern for system Train Ticket instances
    is_secret: false
  - key: injection.system.ts.extract_pattern
    default_value: ^(ts)(\d+)$
    value_type: 0
    scope: 1
    category: injection.system.extract_pattern
    description: Extraction pattern for namespace prefix and number from Train Ticket
      instances
    is_secret: false
  - key: injection.system.otel-demo.count
    default_value: '1'
    value_type: 2
    scope: 1
    category: injection.system.count
    description: Number of system OpenTelemetry Demo to create
    is_secret: false
    min_value: 1
    max_value: 20
  - key: injection.system.otel-demo.ns_pattern
    default_value: ^otel-demo\d+$
    value_type: 0
    scope: 1
    category: injection.system.ns_pattern
    description: Namespace pattern for system OpenTelemetry Demo instances
    is_secret: false
  - key: injection.system.otel-demo.extract_pattern
    default_value: ^(otel-demo)(\d+)$
    value_type: 0
    scope: 1
    category: injection.system.extract_pattern
    description: Extraction pattern for namespace prefix and number from OpenTelemetry
      Demo instances
    is_secret: false
  - key: algo.detector
    default_value: detector
    value_type: 0
    scope: 2
    category: algo
    description: Default detector algorithm name
    is_secret: false
  - key: logging.job.log_retention_days
    default_value: '7'
    value_type: 2
    scope: 1
    category: logging
    description: Number of days to retain job logs
    is_secret: false
    min_value: 1
    max_value: 365
  - key: rate_limiting.max_concurrent_builds
    default_value: '3'
    value_type: 2
    scope: 1
    category: rate_limiting
    description: Maximum number of concurrent container builds
    is_secret: false
    min_value: 1
    max_value: 20
  - key: rate_limiting.max_concurrent_restarts
    default_value: '2'
    value_type: 2
    scope: 1
    category: rate_limiting
    description: Maximum number of concurrent service restarts
    is_secret: false
    min_value: 1
    max_value: 10
  - key: rate_limiting.max_concurrent_algo_execution
    default_value: '5'
    value_type: 2
    scope: 1
    category: rate_limiting
    description: Maximum number of concurrent algorithm executions
    is_secret: false
    min_value: 1
    max_value: 50
  - key: rate_limiting.token_wait_timeout
    default_value: '10'
    value_type: 2
    scope: 1
    category: rate_limiting
    description: Token wait timeout in seconds
    is_secret: false
    min_value: 1
    max_value: 300
