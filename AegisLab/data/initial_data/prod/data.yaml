dynamic_configs:
  - key: debugging.enabled
    default_value: 'false'
    value_type: 1
    scope: 1
    category: debugging
    description: Enable or disable debugging features
    is_secret: false
  # ClickHouse connection defaults align with the OTLP collector shipped in
  # `docs/deployment/otel-pipeline.yaml` + `docs/deployment/kind/otel-collector-cfg.yaml`.
  # The collector auto-creates `otel_*` tables under database `otel` using
  # user=default password=clickhouse. Operators running a different stack
  # (e.g. the legacy clickstack-clickhouse.monitoring) override via etcd
  # after bootstrap.
  - key: database.clickhouse.host
    default_value: clickhouse.otel.svc.cluster.local
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database host
    is_secret: false
  - key: database.clickhouse.port
    default_value: '8123'
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database port
    is_secret: false
  - key: database.clickhouse.user
    default_value: default
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database user
    is_secret: false
  - key: database.clickhouse.password
    default_value: 'clickhouse'
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database password
    is_secret: true
  - key: database.clickhouse.db
    default_value: otel
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse database name
    is_secret: false
  - key: database.clickhouse.timezone
    default_value: UTC
    value_type: 0
    scope: 1
    category: database.clickhouse
    description: ClickHouse timezone
    is_secret: false
  - key: injection.system.ts.count
