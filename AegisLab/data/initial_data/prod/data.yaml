containers:
  - type: 0
    name: detector
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: docker.io/opspai/detector:drain-optional-20260422
        command: bash /entrypoint.sh
  - type: 0
    name: random
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: pair-diag-cn-guangzhou.cr.volces.com/pair/rca-algo-random:latest
        command: bash /entrypoint.sh
  - type: 0
    name: traceback
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: pair-diag-cn-guangzhou.cr.volces.com/pair/rca-algo-traceback:latest
        command: bash /entrypoint.sh
  - type: 1
    name: clickhouse
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: docker.io/opspai/clickhouse_dataset:drain-optional-20260422
        command: bash /entrypoint.sh
        env_vars:
          - key: NAMESPACE
            type: 0
            category: 0
            value_type: 0
            default_value: ts0
            required: true
            overridable: true
          # Kind profiles ship only OTLP traces+logs via the otel collector;
          # metrics tables (otel_metrics_*) do not exist and the datapack
          # builder would fail with UNKNOWN_TABLE. Allow empty parquets so
          # the pipeline completes on kind. Filenames MUST include the
          # `.parquet` extension (rcabench_platform matches on full basename).
          - key: RCABENCH_OPTIONAL_EMPTY_PARQUETS
            type: 0
            category: 0
            value_type: 0
            default_value: "abnormal_metrics.parquet,abnormal_metrics_histogram.parquet,abnormal_metrics_sum.parquet,abnormal_logs.parquet,normal_metrics.parquet,normal_metrics_histogram.parquet,normal_metrics_sum.parquet,normal_logs.parquet"
            required: false
            overridable: true
  - type: 2
    name: ts
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        github_link: OperationsPAI/train-ticket
        status: 1
        helm_config:
          version: 0.2.0
          chart_name: trainticket
          repo_name: train-ticket
          repo_url: https://operationspai.github.io/train-ticket
          values:
            - key: services.tsUiDashboard.nodePort
              type: 1
              category: 1
              value_type: 1
              template_string: 31%03d
              overridable: false
            - key: global.otelcollector
              type: 0
              category: 1
              value_type: 0
              default_value: http://opentelemetry-kube-stack-deployment-collector.monitoring.svc.cluster.local:4317
              overridable: true
          status: 1
  - type: 2
    name: otel-demo
    is_public: true
    status: 1
    versions:
      - name: 0.1.6
        github_link: open-telemetry/opentelemetry-demo
        status: 1
        helm_config:
          version: 0.1.6
          chart_name: otel-demo-aegis
          repo_name: opspai
          repo_url: oci://registry-1.docker.io/opspai
          status: 1
  - type: 2
    name: ob
    is_public: true
    status: 1
    versions:
      - name: 0.1.1
        github_link: GoogleCloudPlatform/microservices-demo
        status: 1
        helm_config:
          version: 0.1.1
          chart_name: onlineboutique-aegis
          repo_name: opspai
          repo_url: oci://registry-1.docker.io/opspai
          status: 1
  - type: 1
    name: ob-bench
    is_public: true
    status: 1
    versions:
      - name: 1.0.0
        image_ref: docker.io/opspai/clickhouse_dataset:drain-optional-20260422
        command: bash /entrypoint.sh
        env_vars:
          - key: NAMESPACE
            type: 0
            category: 0
            value_type: 0
            default_value: ob0
            required: true
            overridable: true
          # Kind profiles ship only OTLP traces+logs via the otel collector;
          # metrics tables (otel_metrics_*) do not exist and the datapack
          # builder would fail with UNKNOWN_TABLE. Allow empty parquets so
          # the pipeline completes on kind.
          - key: RCABENCH_OPTIONAL_EMPTY_PARQUETS
            type: 0
            category: 0
            value_type: 0
            # Filenames MUST include the .parquet extension (rcabench_platform
            # matches on full basename). Covers metric + log tables that kind
            # clusters don't populate through the otel collector pipeline.
            default_value: "abnormal_metrics.parquet,abnormal_metrics_histogram.parquet,abnormal_metrics_sum.parquet,abnormal_logs.parquet,normal_metrics.parquet,normal_metrics_histogram.parquet,normal_metrics_sum.parquet,normal_logs.parquet"
            required: false
            overridable: true
  - type: 2
    name: sockshop
    is_public: true
    status: 1
    versions:
      - name: 1.1.1
        github_link: LGU-SE-Internal/coherence-helidon-sockshop-sample
        status: 1
        # Chart is now self-hosted in the fork's gh-pages site (same pattern
        # as hs/sn/media/teastore). Images live at docker.io/opspai/ss-*.
        helm_config:
          version: 1.1.1
          chart_name: sockshop
          repo_name: sockshop-lgu
          repo_url: https://lgu-se-internal.github.io/coherence-helidon-sockshop-sample
          # Chart hardcodes aegis-compatible defaults pointing at
          # `monitoring/opentelemetry-kube-stack`. This cluster layout puts
          # the Instrumentation CR and collector in the `otel` namespace,
          # so override both before install — otherwise the OTel operator
          # webhook silently skips auto-inject and BuildDatapack fails with
          # an empty `abnormal_traces.parquet`.
          values:
            - key: otel.instrumentation
              type: 0
              category: 1
              value_type: 0
              default_value: otel/otel-kube-stack
              overridable: true
            - key: otel.collectorEndpoint
              type: 0
              category: 1
              value_type: 0
              default_value: http://otel-kube-stack-deployment-collector.otel:4317
              overridable: true
          status: 1
    # issue #115: sockshop's coherence-helidon variant requires the
    # Coherence operator installed cluster-wide before the chart can be
    # rendered. `aegisctl system reconcile-prereqs --name sockshop` installs
    # it; `aegisctl system enable sockshop` refuses until it's reconciled.
    prerequisites:
      - name: coherence-operator
        kind: helm
        chart: coherence/coherence-operator
        namespace: coherence-test
        version: '>=3.4'
        values:
          - key: image.registry
            value: pair-cn-shanghai.cr.volces.com/opspai
          - key: image.name
            value: coherence-operator
          - key: image.tag
            value: 3.5.11
          - key: defaultCoherenceImage.registry
            value: pair-cn-shanghai.cr.volces.com/opspai
          - key: defaultCoherenceImage.name
            value: coherence-ce
          - key: defaultCoherenceImage.tag
            value: 14.1.2-0-3
  - type: 2
    name: hs
    is_public: true
    status: 1
    versions:
      # Bumped 0.1.0 → 0.1.1 to drop the `http://` scheme from the OTel
      # endpoint (DSB Go SDK auto-prefixes `http://`, double-prefix kills
      # all spans) and to swap from the dead seed key
      # `global.services.environments.OTEL_EXPORTER_OTLP_ENDPOINT` (which
      # the upstream hotel-reservation chart ignores) to the chart's
      # actual `global.otel.endpoint` knob. Closes #323. Reseed honors
      # the immutability contract on already-seeded versions.
      - name: 0.1.1
        github_link: LGU-SE-Internal/DeathStarBench
        status: 1
        helm_config:
          version: 0.1.0
          chart_name: hotel-reservation
          repo_name: lgu-dsb
          repo_url: https://lgu-se-internal.github.io/DeathStarBench
          values:
            - key: global.dockerRegistry
              type: 0
              category: 1
              value_type: 0
              default_value: docker.io/opspai
              overridable: true
            - key: global.defaultImageVersion
              type: 0
              category: 1
              value_type: 0
              default_value: 20260423-61074ea
              overridable: true
            - key: global.otel.endpoint
              type: 0
              category: 1
              value_type: 0
              default_value: otel-collector.otel.svc.cluster.local:4318
              overridable: true
          status: 1
  - type: 2
    name: sn
    is_public: true
    status: 1
    versions:
      # Bumped 0.1.0 → 0.1.1 to drop the `http://` scheme from the OTel
      # endpoint (DSB Go SDK auto-prefixes `http://`, double-prefix kills
      # all spans). Closes #323.
      - name: 0.1.1
        github_link: LGU-SE-Internal/DeathStarBench
        status: 1
        helm_config:
          version: 0.1.0
          chart_name: social-network
          repo_name: lgu-dsb
          repo_url: https://lgu-se-internal.github.io/DeathStarBench
          values:
            - key: global.dockerRegistry
              type: 0
              category: 1
              value_type: 0
              default_value: docker.io/opspai
              overridable: true
            - key: global.defaultImageVersion
              type: 0
              category: 2
              value_type: 0
              default_value: 20260427-9397c2e
              overridable: true
            - key: global.otel.endpoint
              type: 0
              category: 1
              value_type: 0
              default_value: otel-collector.otel.svc.cluster.local:4318
              overridable: true
          status: 1
  - type: 2
    name: media
    is_public: true
    status: 1
    versions:
      # Bumped 0.1.0 → 0.1.1 to drop the `http://` scheme from the OTel
      # endpoint (DSB Go SDK auto-prefixes `http://`, double-prefix kills
      # all spans). Closes #323.
      - name: 0.1.1
        github_link: LGU-SE-Internal/DeathStarBench
        status: 1
        helm_config:
          version: 0.1.0
          chart_name: media-microservices
          repo_name: lgu-dsb
          repo_url: https://lgu-se-internal.github.io/DeathStarBench
          values:
            - key: global.dockerRegistry
              type: 0
              category: 1
              value_type: 0
              default_value: docker.io/opspai
              overridable: true
            - key: global.defaultImageVersion
              type: 0
              category: 3
              value_type: 0
              default_value: 20260427-9397c2e
              overridable: true
            - key: global.otel.endpoint
              type: 0
              category: 1
              value_type: 0
              default_value: otel-collector.otel.svc.cluster.local:4318
              overridable: true
          status: 1
  - type: 2
    name: teastore
    is_public: true
    status: 1
    versions:
      - name: 0.1.4
        github_link: LGU-SE-Internal/TeaStore
        status: 1
        helm_config:
          version: 0.1.4
          chart_name: teastore
          repo_name: lgu-tea
          repo_url: https://lgu-se-internal.github.io/TeaStore
          values:
            - key: global.image.registry
              type: 0
              category: 1
              value_type: 0
              default_value: docker.io/opspai
              overridable: true
            - key: global.image.tag
              type: 0
              category: 1
              value_type: 0
              default_value: 20260423-2b3fd43
              overridable: true
            - key: opentelemetry.otlpEndpoint
              type: 0
              category: 1
              value_type: 0
              default_value: http://otel-collector.otel.svc.cluster.local:4317
              overridable: true
            # 0.1.1 parameterizes the inject-<language> annotation from these
            # two values (previously hardcoded to "monitoring/opentelemetry-kube-stack").
            # Point at our cluster's Instrumentation CR at otel/otel-kube-stack.
            - key: opentelemetry.monitoringNamespace
              type: 0
              category: 1
              value_type: 0
              default_value: otel
              overridable: true
            - key: opentelemetry.instrumentationName
              type: 0
              category: 1
              value_type: 0
              default_value: otel-kube-stack
              overridable: true
            # 0.1.2 makes the busybox image used by jmeter's wait-for-registry
            # init container configurable (LGU-SE-Internal/TeaStore#8). Empty
            # registry preserves the upstream `busybox:1.36` (docker.io) default.
            - key: jmeter.waitForRegistryImage.registry
              type: 0
              category: 1
              value_type: 0
              default_value: ""
              overridable: true
            - key: jmeter.waitForRegistryImage.repository
              type: 0
              category: 1
              value_type: 0
              default_value: busybox
              overridable: true
            - key: jmeter.waitForRegistryImage.tag
              type: 0
              category: 1
              value_type: 0
              default_value: "1.36"
              overridable: true
            - key: jmeter.waitForRegistryImage.pullPolicy
              type: 0
              category: 1
              value_type: 0
              default_value: IfNotPresent
              overridable: true
          status: 1
