        status: 1
        helm_config:
          version: 0.1.0
          chart_name: socialnetwork-aegis
          repo_name: opspai
          repo_url: oci://registry-1.docker.io/opspai
          status: 1
  - type: 2
    name: media
    is_public: true
    status: 1
    versions:
      - name: 0.1.0
        github_link: delimitrou/DeathStarBench
        status: 1
        helm_config:
          version: 0.1.0
          chart_name: mediamicroservices-aegis
          repo_name: opspai
          repo_url: oci://registry-1.docker.io/opspai
          status: 1
  - type: 2
    name: teastore
    is_public: true
    status: 1
    versions:
      - name: 0.1.0
        github_link: DescartesResearch/TeaStore
        status: 1
