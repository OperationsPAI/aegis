# Local-cluster profile (kind/minikube) for integrated development & debugging.
#
# Assumes:
#   - kind or minikube cluster with default storageclass "standard" (local-path)
#   - chaos-mesh installed (for fault injection)
#   - skaffold handles image build + cluster-load automatically (local.push: false)
#
# One-command deploy:
#   skaffold run -p local
#
# Dev mode (auto-rebuild on source change):
#   skaffold dev -p local

images:
  rcabench:
    name: opspai/rcabench
    tag: local
    pullPolicy: IfNotPresent

# Enable frontend for full-stack debugging
rcabench-frontend:
  enabled: true
  image:
    repository: docker.io/opspai/rcabench-frontend
    tag: latest
    pullPolicy: IfNotPresent

# Enable buildkit for datapack builds
buildkit:
  enabled: true

# Enable observability stack for debugging traces/metrics/logs
alloy:
  enabled: true
loki:
  enabled: true
prometheus:
  enabled: true
grafana:
  enabled: true

# No external registry proxy needed in local mode
harbor:
  enabled: false

# Dev mode — backend runs with dev config template.
# SSO issuer + baseURL point at the kind node's NodePort so the
# host-side `apps/console` Vite dev server (localhost:3323) can complete
# the OIDC code+PKCE flow. JWKS refresh stays on the internal cluster
# DNS — api-gateway resolves rcabench-sso:8083 directly in-cluster.
configmap:
  system:
    env_mode: "dev"
  sso:
    issuer: "http://172.21.0.2:30083"
    baseURL: "http://172.21.0.2:30083"
    jwksURL: "http://rcabench-sso:8083/.well-known/jwks.json"
    backendRedirectURI: "http://rcabench-api-gateway:8082/auth/oidc/callback"
    consoleRedirectURIs: "http://localhost:3323/auth/callback,http://127.0.0.1:3323/auth/callback"
    loginRedirect: "http://localhost:3323/auth/login"

# Mount the sso private key so api-gateway and runtime-worker-service
# can mint service tokens via jwtkeys.Signer.
ssoclient:
  baseURL: "http://rcabench-sso:8083"
  jwksURL: "http://rcabench-sso:8083/.well-known/jwks.json"
  privateKeySecretName: "rcabench-sso-key"

# Expose api-gateway + sso + notify + blob via NodePort so the host-side
# console (Vite dev server, defaults to localhost:3323) can hit them at
# 172.21.0.2:3008x. Without these the chart only emits ClusterIP
# services and the only access path is `kubectl port-forward`.
microservices:
  apiGateway:
    service:
      type: NodePort
      nodePort: 30082
  notify:
    service:
      type: NodePort
      nodePort: 30084
  blob:
    service:
      type: NodePort
      nodePort: 30085

sso:
  service:
    type: NodePort
    port: 8083
    nodePort: 30083
  config:
    sso:
      # SSO stamps this as the `iss` claim and surfaces it from
      # /.well-known/openid-configuration. The browser must be able to
      # resolve `iss` (it fetches JWKS from it during id_token verify).
      issuer: "http://172.21.0.2:30083"
      baseURL: "http://172.21.0.2:30083"
      jwksURL: "http://172.21.0.2:30083/.well-known/jwks.json"
      consoleRedirectURIs: "http://localhost:3323/auth/callback,http://127.0.0.1:3323/auth/callback"
      loginRedirect: "http://localhost:3323/auth/login"

# Disable init jobs that pull from private registries.
# For local dev, seed pedestal charts manually via aegisctl if needed.
initialization:
  initDrainTemplate:
    enabled: false
  initHelmCharts:
    enabled: false

# Local clusters use the built-in local-path provisioner (StorageClass "standard").
# Single-node local clusters don't need RWX — RWO is sufficient.
persistence:
  storageType: external
  storageClassNames:
    external: standard
  jaeger:
    storageClass: standard
  redis:
    storageClass: standard
  mysql:
    storageClass: standard
  etcd:
    storageClass: standard
  containers:
    accessMode: ReadWriteOnce
  observability:
    enabled: true
    accessMode: ReadWriteOnce
  juicefs:
    enabled: true
    useStaticPV: false
    external:
      accessMode: ReadWriteOnce

juicefs:
  metaurl: "redis://rcabench-redis:6379/1"
