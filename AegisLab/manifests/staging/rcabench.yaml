global:
  imageRegistry: 10.10.10.240
  images:
    rcabench:
      name: library/rcabench
  envMode: "staging"

images:
  redis:
    name: library/redis
  mysql:
    name: library/mysql
  etcd:
    name: library/etcd
  busybox:
    name: library/busybox
  buildkit:
    name: library/buildkit
  alloy:
    name: library/alloy
  loki:
    name: library/loki
  prometheus:
    name: library/prometheus
  grafana:
    name: library/grafana

buildkit:
  enabled: false

rcabench-frontend:
  image:
    repository: 10.10.10.240/library/rcabench-frontend

  service:
    type: NodePort
    port: 80
    nodePort: 32180

harbor:
  enabled: true

initialization:
  initDrainTemplate:
    enabled: false

  initHelmCharts:
    enabled: true
    image:
      name: library/init-helm-charts

configmap:
  system:
    env_mode: "staging"
  k8s:
    init_container:
      busybox_image: 10.10.10.240/library/busybox:1.35

juicefs:
  metaurl: "redis://10.10.10.119:6379/1"

# mysql subchart overrides (mirrors legacy images.mysql; env_mode=staging
# is forwarded via the top-level `global.envMode` already set above).
mysql:
  image:
    name: library/mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent

# redis subchart overrides (mirrors legacy images.redis).
redis:
  image:
    name: library/redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent

# etcd subchart overrides (mirrors legacy images.etcd).
etcd:
  image:
    name: library/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
