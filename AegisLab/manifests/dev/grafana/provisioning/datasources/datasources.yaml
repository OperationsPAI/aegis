# Grafana data source provisioning for AegisLab
# Auto-configures Loki and Prometheus on startup
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://localhost:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    editable: true
    jsonData:
      timeInterval: 15s
