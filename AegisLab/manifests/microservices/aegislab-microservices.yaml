apiVersion: v1
kind: Namespace
metadata:
  name: aegislab
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: aegislab
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: aegislab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: opspai/rcabench:latest
          args: ["api-gateway", "--conf", "/etc/rcabench/config.toml", "--port", "8082"]
          ports:
            - containerPort: 8082
              name: http
          readinessProbe:
            httpGet:
              path: /system/health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /system/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/rcabench/config.toml
              subPath: config.toml
      volumes:
        - name: config
          configMap:
            name: aegislab-config
---
apiVersion: v1
