apiVersion: v1
kind: Namespace
metadata:
  name: aegislab
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-api
  namespace: aegislab
spec:
  selector:
    app: aegis-api
  ports:
    - name: http
      port: 8082
      targetPort: 8082
    - name: intake-grpc
      port: 9096
      targetPort: 9096
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-api
  namespace: aegislab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-api
  template:
    metadata:
      labels:
        app: aegis-api
    spec:
      containers:
        - name: aegis-api
          image: opspai/rcabench:latest
          args: ["aegis-api", "--conf", "/etc/aegis/config.toml", "--port", "8082"]
          ports:
            - containerPort: 8082
              name: http
            - containerPort: 9096
              name: intake-grpc
          readinessProbe:
            httpGet:
              path: /system/health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /system/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/aegis/config.toml
              subPath: config.toml
      volumes:
        - name: config
          configMap:
            name: aegislab-config
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-worker-service
  namespace: aegislab
spec:
  selector:
    app: runtime-worker-service
  ports:
    - name: grpc
      port: 9094
      targetPort: 9094
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-worker-service
  namespace: aegislab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runtime-worker-service
  template:
    metadata:
      labels:
        app: runtime-worker-service
    spec:
      containers:
        - name: runtime-worker-service
          image: opspai/rcabench:latest
          args: ["runtime-worker-service", "--conf", "/etc/aegis/config.toml"]
          ports:
            - containerPort: 9094
              name: grpc
          readinessProbe:
            grpc:
              port: 9094
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 9094
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/aegis/config.toml
              subPath: config.toml
      volumes:
        - name: config
          configMap:
            name: aegislab-config
