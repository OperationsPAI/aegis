global:
  imageRegistry: pair-diag-cn-guangzhou.cr.volces.com
  images:
    rcabench:
      name: pair/rcabench
      pullPolicy: IfNotPresent

images:
  redis:
    name: pair/redis
  mysql:
    name: pair/mysql
  etcd:
    name: pair/etcd
  busybox:
    name: pair/busybox
  buildkit:
    name: pair/buildkit

rcabench-frontend:
  enabled: false

harbor:
  enabled: false

initialization:
  initDrainTemplate:
    enabled: false

  initHelmCharts:
    image:
      name: pair/init-helm-charts

configmap:
  system:
    env_mode: "test"
  k8s:
    init_container:
      busybox_image: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox:1.35

persistence:
  redis:
    enabled: false

  mysql:
    enabled: false

  etcd:
    enabled: false

# mysql subchart overrides (mirrors legacy images.mysql; persistence
# disabled to match the previous test-overlay behavior).
mysql:
  image:
    name: pair/mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  persistence:
    enabled: false

# redis subchart overrides (mirrors legacy images.redis; persistence disabled).
redis:
  image:
    name: pair/redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent
  persistence:
    enabled: false

# etcd subchart overrides (mirrors legacy images.etcd; persistence disabled).
etcd:
  image:
    name: pair/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
  persistence:
    enabled: false
