global:
  imageRegistry: pair-diag-cn-guangzhou.cr.volces.com

images:
  rcabench:
    name: pair/rcabench
    pullPolicy: IfNotPresent
  redis:
    name: pair/redis
  mysql:
    name: pair/mysql
  etcd:
    name: pair/etcd
  busybox:
    name: pair/busybox
  buildkit:
    name: pair/buildkit

rcabench-frontend:
  enabled: false

harbor:
  enabled: false

initialization:
  initDrainTemplate:
    enabled: false

  initHelmCharts:
    image:
      name: pair/init-helm-charts

configmap:
  system:
    env_mode: "test"
  k8s:
    init_container:
      busybox_image: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox:1.35

persistence:
  redis:
    enabled: false

  mysql:
    enabled: false

  etcd:
    enabled: false
