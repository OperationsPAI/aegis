global:
  clusterCollector:
    # otel-demo deploys an in-namespace wrapper OTel Collector that forwards
    # to this address (chart concatenates `:4317`). The wrapper is a Go OTel
    # binary, so its OTLP gRPC exporter supports the `dns:///` scheme +
    # round_robin balancer for client-side LB across the operator-rendered
    # headless Service. Pointing here at the headless variant prevents the
    # wrapper from pinning to a single deployment-collector pod that an HPA
    # event could churn — the Go-SDK deadlock root-cause behind #300.
    service: dns:///opentelemetry-kube-stack-deployment-collector-headless.monitoring.svc.cluster.local

opentelemetry-demo:
  default:
    # The 18 demo service images (accounting/ad/cart/checkout/...) all use
    # this repo with `:2.2.0-<component>` tags. Chart upstream defaults to
    # ghcr.io/open-telemetry/demo which byte-cluster nodes can't reach;
    # `pair-diag-cn-guangzhou.cr.volces.com/pair/open-telemetry-demo` (the
    # previous override) doesn't actually have the 2.2.0-* tags published.
    # Re-mirrored every component to opspai dockerhub on 2026-05-01 so the
    # volces auto-mirror serves them via this pair-cn-shanghai path.
    image:
      repository: pair-cn-shanghai.cr.volces.com/opspai/open-telemetry-demo

  components:
    accounting:
      initContainers:
        - name: wait-for-kafka
          image: pair-cn-shanghai.cr.volces.com/opspai/busybox:latest
          command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]

    cart:
      initContainers:
        - name: wait-for-valkey-cart
          image: pair-cn-shanghai.cr.volces.com/opspai/busybox:latest
          command: ["sh", "-c", "until nc -z -v -w30 valkey-cart 6379; do echo waiting for valkey-cart; sleep 2; done;"]

    checkout:
      initContainers:
        - name: wait-for-kafka
          image: pair-cn-shanghai.cr.volces.com/opspai/busybox:latest
          command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]

    fraud-detection:
      initContainers:
        - name: wait-for-kafka
          image: pair-cn-shanghai.cr.volces.com/opspai/busybox:latest
          command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]

    kafka:
      imageOverride:
        repository: pair-cn-shanghai.cr.volces.com/opspai/otel-demo-kafka
        tag: "2.2.0"
      initContainers: []

    flagd:
      # flagd main image — chart leaves this at upstream `ghcr.io/open-feature/flagd`.
      # Mirrored to opspai on 2026-05-01, and now available via the
      # pair-cn-shanghai mirror.
      imageOverride:
        repository: pair-cn-shanghai.cr.volces.com/opspai/flagd
        tag: "v0.12.9"
      initContainers:
        - name: init-config
          image: pair-cn-shanghai.cr.volces.com/opspai/busybox:latest
          command: ["sh", "-c", "cp /config-ro/demo.flagd.json /config-rw/demo.flagd.json && cat /config-rw/demo.flagd.json"]
          volumeMounts:
            - mountPath: /config-ro
              name: config-ro
            - mountPath: /config-rw
              name: config-rw

    valkey-cart:
      # valkey-cart subchart's main image — chart upstream uses bitnami; we
      # mirror upstream valkey to opspai for byte-cluster reachability.
      imageOverride:
        repository: pair-cn-shanghai.cr.volces.com/opspai/valkey
        tag: "9.0.1-alpine3.23"

    postgresql:
      imageOverride:
        repository: pair-cn-shanghai.cr.volces.com/opspai/postgres
        # See data.yaml: must be non-numeric or backend's yaml renderer
        # round-trips it as float and chart schema rejects it.
        tag: 17.6-bookworm

    # Disable optional LLM + product-reviews components. They were added
    # in upstream otel-demo 2.2.0 and chart 0.1.8 enables them by default.
    # We don't run AI/LLM workloads in the RCA benchmark — keeping them off
    # avoids two extra mirrored images and two extra Pods per ns.
    llm:
      enabled: false
    product-reviews:
      enabled: false

  opentelemetry-collector:
    image:
      repository: pair-cn-shanghai.cr.volces.com/opspai/otel-demo-opentelemetry-collector-contrib
      tag: "0.135.0"
