apiVersion: apps/v1
kind: Deployment
metadata:
  name: rcabench-frontend
  namespace: exp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rcabench-frontend
  template:
    metadata:
      labels:
        app: rcabench-frontend
    spec:
      containers:
        - name: frontend
          image: pair-diag-cn-guangzhou.cr.volces.com/pair/rcabench-frontend:0.1.2
          imagePullPolicy: IfNotPresent
          env:
            - name: API_TARGET
              value: http://rcabench-api-gateway:8082
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rcabench-frontend
  namespace: exp
spec:
  type: NodePort
  selector:
    app: rcabench-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 32180
