global:
  imageRegistry: ""

images:
  rcabench:
    name: pair-cn-shanghai.cr.volces.com/opspai/rcabench
    tag: byte-20260423-5bd07c0
    pullPolicy: IfNotPresent
  jaeger:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/jaeger
    tag: latest
    pullPolicy: IfNotPresent
  redis:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent
  mysql:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  etcd:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
  busybox:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox
    tag: "1.35"
    pullPolicy: IfNotPresent
  buildkit:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/buildkit
    tag: buildx-stable-1
    pullPolicy: IfNotPresent

buildkit:
  enabled: false

alloy:
  enabled: false

loki:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

rcabench-frontend:
  enabled: false

harbor:
  enabled: false

initialization:
  initDrainTemplate:
    image:
      name: pair-diag-cn-guangzhou.cr.volces.com/pair/init-drain-template
      tag: latest
      pullPolicy: IfNotPresent
  initHelmCharts:
    image:
      name: pair-cn-shanghai.cr.volces.com/opspai/init-helm-charts
      tag: latest
      pullPolicy: IfNotPresent

configmap:
  system:
    env_mode: "prod"
  k8s:
    namespace: "exp"
    init_container:
      busybox_image: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox:1.35
  database:
    clickhouse:
      host: clickstack-clickhouse.monitoring.svc.cluster.local
      port: "8123"
      user: default
      password: ""
      db: otel
      timezone: UTC

microservices:
  apiGateway:
    service:
      type: ClusterIP

persistence:
  storageType: volcengine
  jaeger:
    storageClass: rcabench
  redis:
    storageClass: rcabench
  mysql:
    storageClass: rcabench
  etcd:
    storageClass: rcabench

serviceAccount: {}
