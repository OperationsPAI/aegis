global:
  imageRegistry: ""

images:
  rcabench:
    name: pair-cn-shanghai.cr.volces.com/opspai/rcabench
    tag: byte-20260501-groundtruth-fix
    pullPolicy: IfNotPresent
  jaeger:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/jaeger
    tag: latest
    pullPolicy: IfNotPresent
  redis:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent
  mysql:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  etcd:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
  busybox:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox
    tag: "1.35"
    pullPolicy: IfNotPresent
  buildkit:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/buildkit
    tag: buildx-stable-1
    pullPolicy: IfNotPresent
  caddy:
    # Mirrored docker.io/library/caddy:2-alpine -> docker.io/opspai/caddy:2-alpine
    # on 2026-05-01; volces auto-mirror serves it as pair-cn-shanghai/opspai/caddy.
    name: pair-cn-shanghai.cr.volces.com/opspai/caddy
    tag: "2-alpine"
    pullPolicy: IfNotPresent

buildkit:
  enabled: false

alloy:
  enabled: false

loki:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

rcabench-frontend:
  enabled: false

harbor:
  enabled: false

initialization:
  initDrainTemplate:
    image:
      name: pair-diag-cn-guangzhou.cr.volces.com/pair/init-drain-template
      tag: latest
      pullPolicy: IfNotPresent
  initHelmCharts:
    image:
      name: pair-cn-shanghai.cr.volces.com/opspai/init-helm-charts
      tag: latest
      pullPolicy: IfNotPresent

configmap:
  system:
    env_mode: "prod"
  k8s:
    namespace: "exp"
    init_container:
      busybox_image: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox:1.35
  database:
    clickhouse:
      # Operator-managed ClickStack cluster (chart 2.x). The chart helper
      # `clickstack.clickhouse.svc` renders the headless Service name
      # `<release>-clickhouse-clickhouse-headless`; with release name
      # `clickstack` that's `clickstack-clickhouse-clickhouse-headless`.
      # ClickHouse client load-balances across pods returned by the
      # headless DNS lookup, so this works for a 2-replica cluster without
      # any extra Service.
      host: clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local
      port: "8123"
      user: default
      password: ""
      db: otel
      timezone: UTC

microservices:
  apiGateway:
    service:
      type: ClusterIP
      # LB-binding annotations live on the edge-proxy Service (see
      # `edgeProxy.service.annotations` below), not here. Keeping this
      # empty means routine api-gateway upgrades no longer touch any
      # object the Volcengine LB controller cares about, so the bound
      # EIP stays stable across `helm upgrade rcabench`.
      annotations: {}

edgeProxy:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    # Volcengine LB EIP is bound to this Service MANUALLY (kubectl annotate)
    # after the proxy is up — keeping helm out of the LB-binding loop entirely
    # avoids the EIP-churn bugs we saw on the api-gateway Service. Once bound,
    # the controller-output annotation (`service.beta.kubernetes.io/system-
    # volcengine-loadbalancer-create-response-id`) and the bound-EIP annotations
    # live ONLY on the live cluster Service, never in this values.yaml, so
    # `helm upgrade` is a no-op against them. See aegis#335 / aegis#336.
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
    # CPU requests are required for HPA targetCPUUtilizationPercentage to work.
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
  runtimeWorkerService:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70

persistence:
  storageType: volcengine
  jaeger:
    storageClass: rcabench
  redis:
    storageClass: rcabench
  mysql:
    storageClass: rcabench
  etcd:
    storageClass: rcabench

serviceAccount: {}
