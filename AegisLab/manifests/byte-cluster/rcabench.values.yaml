global:
  imageRegistry: ""
  # Single source of truth for the shared backend image — consumed by
  # parent-chart deployments and every extracted subchart (notify, future
  # sso/blob).
  images:
    rcabench:
      name: pair-cn-shanghai.cr.volces.com/opspai/rcabench
      tag: byte-20260513-s3-blob-v2
      pullPolicy: IfNotPresent

images:
  redis:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent
  mysql:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  etcd:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
  busybox:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox
    tag: "1.35"
    pullPolicy: IfNotPresent
  buildkit:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/buildkit
    tag: buildx-stable-1
    pullPolicy: IfNotPresent
  caddy:
    # Mirrored docker.io/library/caddy:2-alpine -> docker.io/opspai/caddy:2-alpine
    # on 2026-05-01; volces auto-mirror serves it as pair-cn-shanghai/opspai/caddy.
    name: pair-cn-shanghai.cr.volces.com/opspai/caddy
    tag: "2-alpine"
    pullPolicy: IfNotPresent

# In-namespace otel-collector. The chart-default image is docker.io/otel/*
# which the byte VPC can't reach — use the volces pair mirror that the
# monitoring stack already uses.
otelCollector:
  image:
    # Tag matches what the monitoring otel-kube-stack uses (the only tag
    # actually published in the pair-diag mirror).
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/opentelemetry-collector-contrib
    tag: "0.142.0-amd64"
    pullPolicy: IfNotPresent

buildkit:
  enabled: false

alloy:
  enabled: false

loki:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

rcabench-frontend:
  enabled: false

harbor:
  enabled: false

initialization:
  initDrainTemplate:
    image:
      name: pair-diag-cn-guangzhou.cr.volces.com/pair/init-drain-template
      tag: latest
      pullPolicy: IfNotPresent
  initHelmCharts:
    image:
      name: pair-cn-shanghai.cr.volces.com/opspai/init-helm-charts
      tag: latest
      pullPolicy: IfNotPresent

configmap:
  system:
    env_mode: "prod"
  k8s:
    namespace: "exp"
    init_container:
      busybox_image: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox:1.35
  database:
    clickhouse:
      # Operator-managed ClickStack cluster (chart 2.x). The chart helper
      # `clickstack.clickhouse.svc` renders the headless Service name
      # `<release>-clickhouse-clickhouse-headless`; with release name
      # `clickstack` that's `clickstack-clickhouse-clickhouse-headless`.
      # ClickHouse client load-balances across pods returned by the
      # headless DNS lookup, so this works for a 2-replica cluster without
      # any extra Service.
      host: clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local
      port: "8123"
      user: default
      password: ""
      db: otel
      timezone: UTC

# rustfs (in-cluster S3 backend for aegis-blob). The chart renders the
# Secret/PVC/Deployment/Service/Job — no separate manifest apply needed.
# OVERRIDE rustfs.auth.rootPassword + bucketEnvAliases before prod use.
rustfs:
  enabled: true
  image:
    name: pair-cn-shanghai.cr.volces.com/opspai/rustfs
    tag: latest
  initBuckets:
    image:
      name: pair-cn-shanghai.cr.volces.com/opspai/mc
      tag: latest

microservices:
  aegisApi:
    # Inject rustfs S3 credentials so the in-process blob client's s3 driver
    # can read BLOB_S3_*_ACCESS_KEY / BLOB_S3_*_SECRET_KEY at startup. The
    # chart gates this on the field being non-empty so other manifest packs
    # (kind, prod, cn_mirror) are unaffected.
    extraEnvFrom:
      - secretRef:
          name: rustfs-admin
    service:
      type: ClusterIP
      # LB-binding annotations live on the edge-proxy Service (see
      # `edgeProxy.service.annotations` below), not here. Keeping this
      # empty means routine aegis-api upgrades no longer touch any
      # object the Volcengine LB controller cares about, so the bound
      # EIP stays stable across `helm upgrade rcabench`.
      annotations: {}
  runtimeWorkerService:
    extraEnvFrom:
      - secretRef:
          name: rustfs-admin
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70

edgeProxy:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    # Volcengine LB EIP is bound to this Service MANUALLY (kubectl annotate)
    # after the proxy is up — keeping helm out of the LB-binding loop entirely
    # avoids the EIP-churn bugs we saw on the aegis-api Service. Once bound,
    # the controller-output annotation (`service.beta.kubernetes.io/system-
    # volcengine-loadbalancer-create-response-id`) and the bound-EIP annotations
    # live ONLY on the live cluster Service, never in this values.yaml, so
    # `helm upgrade` is a no-op against them. See aegis#335 / aegis#336.
    annotations: {}
  # CPU requests are required for HPA targetCPUUtilizationPercentage to work.
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# aegis-gateway refuses to start in `env=prod` without a non-empty
# `gateway.trusted_header_key`. Set a stable cluster-internal value
# (rotate by helm upgrade --set).
gateway:
  trustedHeaderKey: "byte-cluster-trusted-key-please-rotate"

# blob microservice (aegis-blob) needs the same S3 credential envFrom so
# its in-process s3 driver can resolve `access_key_env` / `secret_key_env`
# at boot — without this the blob registry build fails with
# "s3 driver requires access_key + secret_key (or *_env)".
#
# Wire-format blob/share configuration (previously under parent
# `configmap.blob` / `configmap.share`) now lives directly under the
# `blob` subchart's values — schema and rendering co-located in
# `helm/charts/blob/`.
blob:
  extraEnvFrom:
    - secretRef:
        name: rustfs-admin
  # The byte-cluster pack runs aegis-blob as a sidecar microservice and
  # backs its buckets with the in-cluster rustfs S3 server (see
  # `rustfs.yaml`). Producers (api-gateway, runtime-worker-service) keep
  # using the in-process blob client; only the underlying driver changes
  # to `s3` per bucket. Credentials come from envFrom on the
  # `rustfs-admin` Secret (above).
  client:
    mode: "local"
  buckets:
    datapack:
      driver: "s3"
      endpoint: "http://rcabench-rustfs.exp.svc.cluster.local:9000"
      bucket: "aegis-datapack"
      region: "us-east-1"
      use_ssl: false
      path_style: true
      access_key_env: "BLOB_S3_DATAPACK_ACCESS_KEY"
      secret_key_env: "BLOB_S3_DATAPACK_SECRET_KEY"
    execution:
      driver: "s3"
      endpoint: "http://rcabench-rustfs.exp.svc.cluster.local:9000"
      bucket: "aegis-execution"
      region: "us-east-1"
      use_ssl: false
      path_style: true
      access_key_env: "BLOB_S3_EXECUTION_ACCESS_KEY"
      secret_key_env: "BLOB_S3_EXECUTION_SECRET_KEY"
    shared:
      # Bucket backing the ephemeral file-sharing feature
      # (`POST /api/v2/share/upload` + `GET /s/:code`). Lives on the
      # same rustfs instance as datapack/execution; the `aegis-shared`
      # bucket is created by the `rustfs-init-bucket` Job.
      driver: "s3"
      endpoint: "http://rcabench-rustfs.exp.svc.cluster.local:9000"
      bucket: "aegis-shared"
      region: "us-east-1"
      use_ssl: false
      path_style: true
      access_key_env: "BLOB_S3_SHARED_ACCESS_KEY"
      secret_key_env: "BLOB_S3_SHARED_SECRET_KEY"
  share:
    bucket: "shared"
    # Externally-reachable URL prefix for `/s/:code` redirect URLs.
    # Override with the bound LB EIP once known
    # (`kubectl -n exp get svc rcabench-edge-proxy`). Empty string is
    # also fine — the handler then returns relative `/s/<code>` URLs.
    publicBaseURL: ""

sso:
  image:
    # SSO microservice runs the same `opspai/rcabench` image (different
    # entrypoint). Pin to the volces mirror + matching tag so the byte
    # cluster doesn't try docker.io (unreachable from this VPC).
    repository: pair-cn-shanghai.cr.volces.com/opspai/rcabench
    tag: 4773a1b-dirty
    pullPolicy: IfNotPresent
  persistence:
    storageClass: rcabench

persistence:
  storageType: volcengine
  redis:
    storageClass: rcabench
  mysql:
    storageClass: rcabench
  etcd:
    storageClass: rcabench

# mysql subchart overrides (mirrors legacy images.mysql + persistence.mysql).
mysql:
  image:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  persistence:
    storageClass: rcabench

serviceAccount: {}
