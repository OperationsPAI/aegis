global:
  imageRegistry: ""

images:
  rcabench:
    name: pair-cn-shanghai.cr.volces.com/opspai/rcabench
    tag: byte-20260501-groundtruth-fix
    pullPolicy: IfNotPresent
  jaeger:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/jaeger
    tag: latest
    pullPolicy: IfNotPresent
  redis:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent
  mysql:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  etcd:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
  busybox:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox
    tag: "1.35"
    pullPolicy: IfNotPresent
  buildkit:
    name: pair-diag-cn-guangzhou.cr.volces.com/pair/buildkit
    tag: buildx-stable-1
    pullPolicy: IfNotPresent

buildkit:
  enabled: false

alloy:
  enabled: false

loki:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

rcabench-frontend:
  enabled: false

harbor:
  enabled: false

initialization:
  initDrainTemplate:
    image:
      name: pair-diag-cn-guangzhou.cr.volces.com/pair/init-drain-template
      tag: latest
      pullPolicy: IfNotPresent
  initHelmCharts:
    image:
      name: pair-cn-shanghai.cr.volces.com/opspai/init-helm-charts
      tag: latest
      pullPolicy: IfNotPresent

configmap:
  system:
    env_mode: "prod"
  k8s:
    namespace: "exp"
    init_container:
      busybox_image: pair-diag-cn-guangzhou.cr.volces.com/pair/busybox:1.35
  database:
    clickhouse:
      # Operator-managed ClickStack cluster (chart 2.x). The chart helper
      # `clickstack.clickhouse.svc` renders the headless Service name
      # `<release>-clickhouse-clickhouse-headless`; with release name
      # `clickstack` that's `clickstack-clickhouse-clickhouse-headless`.
      # ClickHouse client load-balances across pods returned by the
      # headless DNS lookup, so this works for a 2-replica cluster without
      # any extra Service.
      host: clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local
      port: "8123"
      user: default
      password: ""
      db: otel
      timezone: UTC

microservices:
  apiGateway:
    service:
      type: ClusterIP
      # Volcengine LB controller annotations: bind a stable EIP via a CLB
      # the controller materializes from these knobs. Kept in chart values
      # (not stamped out-of-band) so `helm upgrade rcabench` doesn't drop
      # them — without these, the controller re-creates the CLB and the
      # bound EIP changes, breaking external clients.
      # The CLB ID surfaces in the live Service annotations as
      # `service.beta.kubernetes.io/system-volcengine-loadbalancer-create-response-id`
      # after the controller's first reconcile; that's the controller's
      # OUTPUT and is intentionally NOT in this map (helm would clobber it
      # on upgrade if it were).
      annotations:
        service.beta.kubernetes.io/volcengine-loadbalancer-address-type: PUBLIC
        service.beta.kubernetes.io/volcengine-loadbalancer-bandwidth: "200"
        service.beta.kubernetes.io/volcengine-loadbalancer-billing-type: "2"
        service.beta.kubernetes.io/volcengine-loadbalancer-eip-billing-type: "3"
        service.beta.kubernetes.io/volcengine-loadbalancer-health-check-flag: "off"
        service.beta.kubernetes.io/volcengine-loadbalancer-ip-version: ipv4
        service.beta.kubernetes.io/volcengine-loadbalancer-isp-type: BGP
        service.beta.kubernetes.io/volcengine-loadbalancer-name: pair-lb
        service.beta.kubernetes.io/volcengine-loadbalancer-pass-through: "true"
        service.beta.kubernetes.io/volcengine-loadbalancer-project-name: default
        service.beta.kubernetes.io/volcengine-loadbalancer-scheduler: wrr
        service.beta.kubernetes.io/volcengine-loadbalancer-spec: small_1
        service.beta.kubernetes.io/volcengine-loadbalancer-subnet-id: subnet-33g6ke6jw1b0g6k70bpphvvjn
    # CPU requests are required for HPA targetCPUUtilizationPercentage to work.
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
  runtimeWorkerService:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70

persistence:
  storageType: volcengine
  jaeger:
    storageClass: rcabench
  redis:
    storageClass: rcabench
  mysql:
    storageClass: rcabench
  etcd:
    storageClass: rcabench

serviceAccount: {}
