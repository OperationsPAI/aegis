# Byte-cluster values for the operator-managed ClickStack chart vendored
# under AegisLab/vendor/clickstack-chart (upstream
# https://github.com/ClickHouse/ClickStack-helm-charts charts/clickstack at
# commit a7862878b89aa30d459fbda602087cb76defd33a, chart version 2.1.1,
# app version 2.23.0). See AegisLab/vendor/clickstack-chart/SOURCE.txt.
#
# Shape vs. the old clickstack/clickstack@1.1.1 values:
#   - `global.storageClassName` and `global.keepPVC` are gone. Storage class
#     is now per-component on `*.dataVolumeClaimSpec.storageClassName`. The
#     chart never deletes its PVCs implicitly; helm uninstall + manual PVC
#     cleanup is required to wipe data (we accept that on this migration).
#   - `clickhouse.image` is gone; replaced by
#     `clickhouse.cluster.spec.containerTemplate.image.{repository,tag}`.
#   - `clickhouse.config.users.*` flat shape is replaced by the operator's
#     `clickhouse.cluster.spec.settings.extraUsersConfig.users.*` block.
#   - Concurrency overrides previously living in
#     `clickhouse-extra-config.yaml` (a sibling ConfigMap mounted via
#     `kubectl patch` because 1.1.1 had no override path) are now first-
#     class under `clickhouse.cluster.spec.settings.extraConfig`. The
#     operator renders them into a config.d entry on each pod.
#   - HyperDX gains an HPA via `hyperdx.autoscaling.{enabled,spec}`.
#   - HyperDX image moved from `hyperdx.image.repository` to
#     `hyperdx.deployment.image.repository`.

# ── HyperDX (the observability app) ─────────────────────────────────────────
hyperdx:
  service:
    type: ClusterIP
  deployment:
    image:
      repository: pair-diag-cn-guangzhou.cr.volces.com/pair/hyperdx
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
  # HPA on the HyperDX app — the new chart supports this natively, the old
  # 1.1.1 chart did not. minReplicas=2 keeps the API alive across single-pod
  # evictions; CPU at 70 % is a conservative trigger that scales out before
  # the app starts serving 5xx under load.
  autoscaling:
    enabled: true
    spec:
      minReplicas: 2
      maxReplicas: 4
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70
  # Sensitive values — keep parity with the old `clickhouse.config.users`
  # passwords so HyperDX, the OTel collector, and the rcabench backend do
  # not need credential changes during the migration.
  secrets:
    HYPERDX_API_KEY: "00000000-0000-0000-0000-000000000000"
    CLICKHOUSE_PASSWORD: "otelcollectorpass"
    CLICKHOUSE_APP_PASSWORD: "hyperdx"
    MONGODB_PASSWORD: "hyperdx"

# ── ClickHouse (operator-managed cluster) ───────────────────────────────────
clickhouse:
  enabled: true
  port: 8123
  nativePort: 9000
  prometheus:
    enabled: true
    port: 9363

  # KeeperCluster CR — replaces ZooKeeper for replication coordination.
  # 3 replicas form a Raft quorum that survives a single pod loss.
  keeper:
    spec:
      replicas: 3
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        storageClassName: rcabench
        resources:
          requests:
            storage: 5Gi

  # ClickHouseCluster CR. `replicas: 2 / shards: 1` gives a replicated
  # single-shard cluster — closes the HA gap from #208 (one CH pod was the
  # whole data plane). The operator wires both replicas into the same
  # `<remote_servers>` cluster automatically. Resource envelope carries
  # over from PR #206 so the headroom under the autonomous inject-loop is
  # preserved.
  cluster:
    spec:
      keeperClusterRef:
        name: '{{ include "clickstack.clickhouse.keeper" . }}'
      replicas: 2
      shards: 1
      containerTemplate:
        image:
          repository: pair-diag-cn-guangzhou.cr.volces.com/pair/clickhouse-server
          tag: "25.7-alpine"
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        storageClassName: rcabench
        resources:
          requests:
            storage: 50Gi
      settings:
        # Carry-over of the 90-limits.xml drop-in that PR #206 mounted via a
        # sibling ConfigMap. The operator renders `extraConfig` to a
        # config.d/ entry on each pod automatically, so the
        # clickhouse-extra-config.yaml + kubectl-patch dance is no longer
        # needed (and the file is removed in this PR).
        extraConfig:
          max_concurrent_queries: 2000
          max_concurrent_select_queries: 1500
          concurrent_threads_soft_limit_ratio_to_cores: 2
          # Upstream chart defaults we want to keep (see chart values.yaml).
          max_connections: 4096
          keep_alive_timeout: 64
        # Users are templated via Helm so the passwords come from
        # `hyperdx.secrets.*` above (single source of truth).
        extraUsersConfig:
          users:
            app:
              password: '{{ .Values.hyperdx.secrets.CLICKHOUSE_APP_PASSWORD }}'
              profile: default
              grants:
                - query: "GRANT SHOW ON *.*, SELECT ON system.*, SELECT ON default.*"
            otelcollector:
              password: '{{ .Values.hyperdx.secrets.CLICKHOUSE_PASSWORD }}'
              profile: default
              grants:
                - query: "GRANT SELECT,INSERT,CREATE,SHOW ON default.*, SELECT,INSERT,CREATE,SHOW ON otel.*"

# ── MongoDB / embedded OTel collector ───────────────────────────────────────
# Both stay disabled. HyperDX session storage isn't used by aegis, and the
# cluster already runs the dedicated `opentelemetry-kube-stack` chart for
# OTel ingestion (see otel-kube-stack.values.yaml).
mongodb:
  enabled: false
otel-collector:
  enabled: false
