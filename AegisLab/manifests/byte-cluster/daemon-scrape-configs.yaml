# Collect all metrics from pods on the daemon set's node with at least this annotation:
# prometheus.io/scrape: 'true'
# The deployment collector handles cluster-wide pod/endpoints scraping. The daemon
# collector only scrapes kubelet/cAdvisor on its own node.
- authorization:
    credentials_file: "/var/run/secrets/kubernetes.io/serviceaccount/token"
    type: Bearer
  follow_redirects: true
  honor_labels: true
  honor_timestamps: true
  job_name: kubelet
  kubernetes_sd_configs:
    - follow_redirects: true
      role: node
      selectors:
        - role: node
          field: "metadata.name=${env:OTEL_K8S_NODE_NAME}"
  metric_relabel_configs:
    - action: drop
      regex: container_cpu_(load_average_10s|system_seconds_total|user_seconds_total)
      source_labels: [__name__]
    - action: drop
      regex: container_fs_(io_current|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)
      source_labels: [__name__]
    - action: drop
      regex: container_memory_(mapped_file|swap)
      source_labels: [__name__]
    - action: drop
      regex: container_(file_descriptors|tasks_state|threads_max)
      source_labels: [__name__]
    - action: drop
      regex: container_spec.*
      source_labels: [__name__]
    - action: drop
      regex: '.+;'
      source_labels: [id, pod]
  metrics_path: /metrics/cadvisor
  relabel_configs:
    - action: replace
      source_labels: [__meta_kubernetes_node_name]
      target_label: node
    - action: replace
      target_label: endpoint
      replacement: https-metrics
    - action: hashmod
      source_labels: [__address__]
      target_label: __tmp_hash
      modulus: 1
    - action: keep
      source_labels: [__tmp_hash]
      regex: '$(SHARD)'
  scheme: https
  scrape_interval: 15s
  scrape_timeout: 10s
  tls_config:
    ca_file: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    insecure_skip_verify: true
