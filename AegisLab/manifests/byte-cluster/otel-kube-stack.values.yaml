fullnameOverride: ""
namespaceOverride: ""
clusterName: "aegis-byte"
extraEnvs: []

cleanupJob:
  enabled: true
  image:
    repository: pair-diag-cn-guangzhou.cr.volces.com/pair/kubectl
    tag: v1.34.1
    digest: ""
  existingServiceAccount: ""

crds:
  installOtel: true
  installPrometheus: false

opentelemetry-operator:
  enabled: true
  manager:
    image:
      repository: pair-diag-cn-guangzhou.cr.volces.com/pair/opentelemetry-operator
      tag: "0.138.0"
    collectorImage:
      repository: pair-diag-cn-guangzhou.cr.volces.com/pair/opentelemetry-collector-contrib
      tag: "0.142.0-amd64"
  admissionWebhooks:
    failurePolicy: Ignore
    certManager:
      enabled: false
    autoGenerateCert:
      enabled: true
      recreate: true
  crds:
    create: false

defaultCRConfig:
  enabled: true
  suffix: collector
  fullnameOverride: ""
  annotations: {}
  labels: {}
  scrape_configs_file: ""
  managementState: managed
  clusterRoleBinding:
    enabled: true
    clusterRoleName: ""
  mode: deployment
  serviceAccount: ""
  image:
    repository: pair-diag-cn-guangzhou.cr.volces.com/pair/opentelemetry-collector-contrib
    pullPolicy: IfNotPresent
    tag: "0.142.0-amd64"
    digest: ""
  command:
    name: otelcol-contrib
  upgradeStrategy: none
  config: {}
  hostNetwork: false
  shareProcessNamespace: false
  priorityClassName: ""
  terminationGracePeriodSeconds: 30
  nodeSelector: {}
  args: {}
  autoscaler: {}
  podDisruptionBudget: {}
  securityContext: {}
  podSecurityContext: {}
  podAnnotations: {}
  targetAllocator: {}
  affinity: {}
  lifecycle: {}
  livenessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 5
  observability:
    metrics:
      enableMetrics: true

collectors:
  daemon:
    hostNetwork: false
    suffix: daemon
    mode: daemonset
    enabled: true
    resources:
      limits:
        cpu: 2000m
        memory: 5000Mi
      requests:
        cpu: 1000m
        memory: 2500Mi
    scrape_configs_file: daemon-scrape-configs.yaml
    presets:
      logsCollection:
        enabled: false
        includeCollectorLogs: false
        storeCheckpoints: false
        maxRecombineLogSize: 102400
      hostMetrics:
        enabled: true
      kubernetesAttributes:
        enabled: true
        extractAllPodLabels: false
        extractAllPodAnnotations: false
      kubernetesEvents:
        enabled: false
    config:
      receivers:
        otlp:
          protocols:
            grpc: {}
            http: {}
        prometheus:
          config:
            scrape_configs:
              - authorization:
                  credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                  type: Bearer
                follow_redirects: true
                honor_labels: true
                honor_timestamps: true
                job_name: kubelet
                kubernetes_sd_configs:
                  - follow_redirects: true
                    role: node
                    selectors:
                      - role: node
                        field: metadata.name=${env:OTEL_K8S_NODE_NAME}
                metric_relabel_configs:
                  - action: drop
                    regex: container_cpu_(load_average_10s|system_seconds_total|user_seconds_total)
                    source_labels: [__name__]
                  - action: drop
                    regex: container_fs_(io_current|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)
                    source_labels: [__name__]
                  - action: drop
                    regex: container_memory_(mapped_file|swap)
                    source_labels: [__name__]
                  - action: drop
                    regex: container_(file_descriptors|tasks_state|threads_max)
                    source_labels: [__name__]
                  - action: drop
                    regex: container_spec.*
                    source_labels: [__name__]
                  - action: drop
                    regex: '.+;'
                    source_labels: [id, pod]
                metrics_path: /metrics/cadvisor
                relabel_configs:
                  - action: replace
                    source_labels: [__meta_kubernetes_node_name]
                    target_label: node
                  - action: replace
                    target_label: endpoint
                    replacement: https-metrics
                scheme: https
                scrape_interval: 15s
                scrape_timeout: 10s
                tls_config:
                  ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  insecure_skip_verify: true
        kubeletstats:
          collection_interval: 5s
          auth_type: serviceAccount
          endpoint: ${env:OTEL_K8S_NODE_NAME}:10250
          node: ${env:OTEL_K8S_NODE_NAME}
          k8s_api_config:
            auth_type: serviceAccount
          insecure_skip_verify: true
          metric_groups: [node, pod, container]
          metrics:
            k8s.pod.cpu.node.utilization:
              enabled: true
            k8s.pod.cpu.usage:
              enabled: true
            k8s.pod.cpu_limit_utilization:
              enabled: true
            k8s.pod.memory.node.utilization:
              enabled: true
            k8s.pod.memory_limit_utilization:
              enabled: true
        filelog:
          include:
            - /var/log/pods/*/*/*.log
          exclude:
            - /var/log/pods/kube-system_*/*/*.log
            - /var/log/pods/otel_*/*/*.log
            - /var/log/pods/local-path-storage_*/*/*.log
          start_at: end
          include_file_path: true
          include_file_name: false
          operators:
            - type: router
              id: get-format
              routes:
                - output: parser-docker
                  expr: 'body matches "^{.*"'
                - output: parser-crio
                  expr: 'body matches "^[^ Z]+ "'
                - output: parser-containerd
                  expr: 'body matches "^[^ Z]+Z"'
            - type: regex_parser
              id: parser-crio
              regex: '^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
              output: extract_metadata_from_filepath
              timestamp:
                parse_from: attributes.time
                layout_type: gotime
                layout: '2006-01-02T15:04:05.999999999Z07:00'
            - type: regex_parser
              id: parser-containerd
              regex: '^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
              output: extract_metadata_from_filepath
              timestamp:
                parse_from: attributes.time
                layout: '%Y-%m-%dT%H:%M:%S.%LZ'
            - type: json_parser
              id: parser-docker
              output: extract_metadata_from_filepath
              timestamp:
                parse_from: attributes.time
                layout: '%Y-%m-%dT%H:%M:%S.%LZ'
            - type: regex_parser
              id: extract_metadata_from_filepath
              regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]{16,36})\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
              parse_from: attributes["log.file.path"]
              cache:
                size: 128
            - type: json_parser
              parse_from: attributes.log
              trace:
                trace_id:
                  parse_from: attributes.traceID
                span_id:
                  parse_from: attributes.spanID
              if: 'attributes.log matches "^{.*}$"'
            - type: move
              from: attributes["log.file.path"]
              to: resource["filename"]
            - type: move
              from: attributes.container_name
              to: resource["k8s.container.name"]
            - type: copy
              from: attributes.namespace
              to: resource["service.namespace"]
            - type: move
              from: attributes.namespace
              to: resource["k8s.namespace.name"]
            - type: move
              from: attributes.pod_name
              to: resource["k8s.pod.name"]
            - type: add
              field: resource["cluster"]
              value: aegis-byte
            - type: move
              from: attributes.log
              to: body
      processors:
        batch:
          send_batch_size: 2000
          send_batch_max_size: 4000
          timeout: 5s
        memory_limiter:
          check_interval: 1s
          limit_percentage: 75
          spike_limit_percentage: 15
        k8sattributes:
          auth_type: serviceAccount
          passthrough: false
          extract:
            metadata:
              - k8s.pod.name
              - k8s.pod.uid
              - k8s.deployment.name
              - k8s.namespace.name
              - k8s.node.name
              - k8s.pod.start_time
              - service.name
              - service.version
              - service.instance.id
            labels:
              - tag_name: app.label.component
                key: app.kubernetes.io/component
                from: pod
              - tag_name: service.name
                key: app.kubernetes.io/name
                from: pod
              - tag_name: service.name
                key: app
                from: pod
              - tag_name: service.name
                key: name
                from: pod
            otel_annotations: true
          pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.pod.ip
            - sources:
                - from: resource_attribute
                  name: k8s.pod.uid
            - sources:
                - from: resource_attribute
                  name: k8s.pod.name
                - from: resource_attribute
                  name: k8s.namespace.name
            - sources:
                - from: connection
      exporters:
        clickhouse:
          # Operator-managed ClickStack cluster headless Service. With release
          # name `clickstack` the chart helper `clickstack.clickhouse.svc`
          # renders `clickstack-clickhouse-clickhouse-headless`; the
          # `monitoring.svc.cluster.local` suffix is the namespace + cluster
          # domain. The exporter deliberately keeps `username=default` to
          # avoid coupling the OTel pipeline to the otelcollector user
          # password (which is now templated through hyperdx.secrets).
          endpoint: tcp://clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local:9000?dial_timeout=10s&compress=lz4&username=default
          database: otel
          ttl: 72h
          logs_table_name: otel_logs
          traces_table_name: otel_traces
          metrics_table_name: otel_metrics
          timeout: 5s
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
      service:
        pipelines:
          logs:
            exporters: [clickhouse]
            processors: [memory_limiter, k8sattributes, batch]
            receivers: [filelog, otlp]
          metrics:
            exporters: [clickhouse]
            processors: [memory_limiter, k8sattributes, batch]
            receivers: [otlp, kubeletstats]
          traces:
            exporters: [clickhouse]
            processors: [memory_limiter, k8sattributes, batch]
            receivers: [otlp]
  deploy:
    suffix: deployment
    mode: deployment
    enabled: true
    replicas: 6
    autoscaler:
      # Under TT firehose (50+ services × 16 ns) the HPA pegged at 40 with
      # memory_limiter at 174 %/60 %, dropping every TT span via UNAVAILABLE
      # responses (Java agent OkHttp gRPC exporter does not retry). First lift
      # was 40→120 + 4Gi→8Gi; the post-roll fleet still saturated at 8Gi
      # (75 %/60 %), so the limit went 8Gi→16Gi as well. Cluster (36 nodes,
      # ~120Gi each) absorbs 120 × 16Gi ≈ 53Gi/node worst case.
      minReplicas: 6
      maxReplicas: 120
      targetCPUUtilization: 55
      targetMemoryUtilization: 60
    podDisruptionBudget:
      minAvailable: 4
    resources:
      limits:
        cpu: 4000m
        memory: 16000Mi
      requests:
        cpu: 1000m
        memory: 6000Mi
    presets:
      kubernetesEvents:
        enabled: true
      clusterMetrics:
        enabled: true
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: opentelemetry-collector
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: opentelemetry-collector
    config:
      exporters:
        clickhouse:
          # Operator-managed ClickStack cluster headless Service. With release
          # name `clickstack` the chart helper `clickstack.clickhouse.svc`
          # renders `clickstack-clickhouse-clickhouse-headless`; the
          # `monitoring.svc.cluster.local` suffix is the namespace + cluster
          # domain. The exporter deliberately keeps `username=default` to
          # avoid coupling the OTel pipeline to the otelcollector user
          # password (which is now templated through hyperdx.secrets).
          endpoint: tcp://clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local:9000?dial_timeout=10s&compress=lz4&username=default
          database: otel
          ttl: 72h
          logs_table_name: otel_logs
          traces_table_name: otel_traces
          metrics_table_name: otel_metrics
          timeout: 5s
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
      processors:
        batch:
          timeout: 5s
          send_batch_size: 2000
          send_batch_max_size: 4000
        memory_limiter:
          check_interval: 1s
          limit_percentage: 75
          spike_limit_percentage: 15
        k8sattributes:
          auth_type: serviceAccount
          passthrough: false
          extract:
            metadata:
              - k8s.pod.name
              - k8s.pod.uid
              - k8s.deployment.name
              - k8s.namespace.name
              - k8s.node.name
              - k8s.pod.start_time
              - service.name
              - service.version
              - service.instance.id
            labels:
              - tag_name: app.label.component
                key: app.kubernetes.io/component
                from: pod
              - tag_name: service.name
                key: app.kubernetes.io/name
                from: pod
              - tag_name: service.name
                key: app
                from: pod
              - tag_name: service.name
                key: name
                from: pod
            otel_annotations: true
          pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.pod.ip
            - sources:
                - from: resource_attribute
                  name: k8s.pod.uid
            - sources:
                - from: resource_attribute
                  name: k8s.pod.name
                - from: resource_attribute
                  name: k8s.namespace.name
            - sources:
                - from: connection
        transform/service_namespace:
          trace_statements:
            - context: resource
              statements:
                - set(attributes["service.namespace"], attributes["k8s.namespace.name"]) where attributes["k8s.namespace.name"] != nil
          metric_statements:
            - context: resource
              statements:
                - set(attributes["service.namespace"], attributes["k8s.namespace.name"]) where attributes["k8s.namespace.name"] != nil
          log_statements:
            - context: resource
              statements:
                - set(attributes["service.namespace"], attributes["k8s.namespace.name"]) where attributes["k8s.namespace.name"] != nil
      connectors:
        spanmetrics: {}
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        prometheus:
          config:
            scrape_configs:
              - job_name: kubernetes-pods
                scrape_interval: 15s
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: keep
                    regex: true
                  - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                    action: replace
                    regex: ([^:]+)(?::\d+)?;(\d+)
                    replacement: $${1}:$${2}
                    target_label: __address__
                  - source_labels: [__meta_kubernetes_namespace]
                    action: replace
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_name]
                    action: replace
                    target_label: pod
              - job_name: kubernetes-endpoints
                scrape_interval: 15s
                kubernetes_sd_configs:
                  - role: endpoints
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                    action: keep
                    regex: true
                  - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
                    action: replace
                    regex: (.+)(?::\d+);(\d+)
                    replacement: $$1:$$2
                    target_label: __address__
      service:
        pipelines:
          logs:
            exporters: [clickhouse]
            processors: [memory_limiter, k8sattributes, transform/service_namespace, batch]
            receivers: [otlp]
          metrics:
            exporters: [clickhouse]
            processors: [memory_limiter, k8sattributes, transform/service_namespace, batch]
            receivers: [otlp, prometheus, spanmetrics]
          traces:
            exporters: [spanmetrics, clickhouse]
            processors: [memory_limiter, k8sattributes, transform/service_namespace, batch]
            receivers: [otlp]

clusterRole:
  enabled: true
  annotations: {}
  rules:
    - apiGroups: ['']
      resources: ['pods', 'nodes', 'namespaces', 'nodes/stats', 'nodes/proxy']
      verbs: ['get', 'list', 'watch']

# Instrumentation configuration.
#
# Renders an `Instrumentation` CR named `opentelemetry-kube-stack` in the
# release namespace (`monitoring` on Byte). Benchmark charts that auto-inject
# (e.g. teastore via `opentelemetry.monitoringNamespace=monitoring` +
# `opentelemetry.instrumentationName=opentelemetry-kube-stack`) require this
# CR to exist. Previously `enabled: false`, which silently skipped injection
# and caused zero traces from auto-instrumented pods.
instrumentation:
  enabled: true
  labels: {}
  annotations: {}

  # Default collector's service (deployment collector in the release namespace).
  exporter:
    endpoint: http://opentelemetry-kube-stack-deployment-collector.monitoring:4317

  resource:
    resourceAttributes: {}
    addK8sUIDAttributes: true

  propagators:
    - tracecontext
    - baggage
    - b3
    - b3multi
    - jaeger
    - xray
    - ottrace

  env:
    - name: OTEL_TRACES_EXPORTER
      value: otlp
    - name: OTEL_METRICS_EXPORTER
      value: otlp
    - name: OTEL_LOGS_EXPORTER
      value: otlp
    - name: OTEL_EXPORTER_OTLP_SPAN_INSECURE
      value: '"true"'

  # Java agent: OTLP gRPC to :4317 matches the exporter default above.
  java:
    image: pair-cn-shanghai.cr.volces.com/opspai/opentelemetry-operator-autoinstrumentation-java:2.23.0
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://opentelemetry-kube-stack-deployment-collector.monitoring:4317
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: grpc

  nodejs: {}

  # Python / .NET / Go SDKs default to OTLP HTTP — must hit :4318.
  python:
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://opentelemetry-kube-stack-deployment-collector.monitoring:4318
      - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
        value: 'true'

  dotnet:
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://opentelemetry-kube-stack-deployment-collector.monitoring:4318

  go:
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://opentelemetry-kube-stack-deployment-collector.monitoring:4318
