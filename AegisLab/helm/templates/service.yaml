---
# etcd Headless Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-etcd-headless
spec:
  clusterIP: None
  selector:
    app: {{ .Release.Name }}-etcd
  ports:
    - name: client
      port: {{ .Values.servicePorts.etcd.client | default 2379 }}
      targetPort: {{ .Values.servicePorts.etcd.client | default 2379 }}
    - name: peer
      port: {{ .Values.servicePorts.etcd.peer | default 2380 }}
      targetPort: {{ .Values.servicePorts.etcd.peer | default 2380 }}

