# Jaeger Service
{{- if eq .Values.configmap.system.env_mode "staging" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-jaeger
spec:
  type: NodePort
  selector:
    app: {{ .Release.Name }}-jaeger
  ports:
    - name: grpc
      port: {{ .Values.servicePorts.jaeger.grpc | default 4317 }}
      targetPort: {{ .Values.servicePorts.jaeger.grpc | default 4317 }}
      nodePort: 31317
    - name: http
      port: {{ .Values.servicePorts.jaeger.http | default 4318 }}
      targetPort: {{ .Values.servicePorts.jaeger.http | default 4318 }}
      nodePort: 31318
    - name: thrift-compact
      port: {{ .Values.servicePorts.jaeger.thriftCompact | default 6831 }}
      targetPort: {{ .Values.servicePorts.jaeger.thriftCompact | default 6831 }}
      nodePort: 31631
    - name: collector-http
      port: {{ .Values.servicePorts.jaeger.collectorHttp | default 14268 }}
      targetPort: {{ .Values.servicePorts.jaeger.collectorHttp | default 14268 }}
      nodePort: 31468
    - name: query
      port: {{ .Values.servicePorts.jaeger.query | default 16686 }}
      targetPort: {{ .Values.servicePorts.jaeger.query | default 16686 }}
      nodePort: 31686
{{- else }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-jaeger
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-jaeger
  ports:
    - name: grpc
      port: {{ .Values.servicePorts.jaeger.grpc | default 4317 }}
      targetPort: {{ .Values.servicePorts.jaeger.grpc | default 4317 }}
    - name: http
      port: {{ .Values.servicePorts.jaeger.http | default 4318 }}
      targetPort: {{ .Values.servicePorts.jaeger.http | default 4318 }}
    - name: thrift-compact
      port: {{ .Values.servicePorts.jaeger.thriftCompact | default 6831 }}
      targetPort: {{ .Values.servicePorts.jaeger.thriftCompact | default 6831 }}
    - name: collector-http
      port: {{ .Values.servicePorts.jaeger.collectorHttp | default 14268 }}
      targetPort: {{ .Values.servicePorts.jaeger.collectorHttp | default 14268 }}
    - name: query
      port: {{ .Values.servicePorts.jaeger.query | default 16686 }}
      targetPort: {{ .Values.servicePorts.jaeger.query | default 16686 }}
{{- end }}

---
# Redis Service
{{- if eq .Values.configmap.system.env_mode "staging" }}
