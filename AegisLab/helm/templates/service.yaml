---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-gateway
  {{- with .Values.microservices.apiGateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if eq .Values.configmap.system.env_mode "staging" }}
  type: NodePort
  {{- else }}
  type: {{ .Values.microservices.apiGateway.service.type }}
  {{- end }}
  selector:
    app: {{ .Release.Name }}-api-gateway
  ports:
    - name: http
      port: {{ .Values.microservices.apiGateway.httpPort }}
      targetPort: {{ .Values.microservices.apiGateway.httpPort }}
      {{- if or (eq .Values.configmap.system.env_mode "staging") (and (eq .Values.microservices.apiGateway.service.type "NodePort") .Values.microservices.apiGateway.service.nodePort) }}
      nodePort: {{ .Values.microservices.apiGateway.service.nodePort }}
      {{- end }}
    - name: intake-grpc
      port: {{ .Values.microservices.apiGateway.intakeGrpcPort | default 9096 }}
      targetPort: intake-grpc

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-runtime-worker-service
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-runtime-worker-service
  ports:
    - name: grpc
      port: {{ .Values.microservices.runtimeWorkerService.grpcPort }}
      targetPort: {{ .Values.microservices.runtimeWorkerService.grpcPort }}
    - name: otlp
      port: {{ .Values.configmap.otlp.port }}
      targetPort: {{ .Values.configmap.otlp.port }}

