---
# etcd Headless Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-etcd-headless
spec:
  clusterIP: None
  selector:
    app: {{ .Release.Name }}-etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380

---
# etcd External Service
{{- if eq .Values.configmap.system.env_mode "staging" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-etcd-external
spec:
  type: NodePort
  selector:
    app: {{ .Release.Name }}-etcd
  ports:
    - port: 2379
      targetPort: 2379
      nodePort: 31379
{{- else }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-etcd-external
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-etcd
  ports:
    - port: 2379
      targetPort: 2379
{{- end }}

---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-gateway
  {{- with .Values.microservices.apiGateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if eq .Values.configmap.system.env_mode "staging" }}
  type: NodePort
  {{- else }}
  type: {{ .Values.microservices.apiGateway.service.type }}
  {{- end }}
  selector:
    app: {{ .Release.Name }}-api-gateway
  ports:
    - name: http
      port: {{ .Values.microservices.apiGateway.httpPort }}
      targetPort: {{ .Values.microservices.apiGateway.httpPort }}
      {{- if eq .Values.configmap.system.env_mode "staging" }}
      nodePort: {{ .Values.microservices.apiGateway.service.nodePort }}
      {{- end }}
    - name: intake-grpc
      port: {{ .Values.microservices.apiGateway.intakeGrpcPort | default 9096 }}
      targetPort: intake-grpc

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-runtime-worker-service
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-runtime-worker-service
  ports:
    - name: grpc
      port: {{ .Values.microservices.runtimeWorkerService.grpcPort }}
      targetPort: {{ .Values.microservices.runtimeWorkerService.grpcPort }}
    - name: otlp
      port: {{ .Values.configmap.otlp.port }}
      targetPort: {{ .Values.configmap.otlp.port }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-buildkit
spec:
  selector:
    app: {{ .Release.Name }}-buildkit
  ports:
    - port: 1234
      targetPort: 1234
  type: ClusterIP

