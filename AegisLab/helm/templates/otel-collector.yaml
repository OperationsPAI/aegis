{{- if .Values.otelCollector.enabled }}
# In-namespace OpenTelemetry Collector for Aegis-self traces.
# Replaces the deleted `<release>-jaeger`. Receives OTLP from every
# Aegis microservice on 4317/4318 and writes to the operator-managed
# ClickStack ClickHouse so traces land alongside benchmark observability
# data — distinguished by `resource.attribute.deployment.scope=aegis`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-collector-config
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        send_batch_size: 1000
        timeout: 5s
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      resource:
        attributes:
          - key: deployment.scope
            value: aegis
            action: upsert
    exporters:
      clickhouse:
        endpoint: {{ .Values.otelCollector.clickhouse.endpoint | quote }}
        database: {{ .Values.otelCollector.clickhouse.database | default "otel" | quote }}
        traces_table_name: {{ .Values.otelCollector.clickhouse.tracesTable | default "otel_traces" | quote }}
        logs_table_name: {{ .Values.otelCollector.clickhouse.logsTable | default "otel_logs" | quote }}
        metrics_table_name: {{ .Values.otelCollector.clickhouse.metricsTable | default "otel_metrics" | quote }}
        ttl: {{ .Values.otelCollector.clickhouse.ttl | default "72h" | quote }}
        timeout: 5s
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [clickhouse]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-otel-collector
spec:
  replicas: {{ .Values.otelCollector.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-otel-collector
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ include "helm.image" (dict "imageConfig" .Values.otelCollector.image "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.otelCollector.image.pullPolicy | default "IfNotPresent" }}"
          args: ["--config=/etc/otel/collector.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          {{- with .Values.otelCollector.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-otel-collector
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
{{- end }}
