# jaeger
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-jaeger
spec:
  serviceName: {{ .Release.Name }}-jaeger
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-jaeger
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-jaeger
    spec:
      containers:
        - name: jaeger
          image: {{ include "helm.image" (dict "imageConfig" .Values.images.jaeger "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.images.jaeger.pullPolicy }}"
          ports:
            - containerPort: {{ .Values.servicePorts.jaeger.grpc | default 4317 }}
            - containerPort: {{ .Values.servicePorts.jaeger.http | default 4318 }}
            - containerPort: {{ .Values.servicePorts.jaeger.thriftCompact | default 6831 }}
            - containerPort: {{ .Values.servicePorts.jaeger.collectorHttp | default 14268 }}
            - containerPort: {{ .Values.servicePorts.jaeger.query | default 16686 }}
          volumeMounts:
            - name: jaeger-data
              mountPath: /badger
      {{- if not .Values.persistence.jaeger.enabled }}
      volumes:
        - name: jaeger-data
          emptyDir: {}
      {{- end }}
  {{- if .Values.persistence.jaeger.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: jaeger-data
      spec:
        accessModes:
          - {{ .Values.persistence.jaeger.accessMode }}
        {{- if .Values.persistence.jaeger.storageClass }}
        storageClassName: {{ .Values.persistence.jaeger.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.jaeger.size }}
  {{- end }}

---
# redis
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis
spec:
  serviceName: {{ .Release.Name }}-redis
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-redis
    spec:
      containers:
        - name: redis
          image: {{ include "helm.image" (dict "imageConfig" .Values.images.redis "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.images.redis.pullPolicy }}"
          ports:
            - containerPort: {{ .Values.servicePorts.redis | default 6379 }}
          {{- if not .Values.persistence.redis.enabled }}
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          {{- end }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
      {{- if not .Values.persistence.redis.enabled }}
      volumes:
        - name: redis-data
          emptyDir:
            medium: "Memory"
            sizeLimit: "512Mi"
      {{- end }}
  {{- if .Values.persistence.redis.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - {{ .Values.persistence.redis.accessMode }}
        {{- if .Values.persistence.redis.storageClass }}
        storageClassName: {{ .Values.persistence.redis.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.redis.size }}
  {{- end }}

---
# mysql
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-mysql
spec:
  serviceName: {{ .Release.Name }}-mysql
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-mysql
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-mysql
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
      containers:
        - name: mysql
          image: {{ include "helm.image" (dict "imageConfig" .Values.images.mysql "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.images.mysql.pullPolicy }}"
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
          env:
            - name: MYSQL_DATABASE
              value: "{{ .Values.configmap.database.mysql.db }}"
            - name: MYSQL_ROOT_PASSWORD
              value: "{{ .Values.configmap.database.mysql.password }}"
          args:
            - --default-authentication-plugin=mysql_native_password
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            {{- if not .Values.persistence.mysql.enabled }}
            - --innodb-flush-log-at-trx-commit=2
            - --innodb-buffer-pool-size=256M
            - --innodb-log-file-size=32M
            - --skip-innodb-doublewrite
            - --innodb-flush-method=O_DIRECT_NO_FSYNC
            {{- end }}
          ports:
            - containerPort: {{ .Values.servicePorts.mysql | default 3306 }}
          {{- if not .Values.persistence.mysql.enabled }}
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          {{- end }}
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      {{- if not .Values.persistence.mysql.enabled }}
      volumes:
        - name: mysql-data
          emptyDir:
            medium: "Memory"
            sizeLimit: "1Gi"
      {{- end }}
  {{- if .Values.persistence.mysql.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - {{ .Values.persistence.mysql.accessMode }}
        {{- if .Values.persistence.mysql.storageClass }}
        storageClassName: {{ .Values.persistence.mysql.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.mysql.size }}
  {{- end }}

---
# etcd
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-etcd
spec:
  serviceName: {{ .Release.Name }}-etcd-headless
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-etcd
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-etcd
    spec:
      containers:
        - name: etcd
          image: {{ include "helm.image" (dict "imageConfig" .Values.images.etcd "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.images.etcd.pullPolicy }}"
          env:
            - name: ETCD_NAME
              value: "{{ .Values.configmap.etcd.cluster.name }}"
            - name: ETCD_DATA_DIR
              value: "/etcd-data"
            - name: ETCD_LISTEN_CLIENT_URLS
              value: "http://0.0.0.0:{{ .Values.servicePorts.etcd.client | default 2379 }}"
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "http://{{ .Release.Name }}-etcd-external:{{ .Values.servicePorts.etcd.client | default 2379 }}"
            - name: ETCD_LISTEN_PEER_URLS
              value: "http://0.0.0.0:{{ .Values.servicePorts.etcd.peer | default 2380 }}"
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: "http://{{ .Release.Name }}-etcd-0.{{ .Release.Name }}-etcd-headless:{{ .Values.servicePorts.etcd.peer | default 2380 }}"
            - name: ETCD_INITIAL_CLUSTER
              value: "{{ .Values.configmap.etcd.cluster.name }}=http://{{ .Release.Name }}-etcd-0.{{ .Release.Name }}-etcd-headless:{{ .Values.servicePorts.etcd.peer | default 2380 }}"
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: "new"
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: "{{ .Values.configmap.etcd.cluster.token }}"
          ports:
            - name: client
              containerPort: {{ .Values.servicePorts.etcd.client | default 2379 }}
              protocol: TCP
            - name: peer
              containerPort: {{ .Values.servicePorts.etcd.peer | default 2380 }}
              protocol: TCP
          {{- if not .Values.persistence.etcd.enabled }}
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          {{- end }}
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd-data
      {{- if not .Values.persistence.etcd.enabled }}
      volumes:
        - name: etcd-data
          emptyDir:
            medium: "Memory"
            sizeLimit: "512Mi"
      {{- end }}
  {{- if .Values.persistence.etcd.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes:
          - {{ .Values.persistence.etcd.accessMode }}
        {{- if .Values.persistence.etcd.storageClass }}
        storageClassName: {{ .Values.persistence.etcd.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.etcd.size }}
  {{- end }}