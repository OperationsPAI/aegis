{{- if .Values.harbor.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: harbor-cert
type: Opaque
data:
  # Harbor certificate is automatically read from certs/harbor.lab.pj.crt and base64 encoded
  harbor.lab.pj.crt: {{ .Files.Get "certs/harbor.lab.pj.crt" | b64enc }}
--- 
apiVersion: v1
kind: Secret
metadata:
  name: docker-config
  namespace: {{ .Values.configmap.k8s.namespace }}
type: Opaque
stringData:
  config.json: |
    {
      "auths": {
        "{{ .Values.harbor.registry }}": {
          "auth": "{{ printf "%s:%s" .Values.harbor.username .Values.harbor.password | b64enc }}"
        }
      }
    }
{{- end }}
---
# NOTE: kube-config Secret has been removed and replaced with ServiceAccount authentication.
# The application now automatically uses the ServiceAccount token for Kubernetes API access.
# For details, see helm/templates/serviceaccount.yaml
---
# JWT signing secret consumed by the backend via AEGIS_JWT_SECRET.
# `helm upgrade` preserves the existing Secret if present; otherwise a new
# random value is generated on first install.
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-auth" .Release.Name) }}
{{- $jwt := "" }}
{{- if and $existing $existing.data (index $existing.data "jwt_secret") }}
{{- $jwt = index $existing.data "jwt_secret" | b64dec }}
{{- else if .Values.auth.jwtSecret }}
{{- $jwt = .Values.auth.jwtSecret }}
{{- else }}
{{- $jwt = randAlphaNum 48 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  jwt_secret: {{ $jwt | quote }}
---
# Aegis SSO private key Secret.
# `helm upgrade` preserves the existing Secret if present; otherwise the
# chart auto-generates a 2048-bit RSA key on first install (same lookup +
# fallback pattern as jwt_secret above).
{{- if not .Values.sso.privateKey.existingSecret }}
{{- $ssoSecretName := include "sso.secretName" . }}
{{- $existingSso := lookup "v1" "Secret" .Release.Namespace $ssoSecretName }}
{{- $ssoPem := "" }}
{{- if and $existingSso $existingSso.data (index $existingSso.data "sso-private.pem") }}
{{- $ssoPem = index $existingSso.data "sso-private.pem" | b64dec }}
{{- else if .Values.sso.privateKey.pem }}
{{- $ssoPem = .Values.sso.privateKey.pem }}
{{- else }}
{{- $ssoPem = genPrivateKey "rsa" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $ssoSecretName }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{- include "sso.labels" . | nindent 4 }}
type: Opaque
stringData:
  sso-private.pem: |
{{ $ssoPem | indent 4 }}
{{- end }}