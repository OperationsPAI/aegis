apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-aegis-api
spec:
  replicas: {{ .Values.microservices.aegisApi.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-aegis-api
  template:
    metadata:
      annotations:
        rollout-timestamp: {{ now | quote }}
      labels:
        app: {{ .Release.Name }}-aegis-api
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      initContainers:
        - name: init-etcd-producer-config
          image: {{ include "helm.image" (dict "imageConfig" .Values.images.busybox "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.images.busybox.pullPolicy }}"
          command:
            - sh
            - -c
            - |
              INIT_KEY="{{ .Values.initialConfig.etcdInit.producer.initKey }}"
              CONFIG_PREFIX="{{ .Values.initialConfig.etcdInit.producer.configPrefix }}"
              CONFIG_YAML_PATH="/initial-config/etcd.yaml"
              ETCD_ENDPOINT="{{ .Values.initialConfig.etcdInit.endpoint | default (printf "http://%s-etcd-headless:2379" .Release.Name) }}"
              FORCE_INIT="{{ .Values.initialConfig.force }}"

              b64enc() {
                printf '%s' "$1" | base64 | tr -d '\n'
              }

              etcd_range() {
                local key_b64
                key_b64=$(b64enc "$1")
                wget -qO- \
                  --header='Content-Type: application/json' \
                  --post-data="{\"key\":\"${key_b64}\"}" \
                  "${ETCD_ENDPOINT}/v3/kv/range"
              }

              etcd_put() {
                local key_b64 value_b64
                key_b64=$(b64enc "$1")
                value_b64=$(b64enc "$2")
                wget -qO- \
                  --header='Content-Type: application/json' \
                  --post-data="{\"key\":\"${key_b64}\",\"value\":\"${value_b64}\"}" \
                  "${ETCD_ENDPOINT}/v3/kv/put" >/dev/null
              }

              INIT_RESPONSE=$(etcd_range "$INIT_KEY" 2>/dev/null || echo "")
              if echo "$INIT_RESPONSE" | grep -q '"value":"dHJ1ZQ=="' && [ "$FORCE_INIT" != "true" ]; then
                echo "producer config already initialized"
                exit 0
              fi

              if [ -f "$CONFIG_YAML_PATH" ]; then
                while IFS=': ' read -r key_name value || [ -n "$key_name" ]; do
                  [ -z "$key_name" ] && continue
                  echo "$key_name" | grep -q '^#' && continue
                  key_name=$(echo "$key_name" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
                  value=$(echo "$value" | sed "s/^[[:space:]]*//; s/[[:space:]]*$//; s/^[\"']//; s/[\"']$//")
                  [ -n "$key_name" ] || continue
                  etcd_put "$CONFIG_PREFIX/$key_name" "$value" || true
                done < "$CONFIG_YAML_PATH"
                etcd_put "$INIT_KEY" "true" || true
              fi
          volumeMounts:
            - name: etcd-initial-config
              mountPath: /initial-config
              readOnly: true
      containers:
        - name: aegis-api
          image: {{ include "helm.image" (dict "imageConfig" .Values.global.images.rcabench "global" .Values.global) }}
          imagePullPolicy: "{{ .Values.global.images.rcabench.pullPolicy }}"
          args:
            - {{ .Values.microservices.aegisApi.binaryName | default "aegis-api" }}
            - --conf
            - {{ .Values.global.configmap.configFile | default "/etc/rcabench/config.prod.toml" }}
            - --port
            - {{ .Values.microservices.aegisApi.httpPort | quote }}
          ports:
            - containerPort: {{ .Values.microservices.aegisApi.httpPort }}
              name: http
            - containerPort: {{ .Values.microservices.aegisApi.intakeGrpcPort | default 9096 }}
              name: intake-grpc
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          env:
            - name: GOPRIVATE
              value: "github.com/OperationsPAI/chaos-experiment"
            - name: ENV
              value: "prod"
            - name: GIN_MODE
              value: "release"
            - name: AEGIS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-auth
                  key: jwt_secret
            {{- if .Values.aegisEnvironments.enabled }}
            - name: AEGIS_ENVIRONMENTS_JSON
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-aegis-environments
                  key: manifest.json
            {{- end }}
            {{- with .Values.global.ssoclient }}
            - name: SSO_BASE_URL
              value: {{ .baseURL | quote }}
            - name: SSO_JWKS_URL
              value: {{ .jwksURL | quote }}
            - name: SSO_CLIENT_ID
              value: {{ .clientID | quote }}
            {{- if .clientSecretRef.name }}
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .clientSecretRef.name }}
                  key: {{ .clientSecretRef.key }}
                  optional: true
            - name: SSO_CLIENT_SECRET_FILE
              value: "/etc/aegis/sso/client-secret"
            {{- end }}
            {{- end }}
          {{- with .Values.microservices.aegisApi.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.microservices.aegisApi.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: {{ .Values.global.configmap.configFile | default "/etc/rcabench/config.prod.toml" }}
              subPath: config.prod.toml
            - name: initial-data
              mountPath: "{{ .Values.configmap.initialization.data_path }}"
              readOnly: true
            - name: containers-data
              mountPath: "{{ .Values.configmap.jfs.container_path }}"
            - name: dataset
              mountPath: "{{ .Values.configmap.jfs.dataset_path }}"
            - name: sso-private-key
              mountPath: {{ .Values.configmap.sso.privateKeyPath }}
              subPath: sso-private.pem
              readOnly: true
            {{- if .Values.global.ssoclient.clientSecretRef.name }}
            - name: sso-client-secret
              mountPath: /etc/aegis/sso
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-rcabench-config
        - name: initial-data
          configMap:
            name: {{ .Release.Name }}-initial-data
        - name: etcd-initial-config
          configMap:
            name: {{ .Release.Name }}-etcd-producer-config
        - name: containers-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-containers-data
        - name: dataset
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-juicefs-dataset
        - name: sso-private-key
          secret:
            secretName: {{ default (include "sso.secretName" .) .Values.global.ssoclient.privateKeySecretName }}
            items:
              - key: sso-private.pem
                path: sso-private.pem
        {{- if .Values.global.ssoclient.clientSecretRef.name }}
        - name: sso-client-secret
          secret:
            secretName: {{ .Values.global.ssoclient.clientSecretRef.name }}
            optional: true
            items:
              - key: {{ .Values.global.ssoclient.clientSecretRef.key }}
                path: client-secret
        {{- end }}
