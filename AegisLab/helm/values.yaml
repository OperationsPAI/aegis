# values.yaml

# Global image registry configuration
global:
  # Set to empty string to use default public registries
  imageRegistry: ""

images:
  rcabench:
    name: opspai/rcabench
    tag: latest
    pullPolicy: Always
  jaeger:
    name: jaegertracing/all-in-one
    tag: latest
    pullPolicy: IfNotPresent
  redis:
    name: redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent
  mysql:
    name: mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  etcd:
    name: quay.io/coreos/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
  busybox:
    name: busybox
    tag: "1.35"
    pullPolicy: IfNotPresent
  buildkit:
    name: moby/buildkit
    tag: buildx-stable-1
    pullPolicy: IfNotPresent
  alloy:
    name: grafana/alloy
    tag: "v1.13.1"
    pullPolicy: IfNotPresent
  loki:
    name: grafana/loki
    tag: "3.5.10"
    pullPolicy: IfNotPresent
  prometheus:
    name: prom/prometheus
    tag: "v3.9.1"
    pullPolicy: IfNotPresent
  grafana:
    name: grafana/grafana
    tag: "12.3.0"
    pullPolicy: IfNotPresent

buildkit:
  enabled: true
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

alloy:
  enabled: true
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

loki:
  enabled: true
  resources:
    limits:
      cpu: "1000m"
      memory: "1Gi"
    requests:
      cpu: "100m"
      memory: "256Mi"

prometheus:
  enabled: true
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "200m"
      memory: "512Mi"

grafana:
  enabled: true
  adminUser: "admin"
  adminPassword: "admin"
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

rcabench-frontend:
  enabled: true
  image:
    repository: docker.io/opspai/rcabench-frontend
    tag: latest
    pullPolicy: Always

harbor:
  enabled: true
  registry: "10.10.10.240"
  namespace: "library"
  username: "admin"
  password: "Harbor12345"

# Initialization settings for PVC setup during install/upgrade
initialization:
  enabled: true

  initDrainTemplate:
    enabled: true
    image:
      name: opspai/init-drain-template
      tag: latest
      pullPolicy: Always
    env:
      TARGET_PATH: /var/lib/rcabench/dataset/drain_template

  initHelmCharts:
    enabled: true
    image:
      name: opspai/init-helm-charts
      tag: latest
      pullPolicy: Always
    env:
      HELM_CHARTS_CONFIG: /app/config.json
      HELM_CHARTS_TARGET_PATH: /var/lib/rcabench/dataset/helm-charts

configmap:
  name: "rcabench"
  version: "1.0.0"
  port: 8082
  workspace: "/app"
  system:
    env_mode: "prod"
    timezone: "Asia/Shanghai"
  initialization:
    data_path: "/app/data/initial_data"
  database:
    mysql:
      user: "root"
      port: "3306"
      password: "yourpassword"
      db: "rcabench"
  etcd:
    username: ""
    password: ""
    cluster:
      name: "etcd0"
      token: "rcabench-etcd-cluster"
  k8s:
    namespace: "exp"
    init_container:
      busybox_image: "busybox:1.35"
    job:
      volume_mount:
        dataset:
          name: "dataset"
          mount_path: "/data"
          source_type: "pvc"
          claim_name: "rcabench-juicefs-dataset"
        experiment_storage:
          name: "experiment-storage"
          mount_path: "/experiment_storage"
          source_type: "pvc"
          claim_name: "rcabench-juicefs-experiment-storage"
  jfs:
    container_path: "/app/containers"
    dataset_path: "/var/lib/rcabench/dataset"
    experiment_storage_path: "/var/lib/rcabench/experiment_storage"
  loki:
    timeout: "10s"
    max_entries: 5000
  otlp:
    port: 4319
    max_request_size: 5242880

microservices:
  apiGateway:
    replicaCount: 1
    service:
      type: ClusterIP
      nodePort: 32082
    httpPort: 8082
  iamService:
    replicaCount: 1
    grpcPort: 9091
  orchestratorService:
    replicaCount: 1
    grpcPort: 9092
  resourceService:
    replicaCount: 1
    grpcPort: 9093
  runtimeWorkerService:
    replicaCount: 1
    grpcPort: 9094
  systemService:
    replicaCount: 1
    grpcPort: 9095

persistence:
  # Global storage type setting - applies to containers, logs, and juicefs sections
  # Options: "juicefs" | "volcengine" | "external"
  storageType: "juicefs"

  # Common StorageClass names for each type
  storageClassNames:
    juicefs: "juicefs-sc"
    volcengine: "rcabench"
    external: ""
  jaeger:
    enabled: true
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: "openebs-hostpath"
  redis:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: "openebs-hostpath"
  mysql:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: "openebs-hostpath"
  etcd:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: "openebs-hostpath"
  containers:
    enabled: true
    accessMode: ReadWriteMany
    size: 20Gi
    # storageClass is determined by persistence.storageType
  observability:
    enabled: true
    accessMode: ReadWriteMany
    size: 50Gi
    # storageClass is determined by persistence.storageType
  juicefs:
    enabled: true
    size: 1000Gi
    # Uses persistence.storageType for storage selection
    useStaticPV: true # Only applies when storageType is "juicefs"
    subPath:
      dataset: "rcabench_dataset"
      experiment_storage: "experiment_storage"
    # Volcengine-specific settings (NAS supports ReadWriteMany)
    volcengine:
      accessMode: ReadWriteMany
    # External-specific settings
    external:
      accessMode: ReadWriteMany

# JuiceFS Configuration
juicefs:
  name: "jfs"
  metaurl: "redis://10.10.10.119:6379/1"
  cacheSize: "1024"
  # Optional: configure object storage if needed
  # storage: "s3"
  # bucket: "your-bucket"
  # accessKey: "your-access-key"
  # secretKey: "your-secret-key"

# Initial configuration
# Only specify keys you want to override from environment metadata defaults
# The defaults are defined in helm/_helpers.tpl based on the environment
initialConfig:
  force: false # Set to true to force reinitialize etcd config on pod restart
  producer:
    settings: {}

  consumer:
    settings: {}

# Initial data files - can be overridden via skaffold setFiles
initialDataFiles:
  data_yaml: ""
  otel_demo_yaml: ""
  ts_yaml: ""
