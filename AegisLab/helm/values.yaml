# values.yaml

# Global image registry configuration
global:
  # Set to empty string to use default public registries
  imageRegistry: ""

servicePorts:
  redis: 6379
  mysql: 3306
  etcd:
    client: 2379
    peer: 2380
  jaeger:
    grpc: 4317
    http: 4318
    thriftCompact: 6831
    collectorHttp: 14268
    query: 16686
  loki: 3100
  prometheus: 9090

images:
  rcabench:
    name: opspai/rcabench
    tag: latest
    pullPolicy: Always
  jaeger:
    name: jaegertracing/all-in-one
    tag: latest
    pullPolicy: IfNotPresent
  redis:
    name: redis
    tag: "8.0-M02-alpine3.20"
    pullPolicy: IfNotPresent
  mysql:
    name: mysql
    tag: "8.0.43"
    pullPolicy: IfNotPresent
  etcd:
    name: quay.io/coreos/etcd
    tag: "v3.6.7"
    pullPolicy: IfNotPresent
  busybox:
    name: busybox
    tag: "1.35"
    pullPolicy: IfNotPresent
  buildkit:
    name: moby/buildkit
    tag: buildx-stable-1
    pullPolicy: IfNotPresent
  alloy:
    name: grafana/alloy
    tag: "v1.13.1"
    pullPolicy: IfNotPresent
  loki:
    name: grafana/loki
    tag: "3.5.10"
    pullPolicy: IfNotPresent
  prometheus:
    name: prom/prometheus
    tag: "v3.9.1"
    pullPolicy: IfNotPresent
  grafana:
    name: grafana/grafana
    tag: "12.3.0"
    pullPolicy: IfNotPresent
  caddy:
    name: caddy
    tag: "2-alpine"
    pullPolicy: IfNotPresent

# Edge proxy: thin reverse-proxy Service that anchors the external LB EIP.
# Disabled by default; enable per environment that has an external
# LoadBalancer controller (e.g. Volcengine on byte-cluster). When enabled,
# move the LB-binding annotations onto `edgeProxy.service.annotations` and
# leave `microservices.aegisApi.service.annotations` empty so aegis-api
# upgrades stop churning the EIP.
edgeProxy:
  enabled: false
  replicaCount: 1
  service:
    type: ClusterIP
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

buildkit:
  enabled: true
  port: 1234
  metricsPort: 5678
  fallbackRegistry: ""
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

alloy:
  enabled: true
  appLabel: "rcabench"
  metricsPort: 12345
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

loki:
  enabled: true
  servicePort: 3100
  resources:
    limits:
      cpu: "1000m"
      memory: "1Gi"
    requests:
      cpu: "100m"
      memory: "256Mi"

prometheus:
  enabled: true
  servicePort: 9090
  selfScrapeTarget: "localhost:9090"
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "200m"
      memory: "512Mi"

grafana:
  enabled: true
  adminUser: "admin"
  adminPassword: "admin"
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

rcabench-frontend:
  enabled: true
  image:
    repository: docker.io/opspai/rcabench-frontend
    tag: latest
    pullPolicy: Always

harbor:
  enabled: true
  registry: "10.10.10.240"
  namespace: "library"
  username: "admin"
  password: "Harbor12345"
  certName: "harbor.lab.pj.crt"

# Initialization settings for PVC setup during install/upgrade
initialization:
  enabled: true

  initDrainTemplate:
    enabled: false
    image:
      name: opspai/init-drain-template
      tag: latest
      pullPolicy: Always
    env:
      TARGET_PATH: /var/lib/rcabench/dataset/drain_template

  initHelmCharts:
    enabled: true
    image:
      name: opspai/init-helm-charts
      tag: latest
      pullPolicy: Always
    env:
      HELM_CHARTS_CONFIG: /app/config.json
      HELM_CHARTS_TARGET_PATH: /var/lib/rcabench/dataset/helm-charts

auth:
  # JWT signing secret (AEGIS_JWT_SECRET). If empty, a random value is
  # generated on first install and retained across helm upgrades.
  jwtSecret: ""

# SSO client configuration consumed by the backend (module/ssoclient).
# Rendered as AEGIS_SSO_* env vars on the aegis-api pod so config.toml
# template strings can pick them up. Bootstrap client secret is read from
# a separate Secret (default: `sso-bootstrap`).
ssoclient:
  baseURL: "http://sso:8083"
  jwksURL: "http://sso:8083/.well-known/jwks.json"
  clientID: "aegis-backend"
  clientSecretRef:
    name: "sso-bootstrap"
    key: "aegis-backend-secret"
  # Name of a Secret (in the same namespace) containing the SSO private key.
  # The secret must have a key named `sso-private.pem`. When set, both
  # aegis-api and runtime-worker-service mount it so jwtkeys.Signer can
  # mint service tokens.
  privateKeySecretName: ""

# Aegis SSO service deployment (OIDC provider + admin REST).
# Previously a standalone chart at helm/sso/; merged into rcabench
# so one release deploys the entire stack.
sso:
  replicaCount: 1

  image:
    repository: opspai/rcabench
    tag: latest
    pullPolicy: Always

  service:
    type: NodePort
    port: 8083
    nodePort: 30083

  config:
    name: "sso"
    version: "1.0.0"
    port: 8083
    workspace: "/app"
    binaryName: "sso"
    subcommand: "sso"
    database:
      mysql:
        host: "mysql"
        port: "3306"
        user: "root"
        password: "yourpassword"
        db: "rcabench"
    redis:
      host: "redis:6379"
    jaeger:
      endpoint: ""
    k8s:
      namespace: ""
      serviceAccount:
        name: ""
    sso:
      issuer: "http://sso:8083"
      baseURL: "http://sso:8083"
      jwksURL: "http://sso:8083/.well-known/jwks.json"
      kid: "sso-v1"
      clientID: "aegis-backend"
      backendRedirectURI: ""
      privateKeyPath: "/etc/aegis/sso-private.pem"
      seedSecretDumpPath: "/var/lib/sso/.first-boot-secret"
      consoleRedirectURIs: "http://localhost:3323/auth/callback,http://127.0.0.1:3323/auth/callback"
      loginRedirect: "http://localhost:3323/auth/login"

  privateKey:
    pem: ""
    existingSecret: ""

  persistence:
    enabled: true
    storageClass: ""
    size: 256Mi
    accessMode: ReadWriteOnce
    mountPath: /var/lib/sso

  auth:
    jwtSecret: ""
    secretName: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

configmap:
  name: "rcabench"
  version: "1.0.0"
  port: 8082
  workspace: "/app"
  configFile: "/etc/rcabench/config.prod.toml"
  configDir: "/etc/rcabench"
  system:
    env_mode: "prod"
    timezone: "Asia/Shanghai"
  initialization:
    data_path: "/app/data/initial_data"
  database:
    mysql:
      host: ""
      user: "root"
      port: "3306"
      password: "yourpassword"
      db: "rcabench"
    clickhouse:
      host: ""
      port: "9000"
      user: "otelcollector"
      password: "otelcollectorpass"
      db: "otel"
      timezone: "UTC"
  redis:
    host: ""
  jaeger:
    endpoint: ""
  etcd:
    endpoints: []
    username: ""
    password: ""
    cluster:
      name: "etcd0"
      token: "rcabench-etcd-cluster"
  k8s:
    namespace: "exp"
    service:
      internalURL: ""
    init_container:
      busybox_image: "busybox:1.35"
    job:
      serviceAccount:
        name: ""
      volume_mount:
        dataset:
          name: "dataset"
          mount_path: "/data"
          source_type: "pvc"
          claim_name: "rcabench-juicefs-dataset"
        experiment_storage:
          name: "experiment-storage"
          mount_path: "/experiment_storage"
          source_type: "pvc"
          claim_name: "rcabench-juicefs-experiment-storage"
  jfs:
    container_path: "/app/containers"
    dataset_path: "/var/lib/rcabench/dataset"
    experiment_storage_path: "/var/lib/rcabench/experiment_storage"
  buildkit:
    address: ""
  clients:
    runtime:
      target: ""
    runtimeIntake:
      target: ""
  loki:
    address: ""
    timeout: "10s"
    max_entries: 5000
  otlp:
    port: 4319
    max_request_size: 5242880
  sso:
    privateKeyPath: "/etc/aegis/sso-private.pem"
    kid: "sso-v1"
    issuer: "http://172.21.0.2:30083"
    baseURL: "http://172.21.0.2:30083"
    jwksURL: "http://rcabench-aegis-sso:8083/.well-known/jwks.json"
    clientID: "aegis-backend"
    clientSecret: ""
    # Defaults to http://<release-name>-aegis-api:<port>/auth/oidc/callback.
    # Only override if the API gateway is exposed under a different host.
    backendRedirectURI: ""
    seedSecretDumpPath: "/var/lib/sso/.first-boot-secret"
    consoleRedirectURIs: "http://localhost:3323/auth/callback,http://127.0.0.1:3323/auth/callback"
    loginRedirect: "http://localhost:3323/auth/login"

microservices:
  aegisApi:
    replicaCount: 1
    binaryName: "aegis-api"
    service:
      type: ClusterIP
      # Annotations rendered onto the aegis-api Service. Kept in chart
      # values (not just stamped out-of-band) so `helm upgrade` doesn't
      # silently drop them — on byte-cluster the Volcengine LB controller
      # uses these to bind a stable EIP to the underlying CLB; if helm
      # reapplies the Service without them the controller re-creates the
      # CLB and the EIP changes, breaking external clients. Override per
      # environment; empty `{}` for environments without external LB
      # (kind, dev). See manifests/byte-cluster/values.yaml.
      annotations: {}
    httpPort: 8082
    # Port for the runtime-intake gRPC server (runtime-worker -> aegis-api).
    intakeGrpcPort: 9096
    # Pod resource requests/limits. HPA targetCPUUtilizationPercentage requires
    # `requests.cpu` to be set; leave `resources: {}` to omit the block entirely.
    resources: {}
    # Horizontal Pod Autoscaler. Disabled by default; when enabled the chart
    # emits an autoscaling/v2 HPA targeting this deployment. Requires
    # metrics-server (or equivalent metrics.k8s.io provider) in the cluster.
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 0
  runtimeWorkerService:
    replicaCount: 1
    binaryName: "runtime-worker-service"
    grpcPort: 9094
    resources: {}
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 0
  notify:
    enabled: true
    replicaCount: 1
    httpPort: 8084
    binaryName: "aegis-notify"
    service:
      type: ClusterIP
    resources: {}
  blob:
    enabled: true
    replicaCount: 1
    httpPort: 8085
    binaryName: "aegis-blob"
    scratchRoot: "/var/lib/aegis-blob/scratch"
    service:
      type: ClusterIP
    resources: {}
  gateway:
    enabled: true
    replicaCount: 1
    httpPort: 8086
    binaryName: "aegis-gateway"
    service:
      type: ClusterIP
    # Gateway-level config rendered into `[gateway]` of the configmap.
    # Routes are derived from release name + microservice ports.
    trustedHeaderKey: ""
    rateLimit:
      rps: 200
      burst: 400
    cors:
      allowedOrigins:
        - http://localhost:3323
        - http://127.0.0.1:3323
    resources: {}
  configcenter:
    enabled: true
    replicaCount: 1
    httpPort: 8087
    binaryName: "aegis-configcenter"
    resources: {}

persistence:
  # Global storage type setting - applies to containers, logs, and juicefs sections
  # Options: "juicefs" | "volcengine" | "external"
  storageType: "juicefs"

  # Common StorageClass names for each type
  storageClassNames:
    juicefs: "juicefs-sc"
    volcengine: "rcabench"
    external: ""
  jaeger:
    enabled: true
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: "openebs-hostpath"
  redis:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: "openebs-hostpath"
  mysql:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: "openebs-hostpath"
  etcd:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: "openebs-hostpath"
  containers:
    enabled: true
    accessMode: ReadWriteMany
    size: 20Gi
    # storageClass is determined by persistence.storageType
  observability:
    enabled: true
    accessMode: ReadWriteMany
    size: 50Gi
    # storageClass is determined by persistence.storageType
  juicefs:
    enabled: true
    size: 1000Gi
    # Uses persistence.storageType for storage selection
    useStaticPV: true # Only applies when storageType is "juicefs"
    subPath:
      dataset: "rcabench_dataset"
      experiment_storage: "experiment_storage"
    # Volcengine-specific settings (NAS supports ReadWriteMany)
    volcengine:
      accessMode: ReadWriteMany
    # External-specific settings
    external:
      accessMode: ReadWriteMany

# JuiceFS Configuration
juicefs:
  name: "jfs"
  # JuiceFS metadata engine. Override per environment (e.g. local Redis or shared staging Redis).
  metaurl: ""
  cacheSize: "1024"
  # Optional: configure object storage if needed
  # storage: "s3"
  # bucket: "your-bucket"
  # accessKey: "your-access-key"
  # secretKey: "your-secret-key"

# Initial configuration
# Only specify keys you want to override from environment metadata defaults
# The defaults are defined in helm/_helpers.tpl based on the environment
initialConfig:
  force: false # Set to true to force reinitialize etcd config on pod restart
  etcdInit:
    endpoint: "" # Defaults to http://<release-name>-etcd-headless:2379
    producer:
      initKey: "/initialized_producer"
      configPrefix: "/rcabench/config/producer"
    consumer:
      initKey: "/initialized_consumer"
      configPrefix: "/rcabench/config/consumer"
  producer:
    settings: {}

  consumer:
    settings: {}

# Initial data files - can be overridden via skaffold setFiles
initialDataFiles:
  data_yaml: ""
  otel_demo_yaml: ""
  ts_yaml: ""

serviceAccount:
  imagePullSecrets: []
