# otel-collector subchart defaults.
#
# Receives OTLP from every Aegis microservice on 4317/4318 and exports
# traces to the operator-managed ClickStack ClickHouse so Aegis-self
# traces land alongside benchmark observability data.
#
# Service name `<release>-otel-collector` is load-bearing: SSO
# `tracing.endpoint`, edge-proxy OTEL env vars, and the parent
# `[observability]` configmap section all reference it by DNS.

enabled: true
replicaCount: 1

image:
  name: otel/opentelemetry-collector-contrib
  tag: "0.122.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

clickhouse:
  # ClickHouse native protocol endpoint. Default points at the
  # operator-managed ClickStack cluster in the `monitoring` namespace.
  endpoint: "tcp://clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local:9000?dial_timeout=10s&compress=lz4&username=default"
  database: "otel"
  tracesTable: "otel_traces"
  logsTable: "otel_logs"
  metricsTable: "otel_metrics"
  ttl: "72h"

service:
  type: ClusterIP
  grpcPort: 4317
  httpPort: 4318

# ServiceAccount binding. Empty `name` falls back to `{{ .Release.Name }}-sa`.
serviceAccount:
  name: ""

# Arbitrary additional env vars appended as-is.
extraEnv: []
