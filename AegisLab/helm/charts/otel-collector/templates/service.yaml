{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otel-collector.fullname" . }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ include "otel-collector.fullname" . }}
  ports:
    - name: otlp-grpc
      port: {{ .Values.service.grpcPort | default 4317 }}
      targetPort: otlp-grpc
    - name: otlp-http
      port: {{ .Values.service.httpPort | default 4318 }}
      targetPort: otlp-http
{{- end }}
{{- /* end of file */ -}}
