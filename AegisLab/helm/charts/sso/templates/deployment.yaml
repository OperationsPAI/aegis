{{- if .Values.enabled }}
# Aegis SSO Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sso.fullname" . }}
  labels:
    {{- include "sso.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sso.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        rollout-timestamp: {{ now | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "sso.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      containers:
        - name: sso
          image: {{ include "sso.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - {{ .Values.config.binaryName | default "sso" }}
            - {{ .Values.config.subcommand | default "sso" }}
            - --conf
            - {{ dig "configmap" "configFile" "/etc/rcabench/config.prod.toml" (.Values.global | default dict) }}
            - --port
            - {{ .Values.service.port | quote }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          env:
            - name: ENV
              value: "prod"
            - name: AEGIS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName | default (printf "%s-auth" .Release.Name) }}
                  key: jwt_secret
          readinessProbe:
            httpGet:
              path: /.well-known/jwks.json
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /.well-known/jwks.json
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: {{ dig "configmap" "configFile" "/etc/rcabench/config.prod.toml" (.Values.global | default dict) }}
              subPath: config.prod.toml
            - name: private-key
              mountPath: {{ .Values.config.sso.privateKeyPath }}
              subPath: sso-private.pem
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: secrets
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sso.fullname" . }}-config
        - name: private-key
          secret:
            secretName: {{ include "sso.secretName" . }}
            items:
              - key: sso-private.pem
                path: sso-private.pem
        {{- if .Values.persistence.enabled }}
        - name: secrets
          persistentVolumeClaim:
            claimName: {{ include "sso.fullname" . }}-secrets
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
