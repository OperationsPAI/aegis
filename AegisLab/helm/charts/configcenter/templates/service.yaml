{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "configcenter.fullname" . }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ include "configcenter.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.httpPort }}
      targetPort: http
{{- end }}
