{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notify.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "notify.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "notify.fullname" . }}
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      containers:
        - name: notify
          image: {{ include "notify.image" . }}
          imagePullPolicy: "{{ include "notify.imagePullPolicy" . }}"
          args:
            - {{ .Values.binaryName | default "aegis-notify" }}
            - serve
            - --conf
            - {{ dig "configmap" "configDir" "/etc/rcabench" (.Values.global | default dict) }}
            - --port
            - {{ .Values.httpPort | quote }}
          ports:
            - containerPort: {{ .Values.httpPort }}
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          env:
            - name: GOPRIVATE
              value: "github.com/OperationsPAI/chaos-experiment"
            - name: ENV
              value: "prod"
            - name: AEGIS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-auth
                  key: jwt_secret
            {{- with dig "ssoclient" dict (.Values.global | default dict) }}
            - name: SSO_BASE_URL
              value: {{ .baseURL | quote }}
            - name: SSO_JWKS_URL
              value: {{ .jwksURL | quote }}
            - name: SSO_CLIENT_ID
              value: {{ .clientID | quote }}
            {{- if .clientSecretRef.name }}
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .clientSecretRef.name }}
                  key: {{ .clientSecretRef.key }}
                  optional: true
            - name: SSO_CLIENT_SECRET_FILE
              value: "/etc/aegis/sso/client-secret"
            {{- end }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: {{ dig "configmap" "configFile" "/etc/rcabench/config.prod.toml" (.Values.global | default dict) }}
              subPath: config.prod.toml
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-rcabench-config
{{- end }}
