{{- if not .Values.privateKey.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis-sso.secretName" . }}
  labels:
    {{- include "aegis-sso.labels" . | nindent 4 }}
type: Opaque
{{- if .Values.privateKey.pem }}
stringData:
  sso-private.pem: |
{{ .Values.privateKey.pem | indent 4 }}
{{- else }}
# WARNING: no privateKey.pem set. Helm install will fail to mount the key.
# Generate one with `openssl genrsa -out sso-private.pem 2048` and pass via
# `helm install ... --set-file privateKey.pem=sso-private.pem`, or set
# `privateKey.existingSecret` to a pre-created Secret.
stringData:
  sso-private.pem: ""
{{- end }}
{{- end }}
