name: aegislab-microservices
services:
  orchestrator-service:
    image: golang:1.24-bookworm
    working_dir: /workspace/src
    command: ["go", "run", "./cmd/orchestrator-service", "-conf", "/workspace/src/config.dev.toml"]
    volumes:
      - ./:/workspace
    environment:
      GOPROXY: https://proxy.golang.org,direct
    ports:
      - "9092:9092"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  runtime-worker-service:
    image: golang:1.24-bookworm
    working_dir: /workspace/src
    command: ["go", "run", "./cmd/runtime-worker-service", "-conf", "/workspace/src/config.dev.toml"]
    volumes:
      - ./:/workspace
    environment:
      GOPROXY: https://proxy.golang.org,direct
    ports:
      - "9094:9094"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      etcd:
        condition: service_started
      orchestrator-service:
        condition: service_started

  api-gateway:
    image: golang:1.24-bookworm
    working_dir: /workspace/src
    command: ["go", "run", "./cmd/api-gateway", "-conf", "/workspace/src/config.dev.toml", "-port", "8082"]
    volumes:
      - ./:/workspace
    environment:
      GOPROXY: https://proxy.golang.org,direct
    ports:
      - "8082:8082"
    depends_on:
      orchestrator-service:
        condition: service_started
