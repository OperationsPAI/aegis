name: aegislab-microservices
services:
  api-gateway:
    image: golang:1.24-bookworm
    working_dir: /workspace/src
    command: ["go", "run", "./cmd/api-gateway", "-conf", "/workspace/src/config.dev.toml", "-port", "8082"]
    volumes:
      - ./:/workspace
    environment:
      GOPROXY: https://proxy.golang.org,direct
    ports:
      - "8082:8082"
      - "9096:9096"   # runtime-intake gRPC
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      etcd:
        condition: service_started

  aegis-sso:
    image: golang:1.24-bookworm
    working_dir: /workspace/src
    command: ["go", "run", "./cmd/aegis-sso", "sso", "--conf", "/workspace/src/config.dev.toml", "--port", "8083"]
    volumes:
      - ./:/workspace
      - ./data/sso/sso-private.pem:/etc/aegis/sso-private.pem:ro
      - ./data/sso-secrets:/var/lib/aegis-sso
    environment:
      GOPROXY: https://proxy.golang.org,direct
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  runtime-worker-service:
    image: golang:1.24-bookworm
    working_dir: /workspace/src
    command: ["go", "run", "./cmd/runtime-worker-service", "-conf", "/workspace/src/config.dev.toml"]
    volumes:
      - ./:/workspace
    environment:
      GOPROXY: https://proxy.golang.org,direct
    ports:
      - "9094:9094"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      etcd:
        condition: service_started
      api-gateway:
        condition: service_started
