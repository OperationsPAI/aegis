name: Publish SDK & Frontend Client

on:
  push:
    tags:
      - "release-sdk/v[0-9]+.[0-9]+.[0-9]+*"
      - "release-client/v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

env:
  SEMVER_REGEX: '^v([0-9]+\.[0-9]+\.[0-9]+.*)$'

jobs:
  publish-pypi:
    name: Publish Python SDK
    if: startsWith(github.ref, 'refs/tags/release-sdk/')
    runs-on: ubuntu-latest
    environment:
      name: pypi

    env:
      SDK_DIR: "sdk/python"
      SDK_OPENAPI_DIR: "sdk/python/src/rcabench/openapi"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Tag Version
        uses: OperationsPAI/shared-workflows/actions/extract-tag-version@main
        id: extract_version
        with:
          semver-regex: ${{ env.SEMVER_REGEX }}
          tag-prefix: "release-sdk/"

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          install-ruff: 'true'

      - name: Setup Just
        uses: extractions/setup-just@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        run: |
          echo "Starting SDK generation..."
          just generate-python-sdk ${{ steps.extract_version.outputs.version }}

          echo "Building SDK package..."
          cd ${SDK_DIR}
          uv build

          echo "Publishing to PyPI..."
          uv publish --trusted-publishing always

          echo "::notice::Successfully published to PyPI!"

  publish-npm:
    name: Publish Frontend Client
    if: startsWith(github.ref, 'refs/tags/release-client/')
    runs-on: ubuntu-latest
    environment:
      name: npm

    env:
      CLIENT_DIR: "client/typescript"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Tag Version
        uses: OperationsPAI/shared-workflows/actions/extract-tag-version@main
        id: extract_version
        with:
          semver-regex: ${{ env.SEMVER_REGEX }}
          tag-prefix: "release-client/"

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@OperationsPAI'

      - name: Setup Just
        uses: extractions/setup-just@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish
        run: |
          TAG_VERSION="${{ steps.extract_version.outputs.version }}"

          echo "Starting TypeScript client generation..."
          just generate-typescript-client "$TAG_VERSION"

          echo "Installing and Building..."
          cd ${CLIENT_DIR}
          pnpm install --frozen-lockfile
          pnpm run build

          echo "Publishing to GitHub Packages..."
          pnpm publish --no-git-checks
          
          echo "::notice::Successfully published to NPM!"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}