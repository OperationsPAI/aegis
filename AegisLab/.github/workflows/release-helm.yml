name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'helm/**'
      - '.github/workflows/release-helm.yml'
    tags:
      - 'release-helm/v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  call-helm-release:
    uses: OperationsPAI/shared-workflows/.github/workflows/release-helm.yml@main
    if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    with: 
      repo-name: rcabench
      repo-url: https://operationspai.github.io/AegisLab/
    secrets: inherit